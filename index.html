let _relIndicator = null;        // indicateur de flux actif (null = vue heatmap)
let _relDir = 'partner';         // 'partner' (qui pèse pour) | 'influence' (pour qui pèse)
let _relMode = 'sunburst';       // 'sunburst' | 'treemap'
let _relPath = [];               // breadcrumb du drill-down [subcat1, subcat2, ...]

function renderRelations(){
  const root = document.getElementById('relationsContent');
  if(!state.subject || !state.subject.isos.length){
    root.innerHTML = `<div class="need-subject">

  }

    root.innerHTML = `

        </div>
        <div class="controls">
          <div class="seg">
            <button class="${_relDir==='partner'?'on':''}" onclick="setRelDir('partner')">Partenaire</button>
            <button class="${_relDir==='influence'?'on':''}" onclick="setRelDir('influence')">Influence</button>
          </div>
        </div>
      </div>
      <div id="relHeatHost"></div>`;

      </div>
      <div class="controls">
        <div class="seg">
          <button class="${_relDir==='partner'?'on':''}" onclick="setRelDir('partner')">Partenaire</button>
          <button class="${_relDir==='influence'?'on':''}" onclick="setRelDir('influence')">Influence</button>
        </div>
        <div class="seg">

          <button class="${_relMode==='treemap'?'on':''}" onclick="setRelMode('treemap')">Treemap</button>
        </div>
        <button class="hbtn" onclick="leaveRelIndicator()" title="Revenir à la heatmap">← Heatmap</button>
      </div>

/* ─── Heatmap d'accueil ───────────────────────────────────────── */
function renderRelHeatmap(){
  const host = document.getElementById('relHeatHost');
  const flux = state.indicators.filter(c => c.table === 'flux' && c.presentInDb !== false);
  if(!flux.length){
    host.innerHTML = `<div class="rel-empty">Aucun indicateur de flux disponible.</div>`;
    return;
  }
  // Pour chaque flux : top 5 partenaires (selon _relDir), pourcentages.
  // Cellule = % du partenaire dans le total du flux pour le sujet.
  // Couleur = intensité ; clic = creuser cet indicateur (avec partenaire pré-fixé plus tard).
  const rows = []; // [{ind, label, partners:[{code,name,flag,pct}]}]
  const allPartners = new Set();
  for(const c of flux){
    let rs = getFluxRows(c.indicator, _relDir);
    if(!rs.length) continue;
    if(isDebtIndicator(c.indicator)){
      const bil = rs.filter(r => isBilateral(r));
      if(bil.length) rs = bil;
    }
    const byPartner = new Map();
    let total = 0;
    for(const r of rs){
      if(r.partner && r.partner.startsWith('__')) continue;
      const v = r.value || 0;
      byPartner.set(r.partner, (byPartner.get(r.partner) || 0) + v);
      total += v;
    }
    if(total <= 0) continue;
    const top = [...byPartner.entries()].sort((a,b)=>b[1]-a[1]).slice(0, 5);
    const partners = top.map(([code, v]) => {
      allPartners.add(code);
      return { code, name: partnerLabel(code), flag: partnerFlag(code), pct: (v/total)*100 };
    });
    rows.push({ ind: c.indicator, label: c.label || c.indicator, partners });
  }
  if(!rows.length){
    host.innerHTML = `<div class="rel-empty">Pas de flux renseigné pour ce sujet.</div>`;
    return;
  }
  // Pour chaque flux on a un top 5 propre. Affichage : matrice flux × rang (1..5)
  // où chaque cellule indique le partenaire + son %.
  const RANKS = [1, 2, 3, 4, 5];
  const gridCols = `220px repeat(${RANKS.length}, 1fr)`;
  let head = `<div class="heat-rowhead" style="visibility:hidden">flux</div>`;
  for(const r of RANKS) head += `<div class="heat-colhead">${r}${r===1?'er':'e'}</div>`;
  let body = '';
  for(const row of rows){
    body += `<div class="heat-rowhead" title="${row.label}">${row.label}</div>`;
    for(let i = 0; i < RANKS.length; i++){
      const p = row.partners[i];
      if(!p){ body += `<div class="heat-cell empty">—</div>`; continue; }
      const intensity = Math.min(100, p.pct) / 100;
      const bg = mixColors('#eef5ee', '#0a6e4a', intensity);
      const fg = intensity > 0.55 ? '#fff' : 'var(--text)';
      body += `<div class="heat-cell" style="background:${bg};color:${fg}"
                    onclick="enterRelIndicator('${row.ind}')"
                    data-tt="${escAttr(p.flag+' '+p.name)}" data-tb="${escAttr(row.label+' · '+p.pct.toFixed(0)+'%')}"
                    onmouseenter="showTip2(event,this.dataset.tt,this.dataset.tb)" onmousemove="moveTip(event)" onmouseleave="hideTip()">
        ${p.flag} ${p.pct.toFixed(0)}%
      </div>`;
    }
  }
  host.innerHTML = `<div class="rel-heat-card">
    <div class="rel-heat-head">
      <span class="rel-heat-title">Boussole des flux · ${_relDir==='partner'?'Partenaires':'Influence'}</span>
      <span class="rel-heat-sub">cliquer une cellule pour creuser</span>
    </div>
    <div class="rel-heat-body">
      <div class="heat-grid" style="grid-template-columns:${gridCols}">${head}${body}</div>
    </div>
  </div>`;
}
function mixColors(c1, c2, t){
  const p1 = hexToRgb(c1), p2 = hexToRgb(c2);
  if(!p1 || !p2) return c1;
  const r = Math.round(p1.r + (p2.r-p1.r)*t);
  const g = Math.round(p1.g + (p2.g-p1.g)*t);
  const b = Math.round(p1.b + (p2.b-p1.b)*t);
  return `rgb(${r},${g},${b})`;
}
function hexToRgb(h){
  const m = h.replace('#','').match(/^([0-9a-f]{6})$/i);
  if(!m) return null;
  const n = parseInt(m[1],16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

/* ─── Composition : agrégation hiérarchique ─────────────────────
   Niveau 0 = subcategory_1 (partenaire bilatéral pour pays, ou catégorie)
   Niveau 1 = subcategory_2
   Niveau 2 = subcategory_3
   Pour la dette : niveau 0 affiche les pays créanciers (subcategory_1='bilaterale'
   ne sert qu'à filtrer, on agrège par partenaire). Sinon, par subcategory.
─────────────────────────────────────────────────────────────── */
function buildHierarchyForFlux(){
  const rs = getFluxRows(_relIndicator, _relDir);
  if(!rs.length) return null;
  let rows = rs;
  // pour la dette, on filtre sur le bilatéral (cohérence avec Synthèse)
  if(isDebtIndicator(_relIndicator)){
    const bil = rows.filter(r => isBilateral(r));
    if(bil.length) rows = bil;
  }
  // exclure agrégats Banque Mondiale + sentinelles __
  rows = rows.filter(r => r.partner && !r.partner.startsWith('__') && !REGIONAL_CODES.has(r.partner));
  if(!rows.length) return null;
  // Construction : niveau 0 = partenaire (le partenaire EST la première dimension visible)
  // Si tu veux à terme regrouper par subcategory_1 (catégorie : aide / prêt / etc.), il suffit de changer ici.
  const root = { name: 'Total', children: [] };
  // Partenaires agrégés (somme sur subcategories)
  const byPartner = new Map();
  for(const r of rows){
    if(!byPartner.has(r.partner)) byPartner.set(r.partner, { name: partnerLabel(r.partner), code: r.partner, flag: partnerFlag(r.partner), children: new Map(), value: 0 });
    const p = byPartner.get(r.partner);
    p.value += (r.value || 0);
    // sous-niveau par subcategory_2/3 si présent (utile pour Comtrade : par produit)
    const sub = r.sub2 || r.sub3 || null;
    if(sub){
      if(!p.children.has(sub)) p.children.set(sub, { name: sub, value: 0, children: new Map() });
      const s = p.children.get(sub);
      s.value += (r.value || 0);
      const sub3 = (r.sub2 && r.sub3) ? r.sub3 : null;
      if(sub3){
        if(!s.children.has(sub3)) s.children.set(sub3, { name: sub3, value: 0 });
        s.children.get(sub3).value += (r.value || 0);
      }
    }
  }
  // matérialisation en arbre
  const partnersArr = [...byPartner.values()]
    .sort((a,b) => b.value - a.value)
    .map(p => ({
      name: p.name, code: p.code, flag: p.flag, value: p.value,
      children: [...p.children.values()]
        .sort((a,b) => b.value - a.value)
        .map(s => ({
          name: s.name, value: s.value,
          children: [...s.children.values()].sort((a,b)=>b.value-a.value)
        }))
    }));
  root.children = partnersArr;
  return root;
}

// Descend dans l'arbre selon le chemin _relPath (noms de nœuds).
function descendHierarchy(tree){
  let node = tree;
  for(const step of _relPath){
    if(!node.children || !node.children.length) break;
    const next = node.children.find(c => c.name === step);
    if(!next) break;
    node = next;
  }
  return node;
}

function renderRelComposition(){
  const body = document.getElementById('relCompBody');
  if(!body) return;
  const tree = buildHierarchyForFlux();
  if(!tree){ body.innerHTML = `<div class="rel-empty">Pas de flux renseigné pour ce sujet.</div>`; return; }
  const node = descendHierarchy(tree);
  if(!node.children || !node.children.length){
    body.innerHTML = `<div class="rel-empty">Pas de sous-décomposition disponible à ce niveau.</div>`;
    return;
  }
  if(_relMode === 'sunburst') drawSunburst(node, body);
  else drawTreemapRel(node, body);
}

/* ─── Sunburst ───────────────────────────────────────────────── */
function drawSunburst(node, host){
  const W = 560, H = 460, cx = W/2, cy = H/2, R = Math.min(W,H)/2 - 30;
  const total = node.children.reduce((s,c)=>s+c.value, 0) || 1;
  const items = node.children;
  // angles
  let a0 = -Math.PI/2;
  const slices = [];
  for(const it of items){
    const a1 = a0 + (it.value/total) * 2*Math.PI;
    slices.push({ it, a0, a1 });
    a0 = a1;
  }
  function arc(r0, r1, A0, A1){
    const x0 = cx + Math.cos(A0)*r1, y0 = cy + Math.sin(A0)*r1;
    const x1 = cx + Math.cos(A1)*r1, y1 = cy + Math.sin(A1)*r1;
    const x2 = cx + Math.cos(A1)*r0, y2 = cy + Math.sin(A1)*r0;
    const x3 = cx + Math.cos(A0)*r0, y3 = cy + Math.sin(A0)*r0;
    const large = (A1 - A0) > Math.PI ? 1 : 0;
    return `M${x0.toFixed(1)},${y0.toFixed(1)} A${r1.toFixed(1)},${r1.toFixed(1)} 0 ${large} 1 ${x1.toFixed(1)},${y1.toFixed(1)} L${x2.toFixed(1)},${y2.toFixed(1)} A${r0.toFixed(1)},${r0.toFixed(1)} 0 ${large} 0 ${x3.toFixed(1)},${y3.toFixed(1)} Z`;
  }
  // palette catégorielle (palette terre/papier en cohérence avec l'identité)
  const palette = ['#0a6e4a','#2d8556','#4f9e6a','#6fb486','#b45309','#c2410c','#1d4ed8','#5b6b8c','#7a8b6c','#a08654','#8a6d4e','#6a5d4e'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;
  slices.forEach((s, i) => {
    const fill = palette[i % palette.length];
    const d = arc(R*0.35, R, s.a0, s.a1);
    const pct = (s.it.value/total)*100;
    const tit = `${s.it.name} · ${pct.toFixed(1)}%`;
    svg += `<path class="sb-slice" d="${d}" fill="${fill}"
              data-tt="${escAttr(s.it.name)}" data-tb="${escAttr(fmtNumber(s.it.value)+' · '+pct.toFixed(1)+'%')}"
              onmouseenter="showTip2(event,this.dataset.tt,this.dataset.tb)" onmousemove="moveTip(event)" onmouseleave="hideTip()"
              onclick="sunburstClick('${escAttr(s.it.name)}')"/>`;
    // label seulement si la tranche est assez grande
    if((s.a1 - s.a0) > 0.18){
      const am = (s.a0 + s.a1)/2;
      const lr = R*0.68;
      const lx = cx + Math.cos(am)*lr;
      const ly = cy + Math.sin(am)*lr;
      const flag = s.it.flag || '';
      const short = s.it.name.length > 14 ? s.it.name.slice(0,13)+'…' : s.it.name;
      svg += `<text class="sb-label" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle">${flag} ${short}</text>`;
      svg += `<text class="sb-label" x="${lx.toFixed(1)}" y="${(ly+12).toFixed(1)}" text-anchor="middle" style="opacity:.85;font-size:9px">${pct.toFixed(0)}%</text>`;
    }
  });
  // centre : titre + total
  const cfg = state.indicators.find(x => x.indicator === _relIndicator);
  svg += `<text class="sb-center-title" x="${cx}" y="${cy-4}">${cfg?.label || _relIndicator}</text>`;
  svg += `<text class="sb-center-total" x="${cx}" y="${cy+14}">${fmtNumber(total, cfg?.unit_display)} ${scaleSuffix(total, cfg?.unit_display)}</text>`;
  svg += `</svg>`;
  host.innerHTML = svg;
}

function sunburstClick(name){
  // descendre d'un cran si l'élément a des enfants
  const tree = buildHierarchyForFlux();
  const cur = descendHierarchy(tree);
  const child = cur.children?.find(c => c.name === name);
  if(child && child.children && child.children.length){
    _relPath = [..._relPath, name];
    renderRelComposition();
    renderRelCrumb();
  }
}

/* ─── Treemap (squarified) ───────────────────────────────────── */
function drawTreemapRel(node, host){
  const W = 700, H = 460;
  const items = node.children.slice().sort((a,b)=>b.value-a.value);
  const cells = squarifyTreemap(items, 0, 0, W, H);
  const palette = ['#0a6e4a','#2d8556','#4f9e6a','#6fb486','#b45309','#c2410c','#1d4ed8','#5b6b8c','#7a8b6c','#a08654','#8a6d4e','#6a5d4e'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;
  const total = items.reduce((s,c)=>s+c.value, 0) || 1;
  cells.forEach((c, i) => {
    const fill = palette[i % palette.length];
    const pct = (c.item.value/total)*100;
    svg += `<g class="tm-cell">
      <rect x="${c.x.toFixed(1)}" y="${c.y.toFixed(1)}" width="${c.w.toFixed(1)}" height="${c.h.toFixed(1)}" fill="${fill}"
            data-tt="${escAttr(c.item.name)}" data-tb="${escAttr(fmtNumber(c.item.value)+' · '+pct.toFixed(1)+'%')}"
            onmouseenter="showTip2(event,this.dataset.tt,this.dataset.tb)" onmousemove="moveTip(event)" onmouseleave="hideTip()"
            onclick="treemapClick('${escAttr(c.item.name)}')"/>`;
    if(c.w > 60 && c.h > 30){
      const flag = c.item.flag || '';
      const short = c.item.name.length > 18 ? c.item.name.slice(0,17)+'…' : c.item.name;
      svg += `<text class="tm-label" x="${(c.x+8).toFixed(1)}" y="${(c.y+18).toFixed(1)}" style="font-size:12px;font-weight:600">${flag} ${short}</text>`;
      svg += `<text class="tm-label-sub" x="${(c.x+8).toFixed(1)}" y="${(c.y+32).toFixed(1)}" style="font-size:10px">${pct.toFixed(0)}%</text>`;
    }
    svg += `</g>`;
  });
  svg += `</svg>`;
  host.innerHTML = svg;
}
function treemapClick(name){ sunburstClick(name); }   // même comportement

// Treemap : algorithme « slice-and-dice » avec orientation alternée.
// Simple, correct (surface = somme exacte des valeurs), suffisant pour Relations.
function squarifyTreemap(items, x, y, w, h){
  const out = [];
  function place(arr, X, Y, W, H, horiz){
    const total = arr.reduce((s,c)=>s+c.value, 0) || 1;
    let off = 0;
    for(const it of arr){
      const frac = it.value / total;
      if(horiz){
        const cw = W * frac;
        out.push({ x: X + off, y: Y, w: cw, h: H, item: it });
        off += cw;
      } else {
        const ch = H * frac;
        out.push({ x: X, y: Y + off, w: W, h: ch, item: it });
        off += ch;
      }
    }
  }
  // Heuristique : si beaucoup d'items, on coupe en 2 « bandes » pour limiter
  // les cellules très allongées. Sinon on coupe simplement le long du grand axe.
  if(items.length <= 4){
    place(items, x, y, w, h, w >= h);
  } else {
    // diviser en deux groupes équilibrés par somme
    const sorted = items.slice().sort((a,b)=>b.value-a.value);
    const total = sorted.reduce((s,c)=>s+c.value, 0);
    let acc = 0; let split = 1;
    for(let i = 0; i < sorted.length; i++){
      acc += sorted[i].value;
      if(acc >= total/2){ split = i + 1; break; }
    }
    const left = sorted.slice(0, split), right = sorted.slice(split);
    const leftSum = left.reduce((s,c)=>s+c.value,0);
    const horiz = w >= h;
    if(horiz){
      const cw = w * (leftSum / total);
      place(left, x, y, cw, h, false);
      if(right.length) place(right, x + cw, y, w - cw, h, false);
    } else {
      const ch = h * (leftSum / total);
      place(left, x, y, w, ch, true);
      if(right.length) place(right, x, y + ch, w, h - ch, true);
    }
  }
  return out;
}



/* ─── RECHERCHE SUJET (⌘K) — pays multi-cochables, zones en 1 clic ─── */
let _searchSel = 0, _searchItems = [];
let _multiPick = [];   // [{iso3, name, flag}] sélection multi en cours
let _searchMode = 'subject';   // 'subject' | 'compareB'

function openSearch(){
  _searchMode = 'subject';
  document.getElementById('searchOverlay').classList.add('open');
  _multiPick = [];
  if(state.subject && state.subject.isos.length > 1){
    _multiPick = state.subject.isos.map(iso => ({ iso3: iso, name: isoToName(iso), flag: isoToFlag(iso) }));
  }
  const inp = document.getElementById('searchInput');
  inp.value = ''; inp.focus();
  inp.placeholder = 'Rechercher un pays ou une zone…';
  onSearchInput('');
  renderTray();
}
function openSearchForB(){
  _searchMode = 'compareB';
  document.getElementById('searchOverlay').classList.add('open');
  _multiPick = [];
  if(state.compareB && state.compareB.isos.length > 1){
    _multiPick = state.compareB.isos.map(iso => ({ iso3: iso, name: isoToName(iso), flag: isoToFlag(iso) }));
  }
  const inp = document.getElementById('searchInput');
  inp.value = ''; inp.focus();
  inp.placeholder = 'Choisir un comparant…';
  onSearchInput('');
  renderTray();
}
function setCompareB(isos, label){
  state.compareB = { isos: isos.slice(), label: label || detectZoneLabel(isos) };
  renderContextBar();
  refreshActiveView();
  syncUrl();
}
function closeSearch(){ document.getElementById('searchOverlay').classList.remove('open'); }

function isPicked(iso3){ return _multiPick.some(p => p.iso3 === iso3); }

function onSearchInput(q){
  const ql = q.trim().toLowerCase();
  const res = document.getElementById('searchResults');
  _searchSel = 0;
  let items = [];

  // pays (cochables pour la multi-sélection)
  const countries = state.allCountries
    .filter(c => !ql || c.name.toLowerCase().includes(ql) || c.iso3.toLowerCase().includes(ql))
    .slice(0, 8)
    .map(c => ({ kind: 'pays', isos: [c.iso3], label: c.name, flag: c.flag, iso: c.iso3 }));
  items = items.concat(countries);

  // zones (sélection directe en un clic, non cochables)
  if(state.db){
    const r = safeExec(`SELECT DISTINCT zone_id, zone_nom FROM zones${ql ? ` WHERE LOWER(zone_nom) LIKE '%${escapeSql(ql)}%' OR LOWER(zone_id) LIKE '%${escapeSql(ql)}%'` : ''} ORDER BY zone_nom LIMIT 5`);
    if(r.length){
      for(const [zid, znom] of r[0].values){
        const zr = safeExec(`SELECT country_iso3 FROM zones WHERE zone_id='${escapeSql(zid)}'`);
        const isos = zr.length ? zr[0].values.map(v => v[0]).filter(Boolean) : [];
        if(isos.length) items.push({ kind: 'zone', isos, label: znom, flag: '⊞', iso: zid });
      }
    }
  }

  _searchItems = items;
  if(!items.length){ res.innerHTML = `<div class="search-empty">Aucun résultat</div>`; return; }

  const hasCountries = items.some(it => it.kind === 'pays');
  const hint = hasCountries
    ? `<div class="search-hint">Cocher plusieurs pays pour un bloc · cliquer une zone pour la choisir directement</div>` : '';

  res.innerHTML = hint + items.map((it, i) => {
    if(it.kind === 'pays'){
      const checked = isPicked(it.iso) ? 'checked' : '';
      return `<div class="search-item ${i===0?'sel':''} ${checked}" data-i="${i}" onclick="toggleCountry(${i})">
                <span class="chk">${isPicked(it.iso)?'✓':''}</span>
                <span class="flag">${it.flag}</span>
                <span>${it.label}</span>
                <span class="kind">${it.kind}</span>
                <span class="iso">${it.iso}</span>
              </div>`;
    }
    return `<div class="search-item ${i===0?'sel':''}" data-i="${i}" onclick="pickZone(${i})">
              <span class="chk-spacer"></span>
              <span class="flag">${it.flag}</span>
              <span>${it.label}</span>
              <span class="kind">${it.kind}</span>
              <span class="iso">${it.iso}</span>
            </div>`;
  }).join('');
}

function toggleCountry(i){
  const it = _searchItems[i]; if(!it || it.kind !== 'pays') return;
  const iso = it.iso;
  if(isPicked(iso)) _multiPick = _multiPick.filter(p => p.iso3 !== iso);
  else _multiPick.push({ iso3: iso, name: it.label, flag: it.flag });
  // rafraîchir l'état visuel de la ligne + le bandeau
  const row = document.querySelector(`.search-item[data-i="${i}"]`);
  if(row){ row.classList.toggle('checked', isPicked(iso)); row.querySelector('.chk').textContent = isPicked(iso) ? '✓' : ''; }
  renderTray();
}

function pickZone(i){
  const it = _searchItems[i]; if(!it || it.kind !== 'zone') return;
  if(_searchMode === 'compareB') setCompareB(it.isos, it.label);
  else setSubject(it.isos, it.label);
  closeSearch();
}

function renderTray(){
  const tray = document.getElementById('searchTray');
  const chips = document.getElementById('trayChips');
  const btn = document.getElementById('trayValidate');
  if(!_multiPick.length){ tray.classList.remove('show'); return; }
  tray.classList.add('show');
  chips.innerHTML = _multiPick.map(p =>
    `<span class="tray-chip"><span class="flag">${p.flag}</span>${p.name}<span class="rm" onclick="removePick('${p.iso3}')">×</span></span>`
  ).join('');
  btn.textContent = _multiPick.length === 1
    ? `Valider (1 pays)` : `Valider le bloc (${_multiPick.length} pays)`;
}
function removePick(iso){
  _multiPick = _multiPick.filter(p => p.iso3 !== iso);
  renderTray();
  // resynchroniser les coches visibles
  onSearchInput(document.getElementById('searchInput').value);
}
function validateMultiSelection(){
  if(!_multiPick.length) return;
  const isos = _multiPick.map(p => p.iso3);
  const label = detectZoneLabel(isos);
  if(_searchMode === 'compareB') setCompareB(isos, label);
  else setSubject(isos, label);
  closeSearch();
}

function onSearchKey(e){
  if(e.key === 'Escape'){ closeSearch(); return; }
  const rows = _searchItems.length;
  if(e.key === 'ArrowDown'){ e.preventDefault(); _searchSel = Math.min(_searchSel+1, rows-1); updateSearchSel(); }
  if(e.key === 'ArrowUp'){ e.preventDefault(); _searchSel = Math.max(_searchSel-1, 0); updateSearchSel(); }
  if(e.key === 'Enter'){
    e.preventDefault();
    if(_multiPick.length){ validateMultiSelection(); return; }   // Entrée valide le bloc si en cours
    const it = _searchItems[_searchSel];
    if(it){ it.kind === 'zone' ? pickZone(_searchSel) : toggleCountry(_searchSel); }
  }
}
function updateSearchSel(){
  document.querySelectorAll('.search-item').forEach(el => {
    el.classList.toggle('sel', parseInt(el.dataset.i) === _searchSel);
  });
}

/* ─── ÉTAT DANS L'URL (sérialisation) ─────────────────────────── */
function syncUrl(){
  const p = new URLSearchParams();
  if(state.subject) p.set('s', state.subject.isos.join(','));
  if(state.compareB) p.set('b', state.compareB.isos.join(','));
  p.set('y', state.year);
  p.set('tab', state.view);
  history.replaceState(null, '', '#' + p.toString());
}
function applyUrlState(){
  const h = location.hash.replace(/^#/, '');
  if(!h) return;
  const p = new URLSearchParams(h);
  if(p.get('tab')) switchViewSilent(p.get('tab'));
  if(p.get('y')){
    const y = parseInt(p.get('y'));
    if(y >= state.yearBounds.min && y <= state.yearBounds.max){
      state.year = y;
      // le slider est rendu dynamiquement par renderYearSlot() ; ne pas y toucher ici
    }
  }
  if(p.get('s')){
    const isos = p.get('s').split(',').filter(Boolean);
    if(isos.length) state.subject = { isos, label: detectZoneLabel(isos) };
  }
  if(p.get('b')){
    const isos = p.get('b').split(',').filter(Boolean);
    if(isos.length) state.compareB = { isos, label: detectZoneLabel(isos) };
  }
}
function switchViewSilent(v){
  if(!['synthese','puissance','relations'].includes(v)) return;
  state.view = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.querySelectorAll('.view').forEach(s => s.classList.toggle('active', s.id === 'view-' + v));
}

   squelette sans dépendre de la base R2. Inspiré de initWithDemoData
   de l'ancien code, réduit à l'essentiel pour l'étape 0.
─────────────────────────────────────────────────────────────── */
const DEMO_CONFIG = [
  {indicator:'population',label:'Population',table:'identite',category:'demographie',unit:'hab',unit_display:'M hab',aggregation:'sum',actif:true},
  {indicator:'pib_par_hab',label:'PIB par habitant',table:'identite',category:'economie',unit:'USD',unit_display:'USD',aggregation:'mean',actif:true},
  {indicator:'pib_usd',label:'PIB (USD courant)',table:'identite',category:'economie',unit:'USD',unit_display:'Mrd USD',aggregation:'sum',actif:true},
  {indicator:'age_median',label:'Âge médian',table:'identite',category:'demographie',unit:'ans',unit_display:'ans',aggregation:'mean',actif:true},
  {indicator:'budget_defense_pib',label:'Budget défense / PIB',table:'identite',category:'militaire',unit:'%',unit_display:'%',aggregation:'mean',actif:true},
  {indicator:'fecondite',label:'Taux de fécondité',table:'identite',category:'demographie',unit:'enf/femme',unit_display:'enf/femme',aggregation:'mean',actif:true},
  {indicator:'dette_exterieure',label:'Dette extérieure',table:'flux',category:'finance',unit:'USD',unit_display:'Mrd USD',aggregation:'sum',actif:true},
  {indicator:'import_commercial',label:'Commerce bilatéral',table:'flux',category:'commerce',unit:'USD',unit_display:'Mrd USD',aggregation:'sum',actif:true},
];

function initDemo(SQL){
  state.db = new SQL.Database();
  state.isDemo = true;
  const db = state.db;
  db.run(`CREATE TABLE identite(country_iso3 TEXT,indicator TEXT,year INTEGER,value REAL,unit TEXT,source TEXT,subcategory TEXT);
          CREATE TABLE flux(country_from TEXT,country_to TEXT,indicator TEXT,year INTEGER,value REAL,unit TEXT,source TEXT,subcategory_1 TEXT,subcategory_2 TEXT,subcategory_3 TEXT);
          CREATE TABLE zones(zone_id TEXT,zone_nom TEXT,country_iso3 TEXT,zone_type TEXT);`);

  const PAYS = ['FRA','DEU','USA','CHN','BRA','IND','RUS','GBR','ITA','ESP','JPN','CAN','AUS','ZAF','NGA'];
  const BASE = {FRA:[67.8,42330,2780],DEU:[83.2,48720,4080],USA:[333,70250,25000],CHN:[1412,12720,17900],BRA:[215,8920,1920],IND:[1420,2410,3420],RUS:[144,15270,2240],GBR:[67,45850,3100],ITA:[59,35550,2100],ESP:[47,29350,1390],JPN:[125,39280,4230],CAN:[39,54970,2140],AUS:[26,60440,1550],ZAF:[60,7050,420],NGA:[218,2080,440]};
  const stmt = db.prepare(`INSERT INTO identite VALUES (?,?,?,?,?,?,?)`);
  for(const iso of PAYS){
    const [pop,pibh,pib] = BASE[iso];
    for(let y=2000;y<=2024;y++){
      const t=y-2000, g=1+t*0.012;
      stmt.run([iso,'population',y,Math.round(pop*1e6*(1+t*0.006)),'hab','demo',null]);
      stmt.run([iso,'pib_par_hab',y,Math.round(pibh*g),'USD','demo',null]);
      stmt.run([iso,'pib_usd',y,Math.round(pib*g),'USD','demo',null]);
      stmt.run([iso,'age_median',y,30+t*0.2,'ans','demo',null]);
      stmt.run([iso,'budget_defense_pib',y,1.5+(iso==='USA'?2:0)+(iso==='RUS'?2.5:0),'%','demo',null]);
      stmt.run([iso,'fecondite',y,1.8-t*0.005,'enf/femme','demo',null]);
    }
  }
  stmt.free();

  // quelques flux de dette (avec subcategory pour préfigurer le drill-down)
  const fstmt = db.prepare(`INSERT INTO flux VALUES (?,?,?,?,?,?,?,?,?,?)`);
  const DETTE = {BRA:[['CHN',112,'Bilatéral'],['JPN',58,'Bilatéral'],['USA',42,'Bilatéral'],['__multilateral__',206,'Multilatéral'],['__private__',167,'Privé']],
                 FRA:[['USA',45,'Bilatéral'],['DEU',38,'Bilatéral'],['__private__',120,'Privé'],['__multilateral__',60,'Multilatéral']]};
  for(const [from,rows] of Object.entries(DETTE))
    for(const [to,val,sub] of rows)
      for(let y=2018;y<=2024;y++) fstmt.run([from,to,'dette_exterieure',y,val*(1+(y-2018)*0.03),'USD','demo',sub,null,null]);
  fstmt.free();

  db.run(`INSERT INTO zones VALUES ('G7','G7','USA','organisationnel'),('G7','G7','DEU','organisationnel'),('G7','G7','FRA','organisationnel'),('G7','G7','GBR','organisationnel'),('G7','G7','ITA','organisationnel'),('G7','G7','JPN','organisationnel'),('G7','G7','CAN','organisationnel'),('BRICS','BRICS','BRA','organisationnel'),('BRICS','BRICS','RUS','organisationnel'),('BRICS','BRICS','IND','organisationnel'),('BRICS','BRICS','CHN','organisationnel'),('BRICS','BRICS','ZAF','organisationnel');`);

  state.config = DEMO_CONFIG.slice();
  for(const c of state.config){ if(c.radar===undefined) c.radar=['population','pib_usd','pib_par_hab','fecondite','age_median','budget_defense_pib'].includes(c.indicator); if(c.rank_inverted===undefined) c.rank_inverted=false; }
  buildIndicatorRegistry();
  buildCountryList();
  finishBoot('Mode démo', 'demo');
}
</script>
