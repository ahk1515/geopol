<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GÉOPOL — Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ════════════════════════════════════════════════════════════════
   GÉOPOL v2 — THÈME
   Palette papier / éditoriale reprise de l'app actuelle (identité forte
   à conserver) + ajout d'une famille d'affichage (Fraunces) pour les titres.
═════════════════════════════════════════════════════════════════ */
:root {
  --bg:       #f7f5f0;
  --bg2:      #ffffff;
  --bg3:      #f0ede6;
  --bg4:      #e8e4db;
  --bg5:      #ddd9cf;
  --border:   #d8d3c8;
  --border2:  #b8b2a4;
  --text:     #1a1c22;
  --text2:    #4a4e5c;
  --text3:    #888070;
  --green:    #0a6e4a;
  --green-d:  rgba(10,110,74,.07);
  --green-b:  rgba(10,110,74,.2);
  --orange:   #b45309;
  --orange-d: rgba(180,83,9,.07);
  --orange-b: rgba(180,83,9,.2);
  --red:      #b91c1c;
  --red-d:    rgba(185,28,28,.07);
  --red-b:    rgba(185,28,28,.2);
  --blue:     #1d4ed8;
  --blue-d:   rgba(29,78,216,.07);
  --blue-b:   rgba(29,78,216,.2);
  --terra:    #c2410c;
  --terra-d:  rgba(194,65,12,.08);
  --terra-b:  rgba(194,65,12,.25);
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'IBM Plex Sans', sans-serif;
  --display:  'Fraunces', Georgia, serif;
  --shadow:   0 1px 2px rgba(26,28,34,.04), 0 4px 16px rgba(26,28,34,.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  /* texture grain très subtile pour l'atmosphère papier */
  background-image: radial-gradient(var(--bg4) 0.5px, transparent 0.5px);
  background-size: 22px 22px;
}

/* ── App shell ───────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Header ──────────────────────────────────────────────────── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
  display: flex; align-items: center; gap: 16px;
  height: 50px; flex-shrink: 0;
  position: sticky; top: 0; z-index: 50;
}
.logo {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: .22em; color: var(--green);
  display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, var(--green), #064e34);
  box-shadow: inset -2px -2px 4px rgba(0,0,0,.2);
}
.logo-sub {
  font-size: 9px; font-weight: 400; letter-spacing: .15em;
  color: var(--text3); text-transform: uppercase; font-family: var(--mono);
}

/* ── Onglets (Synthèse / Puissance / Relations) ──────────────── */
.tabs { display: flex; gap: 2px; margin-left: 8px; height: 100%; }
.tab {
  display: flex; align-items: center; padding: 0 16px;
  font-size: 12px; font-weight: 500; color: var(--text3);
  cursor: pointer; border-bottom: 2px solid transparent;
  letter-spacing: .02em; transition: color .15s, border-color .15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--sans);
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }

.header-spacer { flex: 1; }

/* ── Bouton générique header ─────────────────────────────────── */
.hbtn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px; font-size: 11px; font-family: var(--mono);
  color: var(--text2); background: var(--bg2);
  border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; transition: all .15s;
}
.hbtn:hover { border-color: var(--border2); color: var(--text); }
.hbtn .kbd {
  font-size: 9px; padding: 1px 4px; border-radius: 3px;
  background: var(--bg3); border: 1px solid var(--border);
  border-bottom-width: 2px;
}

/* ── Badge DB ────────────────────────────────────────────────── */
.db-badge {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
.dot.ok { background: var(--green); box-shadow: 0 0 0 3px var(--green-d); }
.dot.loading { background: var(--orange); animation: pulse 1.2s ease-in-out infinite; }
.dot.error { background: var(--red); }
.dot.demo { background: var(--blue); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Barre de contexte (sujet + année) ───────────────────────── */
#contextBar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 9px 18px; display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap; flex-shrink: 0;
  position: sticky; top: 50px; z-index: 40;
  box-shadow: 0 1px 0 var(--border);
}
.ctx-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
  color: var(--text3); text-transform: uppercase;
}
.subject-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 20px;
  background: var(--green-d); border: 1px solid var(--green-b);
  color: var(--green); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.subject-chip:hover { background: var(--green-b); }
.subject-chip .flag { font-size: 15px; }
.subject-chip.empty { background: var(--bg3); border-color: var(--border); color: var(--text3); font-style: italic; }
.subject-chip .x { opacity: .5; font-size: 13px; line-height: 1; }
.subject-chip .x:hover { opacity: 1; }
/* chip du comparant B (orange, distinct du sujet A vert) */
.subject-chip.b { background: var(--orange-d); border-color: var(--orange-b); color: var(--orange); }
.subject-chip.b:hover { background: var(--orange-b); }
.subject-chip.b.empty { background: var(--bg3); border: 1px dashed var(--border2); color: var(--text3); }

.ctx-sep { width: 1px; height: 18px; background: var(--border); }

/* slider année */
.year-control { display: inline-flex; align-items: center; gap: 9px; }
.year-control input[type=range] { width: 150px; accent-color: var(--green); }
.year-out {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  color: var(--text); min-width: 36px; text-align: right;
}
/* menu déroulant d'année (Puissance / Relations) */
.year-select {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  padding: 4px 26px 4px 10px; border: 1px solid var(--border);
  border-radius: 6px; background: var(--bg2) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" fill="none" stroke="%23666" stroke-width="1.5"/></svg>') no-repeat right 8px center;
  appearance: none; cursor: pointer; color: var(--text);
}
.year-select:hover { border-color: var(--border2); }
.year-select:focus { outline: none; border-color: var(--green); }

/* ── Zone principale ─────────────────────────────────────────── */
main { flex: 1; padding: 16px 18px 28px; }
.view { display: none; animation: fadeIn .25s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* placeholder d'onglet (étape 0) */
.placeholder {
  border: 1.5px dashed var(--border2); border-radius: 12px;
  padding: 60px 30px; text-align: center; color: var(--text3);
  background: var(--bg2); max-width: 760px; margin: 30px auto;
}
.placeholder h2 {
  font-family: var(--display); font-size: 26px; font-weight: 500;
  color: var(--text); margin-bottom: 10px; letter-spacing: -.01em;
}
.placeholder .tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--green);
  background: var(--green-d); padding: 4px 10px; border-radius: 20px;
  display: inline-block; margin-bottom: 18px;
}
.placeholder p { font-size: 13px; line-height: 1.7; max-width: 520px; margin: 0 auto 8px; }
.placeholder ul { text-align: left; max-width: 460px; margin: 16px auto 0; font-size: 12.5px; line-height: 1.9; }

/* ── Overlay de chargement ───────────────────────────────────── */
#loadingScreen {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 22px;
  transition: opacity .4s; 
}
#loadingScreen.hidden { opacity: 0; pointer-events: none; }
.load-logo {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  letter-spacing: .3em; color: var(--green);
}
.load-bar-wrap { width: 240px; height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.load-bar { height: 100%; width: 0%; background: var(--green); transition: width .4s ease; border-radius: 2px; }
#loadingMsg { font-family: var(--mono); font-size: 11px; color: var(--text3); }

/* ── Popover de recherche sujet (⌘K minimal pour l'étape 0) ──── */
#searchOverlay {
  position: fixed; inset: 0; z-index: 150; display: none;
  background: rgba(26,28,34,.25); backdrop-filter: blur(2px);
  align-items: flex-start; justify-content: center; padding-top: 12vh;
}
#searchOverlay.open { display: flex; }
.search-box {
  width: min(540px, 92vw); background: var(--bg2);
  border: 1px solid var(--border2); border-radius: 12px;
  box-shadow: 0 18px 50px rgba(26,28,34,.22); overflow: hidden;
}
.search-box input {
  width: 100%; padding: 16px 18px; border: none; outline: none;
  font-family: var(--sans); font-size: 16px; background: none; color: var(--text);
  border-bottom: 1px solid var(--border);
}
.search-results { max-height: 320px; overflow-y: auto; }
.search-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 18px;
  cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--bg3);
}
.search-item:hover, .search-item.sel { background: var(--green-d); }
.search-item .flag { font-size: 17px; }
.search-item .iso { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-left: auto; }
.search-item .kind { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
.search-empty { padding: 22px; text-align: center; color: var(--text3); font-size: 12px; }
/* case à cocher (pays seulement ; les zones se choisissent en 1 clic) */
.search-item .chk {
  width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
  border: 1.5px solid var(--border2); display: inline-flex;
  align-items: center; justify-content: center; font-size: 11px;
  color: #fff; background: var(--bg2); transition: all .12s;
}
.search-item.checked .chk { background: var(--green); border-color: var(--green); }
.search-item .chk-spacer { width: 16px; flex-shrink: 0; } /* alignement pour les zones */
.search-hint {
  padding: 8px 18px; font-family: var(--mono); font-size: 9px;
  letter-spacing: .06em; color: var(--text3); text-transform: uppercase;
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
/* bandeau de validation de la sélection multiple */
.search-tray {
  display: none; align-items: center; gap: 10px; padding: 11px 16px;
  border-top: 1px solid var(--border); background: var(--bg3);
}
.search-tray.show { display: flex; }
.search-tray .tray-chips { flex: 1; display: flex; flex-wrap: wrap; gap: 5px; }
.tray-chip {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px;
  background: var(--bg2); border: 1px solid var(--green-b); border-radius: 14px;
  font-size: 11px; color: var(--green);
}
.tray-chip .flag { font-size: 13px; }
.tray-chip .rm { cursor: pointer; opacity: .5; font-size: 12px; }
.tray-chip .rm:hover { opacity: 1; }
.tray-validate {
  padding: 7px 14px; background: var(--green); color: #fff; border: none;
  border-radius: 7px; font-family: var(--sans); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.tray-validate:hover { background: #064e34; }
/* ════════════════════════════════════════════════════════════════
   ONGLET SYNTHÈSE
═════════════════════════════════════════════════════════════════ */
.syn-grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 14px; align-items: start; }
@media (max-width: 920px){ .syn-grid { grid-template-columns: 1fr; } }
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  box-shadow: var(--shadow); overflow: hidden;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
}
.card-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text2); font-weight: 600;
}
.card-sub { font-size: 11px; color: var(--text3); }
.card-body { padding: 6px 16px 14px; }

/* tableau valeurs clés */
.kv-row {
  display: grid; grid-template-columns: 1.4fr auto auto 88px; gap: 12px;
  align-items: center; padding: 9px 0; border-bottom: 1px solid var(--bg3);
  cursor: pointer; transition: background .12s; margin: 0 -8px; padding-left: 8px; padding-right: 8px;
  border-radius: 6px;
}
.kv-row:last-child { border-bottom: none; }
.kv-row:hover { background: var(--green-d); }
.kv-name { font-size: 12.5px; color: var(--text); }
.kv-name .cat { font-family: var(--mono); font-size: 8.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; display: block; margin-top: 1px; }
.kv-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--green); text-align: right; }
.kv-val .u { font-size: 9px; color: var(--text3); font-weight: 400; margin-left: 3px; }
.kv-rank { font-family: var(--mono); font-size: 10.5px; color: var(--text3); text-align: right; white-space: nowrap; }
.kv-spark { height: 26px; }
.kv-spark svg { display: block; width: 100%; height: 100%; }
.kv-empty { padding: 30px; text-align: center; color: var(--text3); font-size: 12px; }

/* panorama des flux */
.flux-block { margin-bottom: 6px; }
.flux-block-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 9px 0 6px; 
}
.flux-block-head .t { font-size: 13px; font-weight: 600; color: var(--text); }
.flux-block-head .h { font-size: 10px; color: var(--text3); }
.pano-row {
  display: grid; grid-template-columns: 92px 1fr 64px 46px; gap: 9px;
  align-items: center; padding: 7px 6px; cursor: pointer; border-radius: 6px;
  border-bottom: 1px solid var(--bg3);
}
.pano-row:last-child { border-bottom: none; }
.pano-row:hover { background: var(--bg3); }
.pano-flux { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pano-partner { display: flex; align-items: center; gap: 6px; font-size: 12px; min-width: 0; }
.pano-partner .flag { font-size: 14px; flex-shrink: 0; }
.pano-partner .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pano-bar { height: 8px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.pano-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.pano-fill.clair    { opacity: .55; }
.pano-fill.moyen    { opacity: .8; }
.pano-fill.intense  { opacity: 1; }
.pano-fill.partner  { background: var(--blue); }
.pano-fill.influence{ background: var(--green); }
.pano-val { font-family: var(--mono); font-size: 11px; font-weight: 600; text-align: right; }
.pano-empty { padding: 16px 6px; color: var(--text3); font-size: 11.5px; font-style: italic; }
/* dépliage top 5 */
.pano-wrap { border-bottom: 1px solid var(--bg3); }
.pano-wrap:last-child { border-bottom: none; }
.pano-row { border-bottom: none; }
.pano-row { grid-template-columns: 86px 1fr 60px 40px 14px; }
.pano-caret { font-size: 9px; color: var(--text3); text-align: center; }
.pano-detail { display: none; padding: 4px 6px 10px 6px; }
.pano-detail.open { display: block; animation: fadeIn .2s ease; }
.pano-detail-title { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin: 4px 0 6px; }
.pano-sub { display: grid; grid-template-columns: 16px 1fr 80px 36px; gap: 8px; align-items: center; padding: 3px 0; font-size: 11.5px; }
.pano-sub .flag { font-size: 13px; }
.pano-sub .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
.pano-sub .bar { width: 80px; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; display: block; }
.pano-sub .fill { display: block; height: 100%; border-radius: 3px; min-width: 2px; }
.pano-sub .fill.partner { background: var(--blue); opacity: .7; }
.pano-sub .fill.influence { background: var(--green); opacity: .7; }
.pano-sub .v { font-family: var(--mono); font-size: 10px; text-align: right; color: var(--text2); }
.pano-detail-link { font-size: 10.5px; color: var(--green); cursor: pointer; margin-top: 8px; display: inline-block; font-weight: 500; }
.pano-detail-link:hover { text-decoration: underline; }

/* bloc ressources (Synthèse) */
.res-block { margin-top: 14px; }
.res-group { margin-bottom: 10px; }
.res-group-head { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; padding: 0 2px; }
.res-row { display: grid; grid-template-columns: 130px 1fr 50px; gap: 10px; align-items: center; padding: 5px 2px; font-size: 12px; }
.res-name { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-name .sub { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-left: 4px; }
.res-bar { height: 7px; background: var(--bg4); border-radius: 3px; overflow: hidden; position: relative; }
.res-fill { height: 100%; background: var(--green); border-radius: 3px; opacity: .8; min-width: 2px; }
.res-fill.reserves { background: var(--terra); }
.res-pct { font-family: var(--mono); font-size: 11px; font-weight: 600; text-align: right; color: var(--text); }
.res-empty { padding: 12px; text-align: center; color: var(--text3); font-size: 11.5px; font-style: italic; }
.res-empty .link-btn { background: none; border: none; color: var(--green); text-decoration: underline; cursor: pointer; font-size: inherit; font-family: inherit; padding: 0; }

/* Section commerce de ressources (resourcetrade.earth) — tableau 3 colonnes */
.res-trade { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 14px; }
.trade-year { font-family: var(--mono); color: var(--text3); font-weight: 400; font-size: 9px; }
.trade-thead {
  display: grid;
  grid-template-columns: 130px 1fr 1fr;
  gap: 10px;
  padding: 6px 2px 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.trade-th-cat { }
.trade-th {
  font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); display: flex; align-items: center; gap: 5px;
}
.trade-th-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; }
.trade-th-dot.imp { background: var(--terra); }
.trade-th-dot.exp { background: var(--green); }
.trade-row {
  display: grid;
  grid-template-columns: 130px 1fr 1fr;
  gap: 10px;
  align-items: center;
  padding: 6px 2px;
  font-size: 12px;
  border-bottom: 1px dashed transparent;
}
.trade-row:not(:last-child) { border-bottom-color: var(--border); }
.trade-row:hover { background: rgba(180,83,9,0.03); }
.trade-name { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trade-cell { display: grid; grid-template-columns: 1fr 60px; gap: 6px; align-items: center; }
.trade-cell.empty { text-align: center; color: var(--text3); font-family: var(--mono); font-size: 10px; }
.trade-cell-bar { background: #e2dcce; height: 8px; border-radius: 3px; overflow: hidden; position: relative; }
.trade-cell-fill { height: 100%; border-radius: 3px; min-width: 3px; }
.trade-cell-fill.imp { background: var(--terra); }
.trade-cell-fill.exp { background: var(--green); }
.trade-cell-val { font-family: var(--mono); font-size: 10.5px; color: var(--text); text-align: right; font-weight: 600; }

/* Modal de réglage du seuil de notabilité ressources */
.seuil-overlay {
  position: fixed; inset: 0; z-index: 160; display: none;
  background: rgba(26,28,34,.3); backdrop-filter: blur(2px);
  align-items: center; justify-content: center;
}
.seuil-overlay.open { display: flex; }
.seuil-box {
  width: min(420px, 92vw); background: var(--bg2);
  border: 1px solid var(--border2); border-radius: 14px; overflow: hidden;
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.seuil-body { padding: 16px 18px 18px; }
.seuil-help { margin: 0 0 14px; font-size: 12px; color: var(--text2); line-height: 1.5; }
.seuil-opts { display: flex; flex-direction: column; gap: 8px; }
.seuil-opt {
  display: flex; align-items: baseline; gap: 14px; padding: 12px 14px; cursor: pointer;
  border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg);
  font-family: var(--sans); font-size: 13px; text-align: left; transition: all .12s;
}
.seuil-opt:hover { border-color: var(--green); background: var(--bg3); }
.seuil-opt.on { border-color: var(--green); background: rgba(10,110,74,.08); }
.seuil-opt .v { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text); min-width: 36px; }
.seuil-opt .lbl { color: var(--text2); font-size: 12px; }
.seuil-opt.on .lbl { color: var(--green); font-weight: 600; }

/* hint sujet absent */
.need-subject {
  border: 1.5px dashed var(--border2); border-radius: 12px;
  padding: 48px 30px; text-align: center; color: var(--text3);
  background: var(--bg2); max-width: 620px; margin: 40px auto;
}
.need-subject .big { font-family: var(--display); font-size: 22px; color: var(--text); margin-bottom: 8px; }
.need-subject button {
  margin-top: 16px; padding: 9px 18px; background: var(--green); color: #fff;
  border: none; border-radius: 8px; font-family: var(--sans); font-size: 13px;
  font-weight: 600; cursor: pointer;
}

/* bouton config (engrenage) dans l'en-tête de carte */
.card-cog {
  font-size: 13px; color: var(--text3); cursor: pointer; background: none;
  border: none; padding: 2px 4px; border-radius: 5px; transition: all .12s;
}
.card-cog:hover { color: var(--text); background: var(--bg3); }

/* infobulle générique */
.tip { position: relative; }
#globalTip {
  position: fixed; z-index: 300; pointer-events: none; display: none;
  background: var(--text); color: var(--bg); font-size: 11px; line-height: 1.5;
  padding: 7px 10px; border-radius: 7px; max-width: 240px;
  box-shadow: 0 6px 20px rgba(0,0,0,.25); font-family: var(--sans);
}
#globalTip .tt { font-family: var(--mono); font-size: 9px; opacity: .65; text-transform: uppercase; letter-spacing: .06em; }
#globalTip b { color: #fff; }

/* modale de configuration des indicateurs épinglés */
#pinModal {
  position: fixed; inset: 0; z-index: 160; display: none;
  background: rgba(26,28,34,.3); backdrop-filter: blur(2px);
  align-items: center; justify-content: center;
}
#pinModal.open { display: flex; }
.pin-box {
  width: min(560px, 92vw); max-height: 80vh; background: var(--bg2);
  border: 1px solid var(--border2); border-radius: 14px; overflow: hidden;
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.pin-head {
  padding: 15px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.pin-head .t { font-family: var(--display); font-size: 17px; font-weight: 500; }
.pin-head .x { cursor: pointer; font-size: 20px; color: var(--text3); }
.pin-head .x:hover { color: var(--text); }
.pin-body { overflow-y: auto; padding: 8px 0; }
.pin-cat { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); padding: 10px 18px 4px; }
.pin-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 18px; cursor: pointer;
  font-size: 13px;
}
.pin-item:hover { background: var(--bg3); }
.pin-chk {
  width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--border2);
  display: inline-flex; align-items: center; justify-content: center; color: #fff;
  background: var(--bg2); font-size: 11px; flex-shrink: 0;
}
.pin-item.on .pin-chk { background: var(--green); border-color: var(--green); }
.pin-item .miss { font-size: 9px; color: var(--orange); font-family: var(--mono); margin-left: auto; }
.pin-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.pin-foot .count { font-size: 11px; color: var(--text3); }
.pin-foot button { padding: 8px 16px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
.pin-foot .reset { background: none; color: var(--text3); margin-right: auto; }
.pin-foot .reset:hover { color: var(--text); }
/* ════════════════════════════════════════════════════════════════
   ONGLET PUISSANCE
═════════════════════════════════════════════════════════════════ */
.pu-layout { display: grid; grid-template-columns: 230px 1fr; gap: 14px; align-items: start; }
@media (max-width: 860px){ .pu-layout { grid-template-columns: 1fr; } }

/* navigateur d'indicateurs */
.pu-nav {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden;
  position: sticky; top: 12px; max-height: calc(100vh - 24px);
  display: flex; flex-direction: column;
}
.pu-nav-search { padding: 10px; border-bottom: 1px solid var(--border); }
.pu-nav-search input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: var(--sans); font-size: 12px; background: var(--bg); outline: none; }
.pu-nav-search input:focus { border-color: var(--green); }
.pu-nav-body { flex: 1; overflow-y: auto; padding: 4px 0 8px; }
.pu-cat { }
.pu-cat-head { display: flex; align-items: center; gap: 6px; padding: 8px 12px 4px; cursor: pointer; font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
.pu-cat-head:hover { color: var(--text2); }
.pu-cat-head .caret { transition: transform .15s; font-size: 8px; }
.pu-cat.collapsed .caret { transform: rotate(-90deg); }
.pu-cat.collapsed .pu-cat-list { display: none; }
.pu-ind { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; font-size: 12.5px; color: var(--text2); border-left: 2px solid transparent; }
.pu-ind:hover { background: var(--bg3); color: var(--text); }
.pu-ind.active { background: var(--green-d); color: var(--green); border-left-color: var(--green); font-weight: 600; }
.pu-ind .radar-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; opacity: .55; }
.pu-ind .radar-dot.off { background: transparent; }

/* zone principale Puissance */
.pu-main { display: flex; flex-direction: column; gap: 14px; }
.pu-head { display: flex; align-items: baseline; gap: 12px; padding: 2px 4px; }
.pu-head .name { font-family: var(--display); font-size: 22px; font-weight: 500; letter-spacing: -.01em; }
.pu-head .meta { font-size: 11px; color: var(--text3); }
.pu-cells { display: grid; gap: 14px; grid-template-columns: 1fr; }
.pu-cells .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 920px){ .pu-cells .top-row { grid-template-columns: 1fr; } }

/* radar */
.pu-radar-wrap { display: flex; align-items: center; justify-content: center; min-height: 280px; }
.pu-radar-wrap svg { display: block; max-width: 100%; height: auto; }
.radar-axis { stroke: var(--border); stroke-width: .6; }
.radar-grid { stroke: var(--border); stroke-width: .4; fill: none; opacity: .5; }
.radar-median { stroke: var(--text3); stroke-width: 1; stroke-dasharray: 3 3; fill: none; opacity: .55; }
.radar-poly { fill: var(--green); fill-opacity: .15; stroke: var(--green); stroke-width: 1.8; }
.radar-pt { fill: var(--green); }
.radar-pt.active { fill: var(--orange); r: 4.5; stroke: #fff; stroke-width: 1.5; }
.radar-lbl { font-family: var(--sans); font-size: 10px; fill: var(--text2); }
.radar-lbl.active { fill: var(--orange); font-weight: 600; }
.radar-empty { padding: 30px; text-align: center; color: var(--text3); font-size: 12px; }
.pu-cell { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
.pu-cell-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.pu-cell-title { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text2); font-weight: 600; }
.pu-cell-body { padding: 14px 16px; }

/* cellule courbe */
.pu-curve-wrap { width: 100%; }
.pu-curve-wrap svg { display: block; width: 100%; height: 260px; }
.curve-line { fill: none; stroke: var(--green); stroke-width: 2; }
.curve-area { fill: var(--green); opacity: .07; }
.curve-dot { fill: var(--green); }
.curve-axis { stroke: var(--border); stroke-width: .5; }
.curve-grid { stroke: var(--border); stroke-width: .5; opacity: .5; stroke-dasharray: 2 3; }
.curve-lbl { font-family: var(--mono); font-size: 9px; fill: var(--text3); }
.curve-proj { stroke-dasharray: 4 3; opacity: .6; }

/* cellule carte */
#puMapContainer { position: relative; width: 100%; }
#puMap { display: block; width: 100%; height: 340px; border-radius: 8px; background: #dce8f0; }
.map-country { stroke: var(--border); stroke-width: .4px; cursor: pointer; transition: fill-opacity .15s; }
.pu-map-legend { display: flex; align-items: center; gap: 8px; padding: 10px 4px 0; font-size: 10px; color: var(--text3); }
.pu-map-legend .bar { height: 8px; width: 120px; border-radius: 3px; background: linear-gradient(to right, #e8f0e8, #9ec9a8, #4f9e6a, #0a6e4a, #064e34); }

/* Composition par sub1 (Puissance, indicateurs ressources) */
.compo-wrap { display: flex; flex-direction: column; gap: 6px; padding: 2px 0; }
.compo-row {
  display: grid;
  grid-template-columns: 180px 1fr 110px;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
}
.compo-row-compare {
  grid-template-columns: 180px 1fr;
  align-items: start;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.compo-row-compare:last-child { border-bottom: none; }
.compo-name { font-size: 12.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.compo-bars { display: flex; flex-direction: column; gap: 4px; }
.compo-bar-line {
  display: grid;
  grid-template-columns: 90px 1fr 110px;
  align-items: center;
  gap: 8px;
}
.compo-bar-key {
  font-family: var(--mono); font-size: 10px; color: var(--green);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.compo-bar-key.b { color: var(--orange); }
.compo-bar-track {
  background: var(--bg3); border-radius: 2px; height: 12px; overflow: hidden; position: relative;
}
.compo-bar-fill { height: 100%; border-radius: 2px; transition: width .25s ease; }
.compo-bar-fill.a { background: var(--green); }
.compo-bar-fill.b { background: var(--orange); }
.compo-bar-val { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); text-align: right; }
.compo-hidden {
  font-size: 10.5px; color: var(--text3); font-style: italic;
  padding: 8px 4px 2px; text-align: center;
}

/* ════════════════════════════════════════════════════════════════
   ONGLET RELATIONS
═════════════════════════════════════════════════════════════════ */
/* segmented control (réutilisé pour le sélecteur de référentiel) */
.seg { display: inline-flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; padding: 2px; gap: 2px; }
.seg button {
  font-family: var(--mono); font-size: 10.5px; padding: 5px 10px; letter-spacing: .04em;
  border: none; background: none; color: var(--text3); border-radius: 5px; cursor: pointer; transition: all .12s;
}
.seg button.on { background: var(--green); color: #fff; }
.seg button:not(.on):hover { color: var(--text); background: var(--bg3); }

/* Barre breadcrumb + sélecteur de référentiel (juste sous l'entête).
   Sticky : reste visible quand l'utilisateur scrolle dans Relations. */
.rel-crumb-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 8px 10px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  margin: 0 -10px 12px;
}
.rel-crumb { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3); flex-wrap: wrap; }
.rel-crumb .step { padding: 3px 9px; border-radius: 4px; background: var(--bg3); cursor: pointer; color: var(--text2); font-family: var(--mono); font-size: 10.5px; transition: all .1s; }
.rel-crumb .step:hover { background: var(--green-d); color: var(--green); }
.rel-crumb .step.current { background: var(--green); color: #fff; cursor: pointer; }
.rel-crumb .step.current:hover { background: var(--green); opacity: .85; }
.rel-crumb .sep { color: var(--text3); }
.rel-dim-wrap { display: flex; align-items: center; gap: 8px; }
.rel-filter-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
.rel-zone-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  max-width: 200px;
}
.rel-zone-select:hover { border-color: var(--green); }
.rel-zone-select:focus { outline: 2px solid var(--green); outline-offset: 1px; }

.rel-range-toggle {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: all .12s;
}
.rel-range-toggle:hover { border-color: var(--green); color: var(--green); }
.rel-range-clear {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 22px; height: 22px;
  padding: 0;
  font-size: 14px;
  line-height: 1;
  color: var(--text3);
  cursor: pointer;
  margin-left: 2px;
  transition: all .12s;
}
.rel-range-clear:hover { background: var(--orange-d); border-color: var(--orange); color: var(--orange); }

/* cellules treemap */
.tm-cell rect { cursor: pointer; transition: opacity .15s; }
.tm-cell rect:hover { opacity: .85; }
.tm-label { font-family: var(--sans); fill: #fff; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
.tm-label-sub { font-family: var(--mono); fill: rgba(255,255,255,.85); pointer-events: none; }

.rel-empty { padding: 50px 20px; text-align: center; color: var(--text3); font-size: 12.5px; }

/* Barres horizontales d'influence (panel gauche mode Influence) */
.inf-bars { display: flex; flex-direction: column; gap: 4px; padding: 6px 4px; max-height: 440px; overflow-y: auto; }
.inf-bars::-webkit-scrollbar { width: 8px; }
.inf-bars::-webkit-scrollbar-track { background: transparent; }
.inf-bars::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
.inf-bars::-webkit-scrollbar-thumb:hover { background: var(--text3); }
.inf-bar-row {
  display: grid;
  grid-template-columns: 160px 1fr 52px;
  align-items: center;
  gap: 10px;
  padding: 5px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: background .12s;
}
.inf-bar-row:hover { background: rgba(180, 83, 9, 0.06); }
.inf-bar-row.pinned { background: rgba(180, 83, 9, 0.14); box-shadow: inset 0 0 0 1px var(--orange); }
.inf-bar-label { display: flex; align-items: center; gap: 6px; font-size: 12px; min-width: 0; }
.inf-bar-label .flag { font-size: 14px; flex-shrink: 0; }
.inf-bar-label .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inf-bar-track { background: var(--bg2); border-radius: 2px; height: 14px; overflow: hidden; position: relative; }
.inf-bar-fill { background: var(--orange); height: 100%; border-radius: 2px; transition: width .25s ease; }
.inf-bar-row.pinned .inf-bar-fill { background: var(--green); }
.inf-bar-val { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); text-align: right; }
.inf-bars-more { font-size: 10.5px; color: var(--text3); font-style: italic; padding: 6px 8px; text-align: center; }
.inf-bars-hint { font-size: 11px; color: var(--text3); padding: 8px 4px 0; text-align: center; }
.inf-bars-hint.pinned { color: var(--green); }
.inf-bars-hint strong { color: var(--text); font-weight: 600; }

/* Courbes superposées d'influence dans le temps (panel droit mode Influence) */
.inf-tl-wrap { width: 100%; }
.inf-tl-wrap svg { display: block; width: 100%; height: 280px; }
.inf-tl-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
  padding: 10px 14px;
  background: var(--bg-card-soft);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.inf-tl-stat-k { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.inf-tl-stat-v { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--mono); }

/* Aires empilées (évolution flux) */
.rel-evo-wrap { width: 100%; }
.rel-evo-wrap svg { display: block; width: 100%; height: 280px; }
.evo-area { stroke: var(--bg2); stroke-width: .4; }
.evo-area:hover { stroke-width: 1.5; }
.evo-axis { stroke: var(--border); stroke-width: .5; }
.evo-grid { stroke: var(--border); stroke-width: .4; stroke-dasharray: 2 3; opacity: .5; }
.evo-lbl { font-family: var(--mono); font-size: 9px; fill: var(--text3); }
.evo-legend { display: flex; flex-wrap: wrap; gap: 8px 12px; padding: 8px 4px 0; max-height: 84px; overflow-y: auto; font-size: 10.5px; }
.evo-legend .leg-item { display: inline-flex; align-items: center; gap: 4px; color: var(--text2); }
.evo-legend .leg-dot { width: 9px; height: 9px; border-radius: 2px; }

/* Carte du flux */
#relMap { display: block; width: 100%; height: 320px; border-radius: 8px; background: #dce8f0; }
#relMapContainer { position: relative; width: 100%; }
.rel-map-legend { display: flex; align-items: center; gap: 8px; padding: 8px 4px 0; font-size: 10px; color: var(--text3); }
.rel-map-legend .bar { height: 8px; width: 120px; border-radius: 3px; background: linear-gradient(to right, #f5e6dc, #d4956f, #b45309, #7c2d12); }

</style>
</head>
<body>
<div id="app">

  <!-- ░░ HEADER ░░ -->
  <header>
    <div class="logo"><span class="logo-mark"></span>GÉOPOL <span class="logo-sub">atelier</span></div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="synthese">Synthèse</button>
      <button class="tab" data-view="puissance">Puissance</button>
      <button class="tab" data-view="relations">Relations</button>
    </nav>
    <div class="header-spacer"></div>
    <button class="hbtn" id="searchBtn" onclick="openSearch()"><span>⌕</span> Rechercher <span class="kbd">⌘K</span></button>
    <button class="hbtn" id="exportBtn" onclick="exportCurrentView()"><span>⬇</span> Exporter</button>
    <div class="db-badge"><span class="dot" id="dbDot"></span><span id="dbName">—</span></div>
  </header>

  <!-- ░░ BARRE DE CONTEXTE ░░ -->
  <div id="contextBar">
    <span class="ctx-label">Sujet</span>
    <div id="subjectSlot"></div>
    <div id="compareBSlotWrap" style="display:none;align-items:center;gap:12px">
      <span class="ctx-sep"></span>
      <span class="ctx-label">Comparer à</span>
      <div id="compareBSlot"></div>
    </div>
    <span class="ctx-sep"></span>
    <span class="ctx-label">Année</span>
    <div id="yearSlot"></div>
  </div>

  <!-- ░░ ZONE PRINCIPALE — 3 ONGLETS ░░ -->
  <main>
    <section class="view active" id="view-synthese">
      <div id="syntheseContent"></div>
    </section>

    <section class="view" id="view-puissance">
      <div id="puissanceContent"></div>
    </section>

    <section class="view" id="view-relations">
      <div id="relationsContent"></div>
    </section>
  </main>
</div>

<!-- ░░ OVERLAY DE CHARGEMENT ░░ -->
<div id="loadingScreen">
  <div class="load-logo">GÉOPOL</div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadPbar"></div></div>
  <div id="loadingMsg">Initialisation…</div>
</div>

<!-- ░░ OVERLAY RECHERCHE (sujet) ░░ -->
<div id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Rechercher un pays ou une zone…" oninput="onSearchInput(this.value)" onkeydown="onSearchKey(event)">
    <div class="search-results" id="searchResults"></div>
    <div class="search-tray" id="searchTray">

// Cache global de la topologie mondiale (chargée 1 fois pour toutes les cartes).
let _worldTopoCache = null;
let _worldTopoPromise = null;
async function loadWorldTopology(){
  if(_worldTopoCache) return _worldTopoCache;
  if(_worldTopoPromise) return _worldTopoPromise;
  _worldTopoPromise = d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(w => { _worldTopoCache = w; return w; })
    .catch(e => { _worldTopoPromise = null; throw e; });
  return _worldTopoPromise;
}

// Helper : code numérique du topojson → ISO3, dérivé de COUNTRY_REF (source unique).
// Pré-calculé une seule fois au chargement pour éviter une boucle à chaque pays.
const _NUM_TO_ISO3 = (() => {
  const m = {};
  for(const iso3 in COUNTRY_REF){
    const num = COUNTRY_REF[iso3].num;
    if(num) m[num] = iso3;
  }
  return m;
})();
function numToIso3(num){ return _NUM_TO_ISO3[+num] || null; }


function isoToFlag(iso3){ return COUNTRY_REF[iso3]?.flag || '🏳️'; }
function isoToName(iso3){ return COUNTRY_REF[iso3]?.name || iso3; }
function isoToContinent(iso3){ return COUNTRY_REF[iso3]?.continent || ''; }

/* ─── ÉTAT GLOBAL UNIFIÉ ──────────────────────────────────────
   Refonte : remplace selectedCountry/compareCountries/groupMode/
   groupCountries par UN sujet unifié + (Puissance) un comparé B.
   subject = { isos:[...], label } — un pays = 1 iso, une zone/multi = n isos.
─────────────────────────────────────────────────────────────── */
const state = {
  db: null,
  config: null,            // config.json brut (registre d'indicateurs)
  indicators: [],          // registre dérivé dynamiquement (config ∩ DB)
  allCountries: [],        // pays présents en DB (enrichis du référentiel)
  year: 2022,
  yearBounds: { min: 2000, max: 2024 },
  view: 'synthese',        // onglet actif
  subject: null,           // { isos:[iso3,...], label }  — null si vide
  compareB: null,          // { isos:[...], label } — exclusif à Puissance
  isDemo: false,
  // caches perf (récupérés/étendus depuis l'ancien code aux étapes suivantes)
  _rankCache: new Map(),
  _boundsCache: new Map(),
};

/* ─── HELPERS SUJET ───────────────────────────────────────────── */
function subjectIsGroup(s){ return s && s.isos && s.isos.length > 1; }
function currentIsos(){ return state.subject?.isos || []; }
// Fonction-pont : équivalent de l'ancien currentTarget() pour réutiliser
// les briques héritées (iso3 string si pays unique, sinon tableau).
function currentTarget(){
  const s = state.subject;
  if(!s || !s.isos.length) return null;
  return s.isos.length === 1 ? s.isos[0] : s.isos.slice();
}

/* ─── SQL SÛRS (repris de l'ancien) ───────────────────────────── */
function safeExec(sql){
  try { const r = state.db.exec(sql); return (r && r.length) ? r : []; }
  catch(e){ console.warn('SQL', e, sql); return []; }
}
function escapeSql(s){ return String(s).replace(/'/g,"''"); }
function sqlList(arr){ return arr.map(x => `'${escapeSql(x)}'`).join(','); }

/* ─── DÉTECTION DE ZONE (repris de l'ancien detectGroupLabel) ──── */
function detectZoneLabel(isos){
  if(!state.db || !isos.length) return isos.length===1 ? isoToName(isos[0]) : 'Sélection libre';
  if(isos.length === 1) return isoToName(isos[0]);
  try {
    const r = state.db.exec(`SELECT zone_id, zone_nom, country_iso3 FROM zones ORDER BY zone_id`);
    if(r.length && r[0].values.length){
      const byZone = new Map();
      for(const [zid, znom, ciso] of r[0].values){
        if(!byZone.has(zid)) byZone.set(zid, { nom: znom, iso: new Set() });
        byZone.get(zid).iso.add(ciso);
      }
      const wanted = new Set(isos);
      for(const { nom, iso } of byZone.values()){
        if(iso.size === wanted.size && [...wanted].every(c => iso.has(c))) return nom;
      }
    }
  } catch {}
  return 'Sélection libre';
}

/* ════════════════════════════════════════════════════════════════
   CACHE DE DONNÉES PAR SUJET (parade performance)
   Chargement paresseux : identite chargé au choix du sujet ;
   flux et stats mondiales calculés à la demande puis mémoïsés.
   Invalidation par clé = liste d'isos triée.
═════════════════════════════════════════════════════════════════ */
const cache = {
  key: null,          // signature du sujet courant ("FRA" / "DEU,FRA,ITA")
  identite: null,     // { indicator: { year: value_agrégée } }
  flux: new Map(),    // indicator -> { partner:{rows}, influence:{rows} } (à la demande)
  world: new Map(),   // "indicator|year" -> { sorted:[...], n } (stats mondiales, à la demande)
};
// Cache parallèle pour le comparant B (Puissance A vs B).
const cacheB = { key: null, identite: null, projection: null };

function subjectKey(isos){ return isos.slice().sort().join(','); }

function aggMethodFor(indicator){
  const c = (state.config || []).find(x => x.indicator === indicator);
  return (c && c.aggregation === 'sum') ? 'sum' : 'mean';
}

// (Re)charge le cache identite pour le sujet courant si nécessaire.
function ensureIdentiteCache(){
  const isos = currentIsos();
  if(!isos.length) return false;
  const key = subjectKey(isos);
  if(cache.key === key && cache.identite) return true;   // déjà en cache

  // reset cache pour ce nouveau sujet
  cache.key = key;
  cache.identite = {};        // indicator -> year -> valeur agrégée HISTORIQUE
  cache.projection = {};      // indicator -> year -> valeur agrégée PROJECTION
  cache.flux.clear();
  cache.world.clear();
  _fluxTimelineCache.clear();
  _fluxPartnerTotalsCache.clear();
  _fluxPartnerTotalsTimelineCache.clear();

  const inList = sqlList(isos);
  // récupère SUBCATEGORY pour distinguer historique (NULL) vs projection ('projection')
  const r = safeExec(`SELECT indicator, year, country_iso3, value, subcategory FROM identite WHERE country_iso3 IN (${inList})`);
  if(!r.length) return true;

  // regroupement séparé historique vs projection
  const tmpH = {}, tmpP = {};
  for(const [ind, year, iso, val, sub] of r[0].values){
    if(val == null) continue;
    const bucket = (sub === 'projection') ? tmpP : tmpH;
    (bucket[ind] ??= {});
    (bucket[ind][year] ??= []).push(val);
  }
  function aggregate(tmp, target){
    for(const ind in tmp){
      const method = aggMethodFor(ind);
      const byYear = {};
      for(const y in tmp[ind]){
        const arr = tmp[ind][y];
        if(method === 'sum') byYear[y] = arr.reduce((a,b)=>a+b, 0);
        else byYear[y] = arr.reduce((a,b)=>a+b, 0) / arr.length;
      }
      target[ind] = byYear;
    }
  }
  aggregate(tmpH, cache.identite);
  aggregate(tmpP, cache.projection);
  return true;
}

// Valeur agrégée d'un indicateur pour une année, avec repli sur la dernière
// année réellement renseignée (≠ null ET ≠ 0). Corrige les valeurs « 0 » des
// années futures non encore peuplées (ex. projection 2030).
function getIdentiteValue(indicator, year){
  ensureIdentiteCache();
  const y = year ?? state.year;
  const series = cache.identite?.[indicator];
  if(!series) return null;
  if(series[y] != null && series[y] !== 0) return series[y];
  // repli : dernière année <= y avec valeur non nulle et non zéro
  const years = Object.keys(series).map(Number).filter(yy => yy <= y && series[yy] != null && series[yy] !== 0).sort((a,b)=>b-a);
  if(years.length) return series[years[0]];
  // sinon, dernière valeur renseignée toutes années confondues
  const any = Object.keys(series).map(Number).filter(yy => series[yy] != null && series[yy] !== 0).sort((a,b)=>b-a);
  return any.length ? series[any[0]] : null;
}

// Série temporelle (valeurs non nulles/non zéro) pour courbes/sparklines.
// Renvoie [{year, value, projection}], projection=true pour les valeurs WEO futures.
function getIdentiteSeries(indicator){
  ensureIdentiteCache();
  const out = [];
  const h = cache.identite?.[indicator];
  if(h){
    for(const y of Object.keys(h).map(Number).sort((a,b)=>a-b)){
      if(h[y] != null && h[y] !== 0) out.push({ year: y, value: h[y], projection: false });
    }
  }
  const p = cache.projection?.[indicator];
  if(p){
    for(const y of Object.keys(p).map(Number).sort((a,b)=>a-b)){
      if(p[y] != null && p[y] !== 0) out.push({ year: y, value: p[y], projection: true });
    }
  }
  // tri global par année (au cas où historique et projection se chevauchent)
  return out.sort((a,b) => a.year - b.year);
}

/* ─── CACHE POUR LE COMPARANT B (Puissance A vs B) ────────────── */
function ensureIdentiteCacheB(){
  if(!state.compareB || !state.compareB.isos.length){ cacheB.key = null; cacheB.identite = null; cacheB.projection = null; return false; }
  const isos = state.compareB.isos;
  const key = subjectKey(isos);
  if(cacheB.key === key && cacheB.identite) return true;
  cacheB.key = key; cacheB.identite = {}; cacheB.projection = {};
  const inList = sqlList(isos);
  const r = safeExec(`SELECT indicator, year, country_iso3, value, subcategory FROM identite WHERE country_iso3 IN (${inList})`);
  if(!r.length) return true;
  const tmpH = {}, tmpP = {};
  for(const [ind, year, iso, val, sub] of r[0].values){
    if(val == null) continue;
    const bucket = (sub === 'projection') ? tmpP : tmpH;
    (bucket[ind] ??= {});
    (bucket[ind][year] ??= []).push(val);
  }
  function aggregate(tmp, target){
    for(const ind in tmp){
      const method = aggMethodFor(ind);
      const byYear = {};
      for(const y in tmp[ind]){
        const arr = tmp[ind][y];
        byYear[y] = (method === 'sum') ? arr.reduce((a,b)=>a+b,0) : arr.reduce((a,b)=>a+b,0) / arr.length;
      }
      target[ind] = byYear;
    }
  }
  aggregate(tmpH, cacheB.identite);
  aggregate(tmpP, cacheB.projection);
  return true;
}
function getIdentiteValueB(indicator, year){
  if(!ensureIdentiteCacheB()) return null;
  const y = year ?? state.year;
  const series = cacheB.identite?.[indicator]; if(!series) return null;
  if(series[y] != null && series[y] !== 0) return series[y];
  const ys = Object.keys(series).map(Number).filter(yy => yy <= y && series[yy] != null && series[yy] !== 0).sort((a,b)=>b-a);
  if(ys.length) return series[ys[0]];
  const any = Object.keys(series).map(Number).filter(yy => series[yy] != null && series[yy] !== 0).sort((a,b)=>b-a);
  return any.length ? series[any[0]] : null;
}
function getIdentiteSeriesB(indicator){
  if(!ensureIdentiteCacheB()) return [];
  const out = [];
  const h = cacheB.identite?.[indicator];
  if(h){
    for(const y of Object.keys(h).map(Number).sort((a,b)=>a-b)){
      if(h[y] != null && h[y] !== 0) out.push({ year: y, value: h[y], projection: false });
    }
  }
  const p = cacheB.projection?.[indicator];
  if(p){
    for(const y of Object.keys(p).map(Number).sort((a,b)=>a-b)){
      if(p[y] != null && p[y] !== 0) out.push({ year: y, value: p[y], projection: true });
    }
  }
  return out.sort((a,b) => a.year - b.year);
}

// Stats mondiales pour un indicateur/année (percentiles, rangs) — paresseux.
// Stats mondiales : pour chaque pays, on prend sa DERNIÈRE valeur non nulle/non zéro
// jusqu'à l'année demandée. Sinon des pays mal couverts à l'année exacte
// (ex. Nigeria population manquante en 2024) disparaissent et faussent l'échelle.
// On exclut les projections futures (subcategory='projection' au-delà de l'année).
function getWorldStats(indicator, year){
  const y = year ?? state.year;
  const k = indicator + '|' + y;
  if(cache.world.has(k)) return cache.world.get(k);
  // Sous-requête : par pays, la dernière année <= y où la valeur est utilisable
  // ET la subcategory n'est pas une projection future
  const sql = `
    SELECT i.country_iso3, i.value, i.year
    FROM identite i
    INNER JOIN (
      SELECT country_iso3, MAX(year) AS max_year
      FROM identite
      WHERE indicator='${escapeSql(indicator)}'
        AND year <= ${y}
        AND value IS NOT NULL AND value != 0
        AND (subcategory IS NULL OR subcategory != 'projection' OR year <= ${y})
      GROUP BY country_iso3
    ) latest ON i.country_iso3 = latest.country_iso3 AND i.year = latest.max_year
    WHERE i.indicator='${escapeSql(indicator)}'
      AND i.value IS NOT NULL AND i.value != 0
  `;
  const r = safeExec(sql);
  let pairs = [];
  if(r.length){
    // Si plusieurs lignes pour le même iso/année (historique + projection), on prend une seule (la première rencontrée)
    const seen = new Set();
    pairs = r[0].values
      .filter(([iso]) => !REGIONAL_CODES.has(iso))
      .filter(([iso]) => { if(seen.has(iso)) return false; seen.add(iso); return true; })
      .map(([iso, v, yr]) => ({ iso, v, year: yr }));
  }
  const sorted = pairs.slice().sort((a,b) => a.v - b.v);
  const stats = { sorted, n: sorted.length };
  cache.world.set(k, stats);
  return stats;
}

// Rang + percentile d'une valeur dans la distribution mondiale.
// inverted=true => "beaucoup = défavorable" (le percentile est inversé).
function rankPercentile(indicator, value, year){
  if(value == null) return null;
  const { sorted, n } = getWorldStats(indicator, year);
  if(!n) return null;
  let below = 0;
  for(const d of sorted){ if(d.v < value) below++; else break; }
  let pct = below / n;                       // 0..1 (position basse->haute)
  const cfg = (state.config || []).find(c => c.indicator === indicator);
  if(cfg && cfg.rank_inverted) pct = 1 - pct;
  const rankFromTop = n - below;             // 1 = meilleur (valeur la plus haute)
  return { percentile: pct, rank: rankFromTop, total: n };
}

// Flux d'un indicateur pour le sujet, dans un sens donné — paresseux.
// dir: 'partner' (le sujet reçoit/émet, on regarde ses partenaires)
//      'influence' (pour qui le sujet pèse).
// getFluxRows(entryOrIndicator, dir?)
// - Si on passe une entrée flux (objet avec realIndicator+side), on l'utilise directement.
// - Sinon, on garde la signature historique (indicator, dir='partner'|'influence').
function getFluxRows(entryOrIndicator, dir){
  ensureIdentiteCache();
  const isos = currentIsos();
  if(!isos.length) return [];

  // Normaliser l'appel vers { realIndicator, subjectCol, partnerCol, cacheKey }
  let realIndicator, subjectCol, partnerCol, cacheKey;
  if(typeof entryOrIndicator === 'object' && entryOrIndicator && entryOrIndicator.realIndicator){
    realIndicator = entryOrIndicator.realIndicator;
    // Pour le commerce, le sens est figé par le parser (import => sujet=to, export => sujet=from).
    if(realIndicator === 'import_commercial'){ subjectCol = 'country_to'; partnerCol = 'country_from'; }
    else if(realIndicator === 'export_commercial'){ subjectCol = 'country_from'; partnerCol = 'country_to'; }
    else {
      subjectCol = (entryOrIndicator.side === 'to') ? 'country_to' : 'country_from';
      partnerCol = (entryOrIndicator.side === 'to') ? 'country_from' : 'country_to';
    }
    cacheKey = entryOrIndicator.key;   // 'commerce|to', 'dette_exterieure|from', ...
  } else {
    // signature historique conservée
    realIndicator = entryOrIndicator;
    subjectCol = (dir === 'partner') ? 'country_to' : 'country_from';
    partnerCol = (dir === 'partner') ? 'country_from' : 'country_to';
    cacheKey = realIndicator + '|' + (dir || 'partner');
  }
  // Inclure la fenêtre temporelle dans la cacheKey pour éviter de servir une ancienne agrégation
  const tWin = (_relYearRange ? `R${_relYearRange[0]}-${_relYearRange[1]}-${_relYearAggMode}` : `Y${state.year}`);
  cacheKey = cacheKey + '|' + tWin;

  if(cache.flux.has(cacheKey)) return cache.flux.get(cacheKey);

  const inList = sqlList(isos);

  // Détermination de la fenêtre temporelle :
  //   - Si _relYearRange = [yMin, yMax] : on agrège sur la plage (somme par défaut, /N si mode avg)
  //   - Sinon (mode ponctuel) : année courante, avec fallback sur la dernière dispo
  const useRange = (_relYearRange && _relYearRange.length === 2);
  const exclAgg = [...REGIONAL_CODES].map(c => `'${c}'`).join(',');
  let rows = [];

  if(useRange){
    const [yMin, yMax] = _relYearRange;
    const r = safeExec(`SELECT ${partnerCol} AS partner, subcategory_1, subcategory_2, subcategory_3, SUM(value) AS v
                        FROM flux WHERE indicator='${escapeSql(realIndicator)}'
                        AND year >= ${yMin} AND year <= ${yMax}
                        AND ${subjectCol} IN (${inList}) AND ${partnerCol} NOT IN (${inList})
                        AND ${partnerCol} NOT IN (${exclAgg})
                        GROUP BY ${partnerCol}, subcategory_1, subcategory_2, subcategory_3`);
    if(r.length){
      const nYears = yMax - yMin + 1;
      const divider = (_relYearAggMode === 'avg' && nYears > 0) ? nYears : 1;
      rows = r[0].values.map(([p,s1,s2,s3,v]) => ({ partner:p, sub1:s1, sub2:s2, sub3:s3, value: v / divider, fluxYear:`${yMin}-${yMax}` }));
    }
  } else {
    // Mode ponctuel : année courante avec fallback sur la dernière dispo
    let y = state.year;
    const chk = safeExec(`SELECT 1 FROM flux WHERE indicator='${escapeSql(realIndicator)}' AND year=${y} AND ${subjectCol} IN (${inList}) LIMIT 1`);
    if(!chk.length){
      const ly = safeExec(`SELECT MAX(year) FROM flux WHERE indicator='${escapeSql(realIndicator)}' AND ${subjectCol} IN (${inList})`);
      if(ly.length && ly[0].values[0][0] != null) y = ly[0].values[0][0];
    }
    const r = safeExec(`SELECT ${partnerCol} AS partner, subcategory_1, subcategory_2, subcategory_3, SUM(value) AS v
                        FROM flux WHERE indicator='${escapeSql(realIndicator)}' AND year=${y}
                        AND ${subjectCol} IN (${inList}) AND ${partnerCol} NOT IN (${inList})
                        AND ${partnerCol} NOT IN (${exclAgg})
                        GROUP BY ${partnerCol}, subcategory_1, subcategory_2, subcategory_3`);
    if(r.length) rows = r[0].values.map(([p,s1,s2,s3,v]) => ({ partner:p, sub1:s1, sub2:s2, sub3:s3, value:v, fluxYear:y }));
  }
  cache.flux.set(cacheKey, rows);
  return rows;
}

// Toutes les années pour un flux donné (pour les aires empilées).
// Retourne [{year, partner, sub1, sub2, sub3, value}] — agrégé sur le sujet.
const _fluxTimelineCache = new Map();
function getFluxRowsTimeline(entry){
  ensureIdentiteCache();
  const isos = currentIsos();
  if(!isos.length) return [];
  const key = entry.key + '|TL|' + subjectKey(isos);
  if(_fluxTimelineCache.has(key)) return _fluxTimelineCache.get(key);

  let realIndicator, subjectCol, partnerCol;
  realIndicator = entry.realIndicator;
  if(realIndicator === 'import_commercial'){ subjectCol = 'country_to'; partnerCol = 'country_from'; }
  else if(realIndicator === 'export_commercial'){ subjectCol = 'country_from'; partnerCol = 'country_to'; }
  else {
    subjectCol = (entry.side === 'to') ? 'country_to' : 'country_from';
    partnerCol = (entry.side === 'to') ? 'country_from' : 'country_to';
  }
  const inList = sqlList(isos);
  const exclAgg = [...REGIONAL_CODES].map(c => `'${c}'`).join(',');
  const r = safeExec(`SELECT year, ${partnerCol} AS partner, subcategory_1, subcategory_2, subcategory_3, SUM(value) AS v
                      FROM flux WHERE indicator='${escapeSql(realIndicator)}'
                      AND ${subjectCol} IN (${inList}) AND ${partnerCol} NOT IN (${inList})
                      AND ${partnerCol} NOT IN (${exclAgg})
                      GROUP BY year, ${partnerCol}, subcategory_1, subcategory_2, subcategory_3
                      ORDER BY year`);
  const rows = r.length ? r[0].values.map(([y,p,s1,s2,s3,v]) => ({ year:y, partner:p, sub1:s1, sub2:s2, sub3:s3, value:v })) : [];
  _fluxTimelineCache.set(key, rows);
  return rows;
}

// Pour la carte mondiale d'un flux : valeur agrégée par pays partenaire sur l'année courante.
// Pour chaque partenaire du sujet, son TOTAL MONDIAL sur ce flux à l'année courante.
// Utile pour la colonne « Pour qui le sujet pèse » (Synthèse colonne 2) et Relations sens influence.
// Le partenaire envoie/reçoit du flux à de nombreux pays — on somme sur tous SAUF le sujet.
// Renvoie { ISO3: total_monde, ... }
const _fluxPartnerTotalsCache = new Map();
function getFluxPartnerWorldTotals(entry){
  ensureIdentiteCache();
  const isos = currentIsos();
  if(!isos.length) return {};
  // sens "influence" : on regarde le total mondial du partenaire dans la direction inverse du sens du sujet
  // ex. transferts_armement|to : sujet=country_to, partenaire=country_from (exportateurs)
  // Pour avoir le poids du sujet chez chaque exportateur, on compare le volume sujet/partner
  // au volume total exporté par ce partenaire (somme sur tous les destinataires hors sujet)
  // → on regarde où ce partenaire apparaît comme country_from dans CETTE direction
  let realIndicator, partnerCol, otherCol;
  realIndicator = entry.realIndicator;
  if(realIndicator === 'import_commercial'){ partnerCol = 'country_from'; otherCol = 'country_to'; }
  else if(realIndicator === 'export_commercial'){ partnerCol = 'country_to'; otherCol = 'country_from'; }
  else {
    partnerCol = (entry.side === 'to') ? 'country_from' : 'country_to';
    otherCol = (entry.side === 'to') ? 'country_to' : 'country_from';
  }
  // Fenêtre temporelle alignée avec getFluxRows : plage si _relYearRange, sinon année courante (avec fallback)
  const useRange = (_relYearRange && _relYearRange.length === 2);
  const inList = sqlList(isos);
  const exclAgg = [...REGIONAL_CODES].map(c => `'${c}'`).join(',');
  let yClause, cacheKey;
  if(useRange){
    const [yMin, yMax] = _relYearRange;
    yClause = `year >= ${yMin} AND year <= ${yMax}`;
    cacheKey = entry.key + '|PWT|' + subjectKey(isos) + '|R' + yMin + '-' + yMax + '-' + _relYearAggMode;
  } else {
    let y = state.year;
    const chk = safeExec(`SELECT 1 FROM flux WHERE indicator='${escapeSql(realIndicator)}' AND year=${y} AND ${otherCol} IN (${inList}) LIMIT 1`);
    if(!chk.length){
      const ly = safeExec(`SELECT MAX(year) FROM flux WHERE indicator='${escapeSql(realIndicator)}' AND ${otherCol} IN (${inList})`);
      if(ly.length && ly[0].values[0][0] != null) y = ly[0].values[0][0];
    }
    yClause = `year = ${y}`;
    cacheKey = entry.key + '|PWT|' + subjectKey(isos) + '|Y' + y;
  }
  if(_fluxPartnerTotalsCache.has(cacheKey)) return _fluxPartnerTotalsCache.get(cacheKey);

  // Pour chaque partenaire, somme sur TOUS ses partenaires (autres pays récipiendaires hors agrégats régionaux et sentinelles).
  // On exclut volontairement les sentinelles __ et les zones agrégées du dénominateur, sinon le total est gonflé.
  const r = safeExec(`SELECT ${partnerCol} AS partner, SUM(value) AS total
                      FROM flux WHERE indicator='${escapeSql(realIndicator)}' AND ${yClause}
                      AND ${partnerCol} NOT IN (${exclAgg})
                      AND ${partnerCol} NOT LIKE '\\_\\_%' ESCAPE '\\'
                      AND ${otherCol} NOT IN (${exclAgg})
                      AND ${otherCol} NOT LIKE '\\_\\_%' ESCAPE '\\'
                      GROUP BY ${partnerCol}`);
  const out = {};
  if(r.length){
    const nYears = useRange ? (_relYearRange[1] - _relYearRange[0] + 1) : 1;
    const divider = (useRange && _relYearAggMode === 'avg' && nYears > 0) ? nYears : 1;
    for(const [p, t] of r[0].values){ out[p] = (t || 0) / divider; }
  }
  _fluxPartnerTotalsCache.set(cacheKey, out);
  return out;
}

// Variante temporelle : total mondial PAR partenaire ET PAR ANNÉE (sur toutes les années dispo).
// Permet de tracer l'influence du sujet chez un partenaire au fil des ans (influence = volume_sujet/total_partenaire).
// Cache séparé du non-timeline parce que la requête est différente (groupé par année aussi).
const _fluxPartnerTotalsTimelineCache = new Map();
function getFluxPartnerWorldTotalsTimeline(entry){
  ensureIdentiteCache();
  const isos = currentIsos();
  if(!isos.length) return {};
  let realIndicator = entry.realIndicator;
  let partnerCol, otherCol;
  if(realIndicator === 'import_commercial'){ partnerCol = 'country_from'; otherCol = 'country_to'; }
  else if(realIndicator === 'export_commercial'){ partnerCol = 'country_to'; otherCol = 'country_from'; }
  else {
    partnerCol = (entry.side === 'to') ? 'country_from' : 'country_to';
    otherCol = (entry.side === 'to') ? 'country_to' : 'country_from';
  }
  const cacheKey = entry.key + '|PWT-TL|' + subjectKey(isos);
  if(_fluxPartnerTotalsTimelineCache.has(cacheKey)) return _fluxPartnerTotalsTimelineCache.get(cacheKey);

  const exclAgg = [...REGIONAL_CODES].map(c => `'${c}'`).join(',');
  // Total mondial par partenaire et par année, hors agrégats régionaux et sentinelles
  const r = safeExec(`SELECT year, ${partnerCol} AS partner, SUM(value) AS total
                      FROM flux WHERE indicator='${escapeSql(realIndicator)}'
                      AND ${partnerCol} NOT IN (${exclAgg})
                      AND ${partnerCol} NOT LIKE '\\_\\_%' ESCAPE '\\'
                      AND ${otherCol} NOT IN (${exclAgg})
                      AND ${otherCol} NOT LIKE '\\_\\_%' ESCAPE '\\'
                      GROUP BY year, ${partnerCol}`);
  // Indexation { partner: { year: total } }
  const out = {};
  if(r.length){
    for(const [y, p, t] of r[0].values){
      if(!out[p]) out[p] = {};
      out[p][y] = t || 0;
    }
  }
  _fluxPartnerTotalsTimelineCache.set(cacheKey, out);
  return out;
}

function getFluxWorldMap(entry){
  const rows = getFluxRows(entry);
  if(!rows.length) return {};
  let filtered = rows;
  if(isDebtIndicator(entry.indicator)){
    const bil = filtered.filter(r => isBilateral(r));
    if(bil.length) filtered = bil;
  }
  filtered = filtered.filter(r => r.partner && !r.partner.startsWith('__') && !REGIONAL_CODES.has(r.partner));
  // applique le drill cumulé (filtre partagé avec treemap et aires)
  filtered = applyDrillFilter(filtered);
  const out = {};
  for(const r of filtered){
    out[r.partner] = (out[r.partner] || 0) + (r.value || 0);
  }
  return out;
}

// Invalide le cache quand l'année change (les valeurs annuelles dépendent de l'année).
function invalidateYearScoped(){ cache.flux.clear(); cache.world.clear(); _fluxTimelineCache.clear(); _fluxPartnerTotalsCache.clear(); _fluxPartnerTotalsTimelineCache.clear(); }

  let SQL;
  try {
    SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
  } catch(e){ setLoadingMsg('Erreur WebAssembly : ' + e.message, 0); return; }

  setLoadingMsg('Chargement de la base…', 35);
  let buf;
  try {
    const res = await fetch('https://pub-710d496c94c74cb3837b8229bc8f4410.r2.dev/geopolitique.db?v=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    buf = await res.arrayBuffer();
  } catch(e){
    setLoadingMsg('Base distante indisponible — mode démo', 60);
    await sleep(350);
    initDemo(SQL);
    return;
  }
  setLoadingMsg('Ouverture de la base…', 70);
  state.db = new SQL.Database(new Uint8Array(buf));
  setLoadingMsg('Chargement de la configuration…', 85);
  await loadConfig();
  finishBoot('Base distante', 'ok');
}

/* ─── CONFIG + REGISTRE D'INDICATEURS DYNAMIQUE ────────────────
   Principe « UI pilotée par les données » : la liste d'indicateurs
   n'est jamais câblée en dur. On lit config.json (actif:true), on
   croise avec les indicateurs réellement présents en DB, et on
   enrichit des champs radar / rank_inverted (backfill si absents).
─────────────────────────────────────────────────────────────── */
async function loadConfig(){
  try {
    const r = await fetch('./config.json?v=' + Date.now());
    if(!r.ok) throw new Error();
    state.config = await r.json();
  } catch { state.config = DEMO_CONFIG.slice(); }

  // Backfill des champs de présentation s'ils manquent dans config.json
  const RADAR_DEFAULTS = new Set(['population','pib_usd','pib_par_hab','fecondite','age_median','budget_defense_pib']);
  const INVERTED_DEFAULTS = new Set(['violent_death','idps_securitaire','idps_climatique','taux_chomage','inflation','dette_pct_pib','dette_publique_pib']);
  for(const c of (state.config || [])){
    if(c.radar === undefined) c.radar = RADAR_DEFAULTS.has(c.indicator);
    if(c.rank_inverted === undefined) c.rank_inverted = INVERTED_DEFAULTS.has(c.indicator);
  }
  buildIndicatorRegistry();
  buildCountryList();
}

// Croise config.json (actif) avec les indicateurs présents en DB.
function buildIndicatorRegistry(){
  const present = new Set();
  for(const tbl of ['identite','flux']){
    const r = safeExec(`SELECT DISTINCT indicator FROM ${tbl}`);
    if(r.length) for(const [ind] of r[0].values) present.add(ind);
  }
  // Registre principal (identite + flux bruts), dédupliqué.
  const seen = new Set();
  state.indicators = (state.config || [])
    .filter(c => c.actif !== false)
    .filter(c => { const k = (c.table||'')+'|'+c.indicator; if(seen.has(k)) return false; seen.add(k); return true; })
    .map(c => ({ ...c, presentInDb: present.has(c.indicator) }));
  const missing = state.indicators.filter(c => !c.presentInDb).map(c => c.indicator);
  if(missing.length) console.info('Indicateurs config sans données DB :', missing);

  // ── Registre des ENTRÉES de flux (indicateur + sens) ──
  // Chaque entrée est { key, indicator, side, label, label_long, realIndicator, presentInDb }
  // - les alias (export_armement → transferts_armement) sont absorbés
  // - import_commercial + export_commercial fusionnent en 'commerce' bidirectionnel
  state.flowEntries = [];
  const seenFlow = new Set();
  const declaredFlows = state.indicators.filter(c => c.table === 'flux');

  // 1) Indicateurs déclarés en config — on génère leurs entrées selon FLOW_DIRECTIONS
  for(const c of declaredFlows){
    let canonical = FLOW_INDICATOR_ALIASES[c.indicator] || c.indicator;
    // import_commercial / export_commercial → tous deux mappés vers 'commerce'
    if(canonical === 'import_commercial' || canonical === 'export_commercial') canonical = 'commerce';
    if(seenFlow.has(canonical)) continue;
    seenFlow.add(canonical);

    const dirs = FLOW_DIRECTIONS[canonical];
    const baseLabel = (canonical === 'commerce') ? 'Commerce' : (c.label || canonical);

    if(!dirs){
      // pas de métadonnée → entrée unique (sens 'to' par défaut)
      state.flowEntries.push({
        key: canonical + '|to', indicator: canonical, realIndicator: canonical, side: 'to',
        label: baseLabel, label_long: baseLabel, category: c.category, unit_display: c.unit_display,
        presentInDb: present.has(canonical)
      });
      continue;
    }
    for(const side of ['to','from']){
      const d = dirs[side];
      if(!d) continue;
      const real = d.realIndicator || canonical;
      state.flowEntries.push({
        key: canonical + '|' + side,
        indicator: canonical,
        realIndicator: real,
        side,
        label: d.label,
        label_long: `${baseLabel} — ${d.label}`,
        category: c.category,
        unit_display: c.unit_display,
        presentInDb: present.has(real)
      });
    }
  }
}

// Année « présent » max : on ne démarre jamais sur une projection future.
const CURRENT_YEAR = new Date().getFullYear();

function finishBoot(dbName, badge){
  // Bornes d'années réelles depuis la DB
  const r = safeExec(`SELECT MIN(year), MAX(year) FROM identite`);
  if(r.length && r[0].values.length){
    const [mn, mx] = r[0].values[0];
    if(mn && mx){
      state.yearBounds = { min: mn, max: mx };   // bornes complètes (projections incluses) pour le curseur
      // année par défaut = dernière année réelle, jamais une projection future
      state.year = Math.min(mx, CURRENT_YEAR);
    }
  }
  setDbBadge(dbName, badge);
  setLoadingMsg('Prêt', 100);
  applyUrlState();        // restaure l'état depuis l'URL si présent
  renderContextBar();
  refreshActiveView();    // rend l'onglet actif (Synthèse par défaut)
  setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 250);
}

// Dernière année où le sujet a des données identité, hors projections futures.
function latestYearWithData(){
  ensureIdentiteCache();
  let best = null;
  for(const ind in (cache.identite || {})){
    for(const y in cache.identite[ind]){
      const yy = +y;
      if(yy > CURRENT_YEAR) continue;            // ignore les projections futures
      const v = cache.identite[ind][y];
      if(v != null && v !== 0){ if(best == null || yy > best) best = yy; }
    }
  }
  return best || Math.min(state.yearBounds.max, CURRENT_YEAR);
}

/* ════════════════════════════════════════════════════════════════
   FORMATAGE & SPARKLINES (utilitaires partagés)
═════════════════════════════════════════════════════════════════ */
function fmtNumber(v, unit){
  if(v == null || isNaN(v)) return '—';
  const abs = Math.abs(v);
  let s;
  // mise à l'échelle lisible — applicable indépendamment de l'unité
  // (l'unité est purement décorative, scaleSuffix s'en charge)
  if(abs >= 1e12) s = (v/1e12).toLocaleString('fr-FR',{maximumFractionDigits:1});
  else if(abs >= 1e9) s = (v/1e9).toLocaleString('fr-FR',{maximumFractionDigits:1});
  else if(abs >= 1e6) s = (v/1e6).toLocaleString('fr-FR',{maximumFractionDigits:1});
  else if(abs >= 1000) s = Math.round(v).toLocaleString('fr-FR');
  else if(abs >= 1) s = v.toLocaleString('fr-FR',{maximumFractionDigits:1});
  else s = v.toLocaleString('fr-FR',{maximumFractionDigits:2});
  return s;
}
function scaleSuffix(v, unitDisplay){
  // ajuste le suffixe selon l'échelle appliquée par fmtNumber
  // Le suffixe combine l'échelle (T/Mrd/M) et l'unité de base (hab, USD, etc.).
  // unitDisplay est traité comme l'unité de base : on retire toute échelle déjà préfixée.
  const abs = Math.abs(v || 0);
  const baseUnit = (unitDisplay || '').replace(/^(T|Mrd|M)\s+/, '');   // retire l'échelle éventuelle
  let prefix = '';
  if(abs >= 1e12) prefix = 'T';
  else if(abs >= 1e9) prefix = 'Mrd';
  else if(abs >= 1e6) prefix = 'M';
  if(prefix){
    return baseUnit ? (prefix + ' ' + baseUnit) : prefix;
  }
  return baseUnit;
}
function ordinalFr(n){ return n === 1 ? '1er' : n + 'e'; }

// Helper : formate valeur + suffixe d'échelle en une seule chaîne.
// Garantit qu'on n'oublie jamais le suffixe (ex. « 5,4 M hab » au lieu de « 5,4 »).
function fmtWithUnit(v, unit){
  if(v == null || isNaN(v)) return '—';
  const num = fmtNumber(v, unit);
  const suf = scaleSuffix(v, unit);
  return suf ? (num + ' ' + suf) : num;
}

function getIndicatorSource(indicator, year){
  // source la plus récente connue pour cet indicateur (sur le 1er pays du sujet)
  const isos = currentIsos(); if(!isos.length) return null;
  const r = safeExec(`SELECT source FROM identite WHERE indicator='${escapeSql(indicator)}' AND country_iso3='${escapeSql(isos[0])}' AND source IS NOT NULL AND source!='' ORDER BY year DESC LIMIT 1`);
  return r.length && r[0].values.length ? r[0].values[0][0] : null;
}
function getValueYear(indicator, year){
  const series = cache.identite?.[indicator]; if(!series) return null;
  if(series[year] != null && series[year] !== 0) return year;
  const ys = Object.keys(series).map(Number).filter(y => y <= year && series[y] != null && series[y] !== 0).sort((a,b)=>b-a);
  if(ys.length) return ys[0];
  const any = Object.keys(series).map(Number).filter(y => series[y] != null && series[y] !== 0).sort((a,b)=>b-a);
  return any.length ? any[0] : null;
}

// Sparkline SVG (forme de la série, sans axes).
function sparklineSvg(series, color){
  if(!series || series.length < 2) return '';
  const W = 88, H = 26, pad = 2;
  const vals = series.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const n = series.length;
  const pts = series.map((d,i) => {
    const x = pad + (i/(n-1)) * (W - 2*pad);
    const y = H - pad - ((d.value - min)/range) * (H - 2*pad);
    return [x, y];
  });
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = path + ` L${W-pad},${H} L${pad},${H} Z`;
  const last = pts[pts.length-1];
  const c = color || 'var(--green)';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${area}" fill="${c}" opacity="0.1"/>
    <path d="${path}" fill="none" stroke="${c}" stroke-width="1.3"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="1.8" fill="${c}"/>
  </svg>`;
}

const PIN_KEY = 'geopol_pins_synthese';
const PIN_RADAR_KEY = 'geopol_pins_radar';
const PIN_FLUX_PARTNER_KEY = 'geopol_pins_flux_partner_v3';   // bump : structure validée, reset défauts
const PIN_FLUX_INFLUENCE_KEY = 'geopol_pins_flux_influence_v3';
function loadPins(key){
  try { const j = localStorage.getItem(key); if(j) return new Set(JSON.parse(j)); } catch {}
  return null;
}
function savePins(key, set){
  try { localStorage.setItem(key, JSON.stringify([...set])); } catch {}
}

function pinnedIdentiteIndicators(){
  const ident = state.indicators.filter(c => c.table === 'identite' && c.presentInDb !== false);
  const perso = loadPins(PIN_KEY);

    return ident.filter(c => perso.has(c.indicator)).slice(0, 14);
  }
  const def = ident.filter(c => c.epingle_synthese || c.radar);
  return (def.length ? def : ident.slice(0, 10)).slice(0, 12);

// Indicateurs du radar Puissance (choix indépendant de la Synthèse).
function pinnedRadarIndicators(){
  const ident = state.indicators.filter(c => c.table === 'identite' && c.presentInDb !== false);
  const perso = loadPins(PIN_RADAR_KEY);
  if(perso && perso.size){
    return ident.filter(c => perso.has(c.indicator)).slice(0, 12);
  }
  // défaut : champ radar du config sinon 6 premiers
  const def = ident.filter(c => c.radar);
  return (def.length ? def : ident.slice(0, 6)).slice(0, 8);
