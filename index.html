          <div class="pu-cell-head"><span class="pu-cell-title">Composition · ${dimLabelOf(_relDim, dims)}</span><span class="meta" style="font-size:10px;color:var(--text3)">${metricLabel} · ${periodSuffix}</span></div>
          <div class="pu-cell-body" id="relCompBody" style="min-height:340px"></div>
        </div>
        <div class="pu-cell">
          <div class="pu-cell-head"><span class="pu-cell-title">Évolution · aires empilées</span><span class="meta" style="font-size:10px;color:var(--text3)">${metricLabel}${_relYearRange ? ' · zoom '+_relYearRange[0]+'-'+_relYearRange[1] : ''}</span></div>
          <div class="pu-cell-body" id="relEvoBody" style="min-height:340px"></div>
        </div>
      </div>
      <div class="pu-cell">
        <div class="pu-cell-head"><span class="pu-cell-title">Carte du flux</span><span class="meta" style="font-size:10px;color:var(--text3)">${mapSubtitle} · ${periodSuffix}</span></div>
        <div class="pu-cell-body">
          <div id="relMapContainer"><svg id="relMap"></svg></div>
          <div class="rel-map-legend"><span>${legendLeft}</span><span class="bar"></span><span>${legendRight}</span></div>
        </div>
      </div>
    </div>`;
  renderRelComposition();
  renderRelEvolution();
  renderRelFluxMap();
}
function setRelMetric(m){ _relMetric = m; _relInfluencePinned = null; renderRelMain(); syncUrl(); }
function dimLabelOf(key, dims){ return (dims.find(d => d.key === key) || { label: 'Partenaire' }).label; }


/* ─── Composition : agrégation hiérarchique ─────────────────────
   Niveau 0 = subcategory_1 (partenaire bilatéral pour pays, ou catégorie)
   Niveau 1 = subcategory_2
   Niveau 2 = subcategory_3
   Pour la dette : niveau 0 affiche les pays créanciers (subcategory_1='bilaterale'
   ne sert qu'à filtrer, on agrège par partenaire). Sinon, par subcategory.
─────────────────────────────────────────────────────────────── */
/* ─── Composition : hiérarchie complète (subcat1 → subcat2 → subcat3 → partenaire) ─────────
   Le sunburst affiche TOUS les niveaux d'emblée en anneaux concentriques.
   Le treemap utilise les mêmes données mais à plat (ou drillable).
   Filtres : agrégats régionaux exclus, dette bilatérale uniquement, sentinelles __ écartées.
─────────────────────────────────────────────────────────────────────────────── */
/* Agrégation pour les vues treemap + aires.
   Renvoie un nœud { value, children: [...] } où chaque enfant est un bucket
   de la dimension active (partenaire OU subcategory). Le drill cumulé
   _relPath sert de filtre AVANT agrégation. */
function buildFluxAggregation(){
  const entry = getFlowEntryByKey(_relEntryKey);
  if(!entry) return null;
  let rows = getFluxRows(entry);
  if(!rows.length) return null;
  // dette : bilatéral uniquement
  if(isDebtIndicator(entry.indicator)){
    const bil = rows.filter(r => isBilateral(r));
    if(bil.length) rows = bil;
  }
  // exclure agrégats Banque Mondiale + sentinelles
  rows = rows.filter(r => r.partner && !r.partner.startsWith('__') && !REGIONAL_CODES.has(r.partner));
  // filtre cumulé issu du drill (_relPath)
  rows = applyDrillFilter(rows);
  // filtre zone active (si zone choisie, ne garder que les partenaires inclus)
  rows = filterByZoneFilter(rows);
  if(!rows.length) return { value: 0, children: [], dim: _relDim, metric: _relMetric };

  // Bucket selon la dimension active
  const dim = _relDim;
  function bucketKey(r){
    if(dim === 'partner') return r.partner;
    const v = r[dim];
    return v && String(v).trim() !== '' ? String(v) : '(non précisé)';
  }
  function bucketMeta(key){
    if(dim === 'partner'){
      return { name: partnerLabel(key), code: key, flag: partnerFlag(key), isPartner: true, key };
    }
    return { name: key, isPartner: false, key };
  }

  // Première agrégation par bucket : volume du sujet
  const map = new Map();
  let totalVolume = 0;
  for(const r of rows){
    const v = r.value || 0;
    if(v <= 0) continue;
    const k = bucketKey(r);
    if(!map.has(k)) map.set(k, { ...bucketMeta(k), volume: 0 });
    map.get(k).volume += v;
    totalVolume += v;
  }

  // En mode 'influence' avec dim=partner, on remplace la valeur par le poids relatif du sujet
  // chez chaque partenaire = volume_sujet / volume_mondial_du_partenaire (en %).
  const isInfluence = (_relMetric === 'influence' && dim === 'partner');
  let children;
  if(isInfluence){
    const worldTotals = getFluxPartnerWorldTotals(entry);
    const enriched = [];
    for(const node of map.values()){
      const wt = worldTotals[node.key] || 0;
      if(wt <= 0) continue;   // pas de données mondiales → on ne peut pas calculer l'influence
      const pct = (node.volume / wt) * 100;
      // value = pct (sert au treemap et aux infobulles) ; on garde volume pour l'info brut
      enriched.push({ ...node, value: pct, volume: node.volume, worldTotal: wt });
    }
    children = enriched.sort((a,b) => b.value - a.value);
    return { value: 100, children, dim, metric: 'influence' };  // value=100 sans signification physique
  } else {
    // mode volume classique : la valeur affichée EST le volume
    for(const node of map.values()){ node.value = node.volume; }
    children = [...map.values()].sort((a,b) => b.value - a.value);
    return { value: totalVolume, children, dim, metric: 'volume' };
  }
}

// Pour le treemap (drill-down classique), on descend dans l'arbre.
function renderRelComposition(){
  const body = document.getElementById('relCompBody');
  if(!body) return;
  const agg = buildFluxAggregation();
  if(!agg || !agg.children.length){
    body.innerHTML = `<div class="rel-empty">Pas de flux pour ce filtre.</div>`;
    return;
  }
  // Mode Influence + dim=partner : barres horizontales avec sélection
  // Mode Volume ou dim ≠ partner : treemap classique
  if(agg.metric === 'influence'){
    drawInfluenceBars(agg, body);
  } else {
    drawTreemapRel(agg, body);
  }
}

/* ─── Barres horizontales d'influence (mode Influence) ─────────
   Une barre par partenaire, longueur = % d'influence chez ce partenaire.
   Tri décroissant. Clic = épingle le pays pour zoom dans le panel droit. */
function drawInfluenceBars(node, host){
  const items = node.children.slice().sort((a,b)=>b.value-a.value);
  // On limite à 20 barres pour rester lisible. Au-delà, indication discrète.
  const MAX_BARS = 20;
  const visible = items.slice(0, MAX_BARS);
  const remaining = items.length - visible.length;
  const maxPct = visible[0].value || 1;
  const entry = getFlowEntryByKey(_relEntryKey);
  const cfg = state.indicators.find(c => c.indicator === entry?.realIndicator) || entry;

  let html = `<div class="inf-bars">`;
  for(const it of visible){
    const w = Math.max(2, (it.value / maxPct) * 100);
    const isPinned = (_relInfluencePinned === it.key);
    const volumeStr = fmtWithUnit(it.volume, cfg?.unit_display);
    html += `
      <div class="inf-bar-row ${isPinned ? 'pinned' : ''}"
           onclick="toggleInfluencePinned('${escAttr(it.key)}')"
           title="${escAttr((it.flag?it.flag+' ':'')+it.name + ' — ' + volumeStr)}">
        <div class="inf-bar-label">
          <span class="flag">${it.flag || ''}</span>
          <span class="nm">${it.name}</span>
        </div>
        <div class="inf-bar-track">
          <div class="inf-bar-fill" style="width:${w.toFixed(1)}%"></div>
        </div>
        <div class="inf-bar-val">${it.value.toFixed(1)}%</div>
      </div>`;
  }
  html += `</div>`;
  if(remaining > 0){
    html += `<div class="inf-bars-more">+ ${remaining} autres partenaires (volumes plus faibles)</div>`;
  }
  if(!_relInfluencePinned){
    html += `<div class="inf-bars-hint">Clique un pays pour voir son évolution temporelle</div>`;
  } else {
    const sel = items.find(it => it.key === _relInfluencePinned);
    if(sel){
      html += `<div class="inf-bars-hint pinned">Sélectionné : <strong>${sel.flag||''} ${sel.name}</strong> · re-clique pour désélectionner</div>`;
    }
  }
  host.innerHTML = html;
}

function toggleInfluencePinned(key){
  if(_relInfluencePinned === key) _relInfluencePinned = null;
  else _relInfluencePinned = key;
  renderRelComposition();
  renderRelEvolution();
}

/* ─── Treemap (squarified) ───────────────────────────────────── */
function drawTreemapRel(node, host){
  const W = 700, H = 460;
  const items = node.children.slice().sort((a,b)=>b.value-a.value);
  const cells = squarifyTreemap(items, 0, 0, W, H);
  const palette = ['#0a6e4a','#2d8556','#4f9e6a','#6fb486','#b45309','#c2410c','#1d4ed8','#5b6b8c','#7a8b6c','#a08654','#8a6d4e','#6a5d4e'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;
  const total = items.reduce((s,c)=>s+c.value, 0) || 1;
  const isInfluence = (node.metric === 'influence');
  const entry = getFlowEntryByKey(_relEntryKey);
  const cfg = state.indicators.find(cc => cc.indicator === entry?.realIndicator) || entry;
  cells.forEach((c, i) => {
    const fill = palette[i % palette.length];
    // En mode influence : item.value EST le pourcentage (poids du sujet chez ce partenaire).
    // L'infobulle indique alors : "X% du marché total · volume Y M USD"
    // En mode volume : item.value EST le volume. L'infobulle indique : "Y M USD · X% du sujet"
    let tipBody;
    if(isInfluence){
      const volumeStr = fmtWithUnit(c.item.volume, cfg?.unit_display);
      tipBody = `${c.item.value.toFixed(1)}% chez ce partenaire · volume ${volumeStr}`;
    } else {
      const pct = (c.item.value/total)*100;
      tipBody = `${fmtWithUnit(c.item.value, cfg?.unit_display)} · ${pct.toFixed(1)}%`;
    }
    svg += `<g class="tm-cell">
      <rect x="${c.x.toFixed(1)}" y="${c.y.toFixed(1)}" width="${c.w.toFixed(1)}" height="${c.h.toFixed(1)}" fill="${fill}"
            data-tt="${escAttr((c.item.flag?c.item.flag+' ':'')+c.item.name)}" data-tb="${escAttr(tipBody)}"
            onmouseenter="showTip2(event,this.dataset.tt,this.dataset.tb)" onmousemove="moveTip(event)" onmouseleave="hideTip()"
            onclick="treemapClick('${escAttr(c.item.key)}')"/>`;
    if(c.w > 60 && c.h > 30){
      const flag = c.item.flag || '';
      const short = c.item.name.length > 18 ? c.item.name.slice(0,17)+'…' : c.item.name;
      // label secondaire : en influence on affiche le pct du marché mondial, en volume on affiche la part du sujet
      const subValue = isInfluence ? (c.item.value.toFixed(0) + '%') : ((c.item.value/total*100).toFixed(0) + '%');
      svg += `<text class="tm-label" x="${(c.x+8).toFixed(1)}" y="${(c.y+18).toFixed(1)}" style="font-size:12px;font-weight:600">${flag} ${short}</text>`;
      svg += `<text class="tm-label-sub" x="${(c.x+8).toFixed(1)}" y="${(c.y+32).toFixed(1)}" style="font-size:10px">${subValue}</text>`;
    }
    svg += `</g>`;
  });
  svg += `</svg>`;
  host.innerHTML = svg;
}
function treemapClick(name){
  // Drill : filtre sur (dimension active, valeur cliquée) + bascule auto de référentiel.
  // Règle : alternance partner ↔ catégorie. Sub1 par défaut, sinon première catégorie peuplée.
  const dims = getRelDimensions();
  const next = nextRelDim(_relDim, dims);
  // pousser le filtre avec la dimension actuelle (avant bascule)
  const level = _relDim;
  const label = (level === 'partner') ? (partnerLabel(name) || name) : name;
  _relPath = [..._relPath, { level, value: name, label }];
  _relDim = next;
  renderRelMain();
  syncUrl();
}

// Règle d'alternance : si on est sur partner → on bascule vers la 1ère catégorie peuplée
// (sub1 prioritaire, sinon sub2, sinon sub3). Si on est sur une catégorie → on revient à partner.
function nextRelDim(currentDim, dims){
  const available = dims.map(d => d.key);
  if(currentDim === 'partner'){
    // chercher la première catégorie peuplée dans l'ordre sub1 → sub2 → sub3
    for(const sub of ['sub1', 'sub2', 'sub3']){
      if(available.includes(sub)) return sub;
    }
    return 'partner';   // aucune catégorie peuplée, on reste sur partner
  }
  // sur une catégorie → retour à partner si dispo
  if(available.includes('partner')) return 'partner';
  return currentDim;
}

/* ─── Évolution : aires empilées par partenaire ─────────────────
   Tous les partenaires sur toutes les années disponibles. Couleur
   stable pour chaque partenaire entre les vues (cohérence sunburst↔aires).
─────────────────────────────────────────────────────────────── */
function renderRelEvolution(){
  const body = document.getElementById('relEvoBody');
  if(!body) return;
  const entry = getFlowEntryByKey(_relEntryKey);
  if(!entry){ body.innerHTML = ''; return; }
  // Mode Influence + dim=partner : courbes superposées du Top 5 (avec zoom sur sélection)
  if(_relMetric === 'influence' && _relDim === 'partner'){
    renderInfluenceTimeline(body, entry);
    return;
  }
  let rows = getFluxRowsTimeline(entry);
  if(!rows.length){ body.innerHTML = `<div class="rel-empty">Pas de série temporelle disponible.</div>`; return; }
  // filtres cohérents (dette bilatéral, hors agrégats)
  if(isDebtIndicator(entry.indicator)){
    const bil = rows.filter(r => isBilateral(r));
    if(bil.length) rows = bil;
  }
  rows = rows.filter(r => r.partner && !r.partner.startsWith('__') && !REGIONAL_CODES.has(r.partner));
  // drill cumulé : applique tous les steps du chemin
  rows = applyDrillFilter(rows);
  // filtre zone active
  rows = filterByZoneFilter(rows);
  // zoom temporel si plage active (les viz temporelles restent par année, mais bornées)
  if(_relYearRange){
    const [yMin, yMax] = _relYearRange;
    rows = rows.filter(r => r.year >= yMin && r.year <= yMax);
  }
  if(!rows.length){ body.innerHTML = `<div class="rel-empty">Pas de série temporelle utile.</div>`; return; }

  // bucket selon la dimension active
  const dim = _relDim;
  function bucketKey(r){
    if(dim === 'partner') return r.partner;
    const v = r[dim];
    return v && String(v).trim() !== '' ? String(v) : '(non précisé)';
  }
  function bucketLabel(k){
    return dim === 'partner' ? (partnerFlag(k) + ' ' + partnerLabel(k)) : k;
  }

  // agrégation par (year, bucket)
  const byYearKey = new Map();
  const years = new Set(), keysSet = new Set();
  const totalPerKey = new Map();
  for(const r of rows){
    years.add(r.year);
    const k = bucketKey(r);
    keysSet.add(k);
    const yk = r.year + '||' + k;
    byYearKey.set(yk, (byYearKey.get(yk) || 0) + (r.value || 0));
    totalPerKey.set(k, (totalPerKey.get(k) || 0) + (r.value || 0));
  }
  const yearList = [...years].sort((a,b) => a - b);
  const keys = [...keysSet].sort((a,b) => totalPerKey.get(b) - totalPerKey.get(a));
  const palette = ['#0a6e4a','#2d8556','#b45309','#1d4ed8','#5b6b8c','#7a8b6c','#a08654','#8a6d4e','#c2410c','#4f9e6a','#6fb486','#6a5d4e','#8b3a62','#3b6b8c','#92723a','#5c8a5c','#a0826d','#7d6b8c','#6b8a7d'];
  const colorOf = (i) => palette[i % palette.length];

  const W = 560, H = 280, m = { t: 12, r: 16, b: 26, l: 56 };
  const yearTotals = yearList.map(y => {
    let s = 0; for(const k of keys) s += byYearKey.get(y+'||'+k) || 0; return { y, s };
  });
  const yMax = Math.max(...yearTotals.map(x => x.s), 1);
  const xScale = (y) => m.l + ((y - yearList[0]) / Math.max(1, yearList[yearList.length-1] - yearList[0])) * (W - m.l - m.r);
  const yScale = (v) => H - m.b - (v / yMax) * (H - m.t - m.b);

  // empilage
  const stacks = {};
  for(let yi = 0; yi < yearList.length; yi++){
    let acc = 0;
    for(const k of keys){
      const v = byYearKey.get(yearList[yi]+'||'+k) || 0;
      stacks[k] = stacks[k] || [];
      stacks[k].push({ y: yearList[yi], y0: acc, y1: acc + v });
      acc += v;
    }
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  const cfg = state.indicators.find(c => c.indicator === entry.realIndicator) || entry;
  // ticks Y
  for(let i = 0; i <= 3; i++){
    const v = (yMax * i) / 3;
    const yy = yScale(v).toFixed(1);
    svg += `<line class="evo-grid" x1="${m.l}" y1="${yy}" x2="${W-m.r}" y2="${yy}"/>`;
    svg += `<text class="evo-lbl" x="${m.l-6}" y="${(+yy+3).toFixed(1)}" text-anchor="end">${fmtNumber(v, cfg.unit_display)}</text>`;
  }
  // ticks X
  const xticks = yearList.length >= 3 ? [yearList[0], yearList[Math.floor(yearList.length/2)], yearList[yearList.length-1]] : yearList;
  for(const t of xticks){
    svg += `<text class="evo-lbl" x="${xScale(t).toFixed(1)}" y="${H-8}" text-anchor="middle">${t}</text>`;
  }
  // aires
  keys.forEach((k, idx) => {
    const pts = stacks[k];
    let dTop = '', dBot = '';
    pts.forEach((pt, i) => { dTop += (i===0?'M':'L') + xScale(pt.y).toFixed(1) + ',' + yScale(pt.y1).toFixed(1) + ' '; });
    for(let i = pts.length - 1; i >= 0; i--){ dBot += 'L' + xScale(pts[i].y).toFixed(1) + ',' + yScale(pts[i].y0).toFixed(1) + ' '; }
    const fill = colorOf(idx);
    const tot = totalPerKey.get(k) || 0;
    svg += `<path class="evo-area" d="${dTop} ${dBot} Z" fill="${fill}" style="cursor:pointer"
              data-tt="${escAttr(bucketLabel(k))}" data-tb="${escAttr('Total période · ' + fmtWithUnit(tot, cfg.unit_display))}"
              onmouseenter="showTip2(event,this.dataset.tt,this.dataset.tb)" onmousemove="moveTip(event)" onmouseleave="hideTip()"
              onclick="treemapClick('${escAttr(k)}')"/>`;
  });
  svg += `</svg>`;

  // légende
  const TOP_LEGEND = 12;
  const legendItems = keys.slice(0, TOP_LEGEND).map((k, idx) => `
    <span class="leg-item"><span class="leg-dot" style="background:${colorOf(idx)}"></span>${bucketLabel(k)}</span>
  `).join('');
  const more = keys.length > TOP_LEGEND ? `<span class="leg-item" style="color:var(--text3)">+${keys.length - TOP_LEGEND} autres</span>` : '';
  body.innerHTML = `<div class="rel-evo-wrap">${svg}</div><div class="evo-legend">${legendItems}${more}</div>`;
}

/* ─── Courbes superposées d'influence (panel droit mode Influence) ─
   Affiche l'évolution du % d'influence du sujet chez chaque partenaire au fil du temps.
   - Par défaut : Top 5 partenaires (selon l'influence actuelle), courbes superposées.
   - Si _relInfluencePinned est défini : ce pays apparaît en gras avec stats, les autres en arrière-plan.
*/
function renderInfluenceTimeline(host, entry){
  // Timelines : volume du sujet par (année, partenaire) + total mondial par (année, partenaire)
  let subjectRows = getFluxRowsTimeline(entry);
  if(!subjectRows.length){ host.innerHTML = `<div class="rel-empty">Pas de série temporelle disponible.</div>`; return; }
  // filtres cohérents avec le reste de Relations
  if(isDebtIndicator(entry.indicator)){
    const bil = subjectRows.filter(r => isBilateral(r));
    if(bil.length) subjectRows = bil;
  }
  subjectRows = subjectRows.filter(r => r.partner && !r.partner.startsWith('__') && !REGIONAL_CODES.has(r.partner));
  subjectRows = applyDrillFilter(subjectRows);
  subjectRows = filterByZoneFilter(subjectRows);
  // zoom temporel si plage active
  if(_relYearRange){
    const [yMin, yMax] = _relYearRange;
    subjectRows = subjectRows.filter(r => r.year >= yMin && r.year <= yMax);
  }
  if(!subjectRows.length){ host.innerHTML = `<div class="rel-empty">Pas de série temporelle utile.</div>`; return; }

  const worldTotalsTL = getFluxPartnerWorldTotalsTimeline(entry);

  // Agréger : { partner: { year: subject_volume } }
  const subjectByPY = {};
  const yearsSet = new Set();
  for(const r of subjectRows){
    const p = r.partner, y = r.year;
    if(!p || !y) continue;
    if(!subjectByPY[p]) subjectByPY[p] = {};
    subjectByPY[p][y] = (subjectByPY[p][y] || 0) + (r.value || 0);
    yearsSet.add(y);
  }
  // Calculer l'influence par année pour chaque partenaire
  const series = [];   // [{ partner, name, flag, points: [{year, pct, volume, worldTotal}], lastPct }]
  for(const p of Object.keys(subjectByPY)){
    const points = [];
    const yearsPartner = Object.keys(subjectByPY[p]).map(Number).sort((a,b)=>a-b);
    for(const y of yearsPartner){
      const v = subjectByPY[p][y] || 0;
      const wt = worldTotalsTL[p]?.[y] || 0;
      if(wt > 0 && v > 0){
        points.push({ year: y, pct: (v/wt)*100, volume: v, worldTotal: wt });
      }
    }
    if(points.length){
      series.push({
        partner: p,
        name: partnerLabel(p),
        flag: partnerFlag(p),
        points,
        lastPct: points[points.length-1].pct,
      });
    }
  }
  if(!series.length){ host.innerHTML = `<div class="rel-empty">Pas d'historique d'influence calculable.</div>`; return; }

  // Tri par dernier pct (plus haut → plus influent) et sélection Top 5
  series.sort((a,b) => b.lastPct - a.lastPct);
  const TOP_N = 5;
  let topSeries = series.slice(0, TOP_N);
  const pinnedSeries = _relInfluencePinned ? series.find(s => s.partner === _relInfluencePinned) : null;
  if(pinnedSeries && !topSeries.includes(pinnedSeries)){
    // Si le pays épinglé n'est pas dans le top, on l'ajoute en plus
    topSeries = [...topSeries, pinnedSeries];
  }

  // Bornes
  const years = [...yearsSet].sort((a,b)=>a-b);
  if(years.length < 2){ host.innerHTML = `<div class="rel-empty">Une seule année disponible — impossible de tracer une courbe.</div>`; return; }
  const yMin = years[0], yMax = years[years.length-1];
  // max pct sur les séries affichées (pour scaler l'axe Y avec un peu de marge)
  let maxPctAll = 0;
  for(const s of topSeries) for(const pt of s.points) if(pt.pct > maxPctAll) maxPctAll = pt.pct;
  if(maxPctAll <= 0) maxPctAll = 1;
  const yAxisMax = maxPctAll * 1.15;

  // Geometry
  const W = 700, H = 320;
  const M = { top: 18, right: 110, bottom: 26, left: 38 };
  const innerW = W - M.left - M.right;
  const innerH = H - M.top - M.bottom;
  const xScale = (y) => M.left + ((y - yMin) / (yMax - yMin)) * innerW;
  const yScale = (v) => M.top + innerH - (v / yAxisMax) * innerH;

  // Palette : orange pour le pays épinglé, autres en bleus/verts atténués
  const palette = ['#0a6e4a', '#1d4ed8', '#5b6b8c', '#7a8b6c', '#a08654', '#8a6d4e'];
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="background:transparent">`;

  // Axes
  // Y ticks (5 graduations)
  for(let i = 0; i <= 4; i++){
    const v = (yAxisMax / 4) * i;
    const yy = yScale(v);
    svg += `<line x1="${M.left}" y1="${yy.toFixed(1)}" x2="${(W-M.right).toFixed(1)}" y2="${yy.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 3"/>`;
    svg += `<text x="${(M.left-6).toFixed(1)}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="10" fill="var(--text3)">${v.toFixed(1)}%</text>`;
  }
  // X ticks (années principales, ~5 max)
  const yearStep = Math.max(1, Math.ceil(years.length / 6));
  for(let i = 0; i < years.length; i += yearStep){
    const y = years[i];
    const xx = xScale(y);
    svg += `<text x="${xx.toFixed(1)}" y="${(H-M.bottom+14).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="var(--text3)">${y}</text>`;
  }

  // Courbes : non épinglées en atténué, épinglée en gros
  topSeries.forEach((s, idx) => {
    const isPinned = pinnedSeries && s.partner === pinnedSeries.partner;
    const isDimmed = pinnedSeries && !isPinned;
    const color = isPinned ? 'var(--orange)' : palette[idx % palette.length];
    const strokeW = isPinned ? 3 : 1.8;
    const opacity = isDimmed ? 0.25 : 1;
    // path
    const d = s.points.map((pt, i) => (i === 0 ? 'M' : 'L') + xScale(pt.year).toFixed(1) + ',' + yScale(pt.pct).toFixed(1)).join(' ');
    svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="${strokeW}" opacity="${opacity}" stroke-linejoin="round"/>`;
    // points
    for(const pt of s.points){
      svg += `<circle cx="${xScale(pt.year).toFixed(1)}" cy="${yScale(pt.pct).toFixed(1)}" r="${isPinned ? 4 : 2.5}" fill="${color}" opacity="${opacity}"
                onmouseenter="showTip2(event, '${escAttr((s.flag?s.flag+' ':'')+s.name+' · '+pt.year)}', '${escAttr(pt.pct.toFixed(1)+'% chez ce partenaire')}')"
                onmousemove="moveTip(event)" onmouseleave="hideTip()"/>`;
    }
    // étiquette à droite : nom + dernier pct
    if(s.points.length > 0){
      const last = s.points[s.points.length-1];
      const labelOpacity = isDimmed ? 0.3 : 1;
      const labelColor = isPinned ? 'var(--orange)' : color;
      const fontWeight = isPinned ? '700' : '500';
      const shortName = s.name.length > 12 ? s.name.slice(0,11)+'…' : s.name;
      svg += `<text x="${(xScale(last.year)+6).toFixed(1)}" y="${(yScale(last.pct)+3).toFixed(1)}" font-family="var(--sans)" font-size="11" font-weight="${fontWeight}" fill="${labelColor}" opacity="${labelOpacity}">${shortName} · ${last.pct.toFixed(1)}%</text>`;
    }
  });

  svg += `</svg>`;

  // Stats du pays épinglé en bas
  let statsBlock = '';
  if(pinnedSeries){
    const pts = pinnedSeries.points;
    const first = pts[0], last = pts[pts.length-1];
    const variation = last.pct - first.pct;
    const cfg = state.indicators.find(c => c.indicator === entry.realIndicator) || entry;
    const sign = variation >= 0 ? '+' : '';
    const colorVar = variation >= 0 ? 'var(--green)' : 'var(--orange)';
    statsBlock = `
      <div class="inf-tl-stats">
        <div class="inf-tl-stat">
          <div class="inf-tl-stat-k">Part chez ce partenaire</div>
          <div class="inf-tl-stat-v">${first.pct.toFixed(1)}% → ${last.pct.toFixed(1)}%</div>
        </div>
        <div class="inf-tl-stat">
          <div class="inf-tl-stat-k">Variation ${first.year} → ${last.year}</div>
          <div class="inf-tl-stat-v" style="color:${colorVar}">${sign}${variation.toFixed(1)} pt</div>
        </div>
        <div class="inf-tl-stat">
          <div class="inf-tl-stat-k">Volume ${last.year}</div>
          <div class="inf-tl-stat-v">${fmtWithUnit(last.volume, cfg?.unit_display)}</div>
        </div>
      </div>`;
  }

  host.innerHTML = `<div class="inf-tl-wrap">${svg}${statsBlock}</div>`;
}

/* ─── Carte du flux ─────────────────────────────────────────────
   Choroplèthe des partenaires du sujet pour ce flux à l'année courante.
   Échelle par quantiles (palette terre/papier orange pour distinguer
   visuellement de la carte Puissance qui est en vert).
─────────────────────────────────────────────────────────────── */
let relMapState = { world: null };
async function renderRelFluxMap(){
  const svgEl = document.getElementById('relMap');
  const container = document.getElementById('relMapContainer');
  if(!svgEl || !container) return;
  const entry = getFlowEntryByKey(_relEntryKey);
  if(!entry){ svgEl.innerHTML = ''; return; }
  const W = container.clientWidth || 600, H = 320;
  const svg = d3.select(svgEl).attr('width', W).attr('height', H);
  svg.selectAll('*').remove();
  const proj = d3.geoNaturalEarth1().scale(W/6.5).translate([W/2, H/2]);
  const path = d3.geoPath().projection(proj);
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#dce8f0');
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([1,12]).on('zoom', ev => g.attr('transform', ev.transform));
  svg.call(zoom);
  svg.on('dblclick.zoom', () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity));

  // récupérer la topologie (cache global partagé avec Puissance)
  let world;
  try { world = await loadWorldTopology(); }
  catch { svgEl.innerHTML = `<rect width="${W}" height="${H}" fill="#dce8f0"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#888">Carte indisponible</text>`; return; }
  const features = topojson.feature(world, world.objects.countries).features;

  // valeurs par partenaire (déjà filtrées : bilatéral pour la dette, hors agrégats)
  let byPartner = getFluxWorldMap(entry);
  // appliquer le filtre zone : ne garder que les partenaires inclus dans la zone active
  const zoneSet = getZoneFilterIsos();
  if(zoneSet){
    const filtered = {};
    for(const [iso, v] of Object.entries(byPartner)){
      if(zoneSet.has(iso)) filtered[iso] = v;
    }
    byPartner = filtered;
  }
  const isInfluence = (_relMetric === 'influence');
  // Quel que soit le mode, on colore la carte par UN POURCENTAGE pour rester lisible :
  //   - Volume    : part dans le total du sujet (recalculé sur la zone filtrée si filtre actif)
  //   - Influence : poids du sujet chez chaque partenaire (% de son marché mondial)
  // Le volume absolu reste affiché en infobulle, à titre informatif.
  let displayByIso = {};
  let worldTotals = null;
  if(isInfluence){
    worldTotals = getFluxPartnerWorldTotals(entry);
    for(const [iso, v] of Object.entries(byPartner)){
      const wt = worldTotals[iso] || 0;
      if(wt > 0) displayByIso[iso] = (v / wt) * 100;
    }
  } else {
    // Volume mode : % dans le total (du sujet, ou de la zone si filtre actif)
    const subjectTotal = Object.values(byPartner).reduce((s,v) => s + (v || 0), 0) || 1;
    for(const [iso, v] of Object.entries(byPartner)){
      if(v > 0) displayByIso[iso] = (v / subjectTotal) * 100;
    }
  }
  const sorted = Object.entries(displayByIso).map(([iso,v]) => ({iso,v})).sort((a,b)=>a.v-b.v);
  const n = sorted.length;
  const palette = ['#f5e6dc','#ecc8a8','#d4956f','#b66a3a','#9c4a1f','#7c2d12','#5c1c08','#3d0f04'];
  const colorByIso = {};
  for(let i = 0; i < n; i++){
    const q = i / Math.max(1, n-1);
    const idx = Math.min(palette.length-1, Math.floor(q * palette.length));
    colorByIso[sorted[i].iso] = palette[idx];
  }

  g.selectAll('.map-country').data(features).join('path')
    .attr('class','map-country')
    .attr('d', path)
    .attr('data-iso3', d => numToIso3(+d.id) || '')
    .style('fill', d => {
      const iso = numToIso3(+d.id);
      if(!iso) return '#eef2ee';
      // Hors zone : grisé plus marqué (signal visuel "hors périmètre")
      if(zoneSet && !zoneSet.has(iso)) return '#dde4dd';
      // Dans zone (ou pas de filtre) avec data : couleur normale ; sans data : neutre
      return colorByIso[iso] || '#eef2ee';
    })
    .on('mouseover', function(ev, d){
      const iso = numToIso3(+d.id); if(!iso) return;
      d3.select(this).attr('stroke','var(--orange)').attr('stroke-width', 1);
      const v = byPartner[iso] || 0;
      const cfg = state.indicators.find(c => c.indicator === entry.realIndicator) || entry;
      let body;
      if(zoneSet && !zoneSet.has(iso)){
        body = 'hors zone sélectionnée';
      } else if(v <= 0){
        body = 'pas de flux';
      } else if(isInfluence){
        const wt = worldTotals[iso] || 0;
        if(wt > 0){
          const influencePct = (v / wt) * 100;
          body = `${influencePct.toFixed(1)}% chez ce partenaire · volume ${fmtWithUnit(v, cfg.unit_display)}`;
        } else {
          body = `volume ${fmtWithUnit(v, cfg.unit_display)} · part chez ce partenaire indisponible`;
        }
      } else {
        // Mode Volume : on a stocké le pct du sujet dans displayByIso
        const pct = displayByIso[iso] || 0;
        body = `${pct.toFixed(1)}% du sujet · volume ${fmtWithUnit(v, cfg.unit_display)}`;
      }
      showTip2(ev, `${isoToFlag(iso)} ${isoToName(iso)}`, body);
    })
    .on('mousemove', moveTip)
    .on('mouseout', function(){ d3.select(this).attr('stroke','var(--border)').attr('stroke-width', 0.4); hideTip(); })
    .on('click', function(ev, d){
      const iso = numToIso3(+d.id); if(iso) setSubject([iso], isoToName(iso));
    });

  // surligner le(s) pays du sujet
  const subjSet = new Set(currentIsos());
  g.selectAll('.map-country').filter(function(){ return subjSet.has(d3.select(this).attr('data-iso3')); })
    .attr('stroke','var(--green)').attr('stroke-width', 1.3).raise();

  g.append('path').datum(d3.geoGraticule()()).attr('d', path).attr('fill','none').attr('stroke','#b0c4d8').attr('stroke-width', 0.2).attr('opacity', 0.4);
}

// Treemap : algorithme « slice-and-dice » avec orientation alternée.
// Simple, correct (surface = somme exacte des valeurs), suffisant pour Relations.
function squarifyTreemap(items, x, y, w, h){
  const out = [];
  function place(arr, X, Y, W, H, horiz){
    const total = arr.reduce((s,c)=>s+c.value, 0) || 1;
    let off = 0;
    for(const it of arr){
      const frac = it.value / total;
      if(horiz){
        const cw = W * frac;
        out.push({ x: X + off, y: Y, w: cw, h: H, item: it });
        off += cw;
      } else {
        const ch = H * frac;
        out.push({ x: X, y: Y + off, w: W, h: ch, item: it });
        off += ch;
      }
    }
  }
  // Heuristique : si beaucoup d'items, on coupe en 2 « bandes » pour limiter
  // les cellules très allongées. Sinon on coupe simplement le long du grand axe.
  if(items.length <= 4){
    place(items, x, y, w, h, w >= h);
  } else {
    // diviser en deux groupes équilibrés par somme
    const sorted = items.slice().sort((a,b)=>b.value-a.value);
    const total = sorted.reduce((s,c)=>s+c.value, 0);
    let acc = 0; let split = 1;
    for(let i = 0; i < sorted.length; i++){
      acc += sorted[i].value;
      if(acc >= total/2){ split = i + 1; break; }
    }
    const left = sorted.slice(0, split), right = sorted.slice(split);
    const leftSum = left.reduce((s,c)=>s+c.value,0);
    const horiz = w >= h;
    if(horiz){
      const cw = w * (leftSum / total);
      place(left, x, y, cw, h, false);
      if(right.length) place(right, x + cw, y, w - cw, h, false);
    } else {
      const ch = h * (leftSum / total);
      place(left, x, y, w, ch, true);
      if(right.length) place(right, x, y + ch, w, h - ch, true);
    }
  }
  return out;
}



/* ─── RECHERCHE SUJET (⌘K) — pays multi-cochables, zones en 1 clic ─── */
let _searchSel = 0, _searchItems = [];
let _multiPick = [];   // [{iso3, name, flag}] sélection multi en cours
let _searchMode = 'subject';   // 'subject' | 'compareB'

function openSearch(){
  _searchMode = 'subject';
  document.getElementById('searchOverlay').classList.add('open');
  _multiPick = [];
  if(state.subject && state.subject.isos.length > 1){
    _multiPick = state.subject.isos.map(iso => ({ iso3: iso, name: isoToName(iso), flag: isoToFlag(iso) }));
  }
  const inp = document.getElementById('searchInput');
  inp.value = ''; inp.focus();
  inp.placeholder = 'Rechercher un pays ou une zone…';
  onSearchInput('');
  renderTray();
}
function openSearchForB(){
  _searchMode = 'compareB';
  document.getElementById('searchOverlay').classList.add('open');
  _multiPick = [];
  if(state.compareB && state.compareB.isos.length > 1){
    _multiPick = state.compareB.isos.map(iso => ({ iso3: iso, name: isoToName(iso), flag: isoToFlag(iso) }));
  }
  const inp = document.getElementById('searchInput');
  inp.value = ''; inp.focus();
  inp.placeholder = 'Choisir un comparant…';
  onSearchInput('');
  renderTray();
}
function setCompareB(isos, label){
  state.compareB = { isos: isos.slice(), label: label || detectZoneLabel(isos) };
  renderContextBar();
  refreshActiveView();
  syncUrl();
}
function closeSearch(){ document.getElementById('searchOverlay').classList.remove('open'); }

function isPicked(iso3){ return _multiPick.some(p => p.iso3 === iso3); }

function onSearchInput(q){
  const ql = q.trim().toLowerCase();
  const res = document.getElementById('searchResults');
  _searchSel = 0;
  let items = [];

  // pays (cochables pour la multi-sélection)
  const countries = state.allCountries
    .filter(c => !ql || c.name.toLowerCase().includes(ql) || c.iso3.toLowerCase().includes(ql))
    .slice(0, 8)
    .map(c => ({ kind: 'pays', isos: [c.iso3], label: c.name, flag: c.flag, iso: c.iso3 }));
  items = items.concat(countries);

  // zones (sélection directe en un clic, non cochables)
  if(state.db){
    const r = safeExec(`SELECT DISTINCT zone_id, zone_nom FROM zones${ql ? ` WHERE LOWER(zone_nom) LIKE '%${escapeSql(ql)}%' OR LOWER(zone_id) LIKE '%${escapeSql(ql)}%'` : ''} ORDER BY zone_nom LIMIT 5`);
    if(r.length){
      for(const [zid, znom] of r[0].values){
        const zr = safeExec(`SELECT country_iso3 FROM zones WHERE zone_id='${escapeSql(zid)}'`);
        const isos = zr.length ? zr[0].values.map(v => v[0]).filter(Boolean) : [];
        if(isos.length) items.push({ kind: 'zone', isos, label: znom, flag: '⊞', iso: zid });
      }
    }
  }

  _searchItems = items;
  if(!items.length){ res.innerHTML = `<div class="search-empty">Aucun résultat</div>`; return; }

  const hasCountries = items.some(it => it.kind === 'pays');
  const hint = hasCountries
    ? `<div class="search-hint">Cocher plusieurs pays pour un bloc · cliquer une zone pour la choisir directement</div>` : '';

  res.innerHTML = hint + items.map((it, i) => {
    if(it.kind === 'pays'){
      const checked = isPicked(it.iso) ? 'checked' : '';
      return `<div class="search-item ${i===0?'sel':''} ${checked}" data-i="${i}" onclick="toggleCountry(${i})">
                <span class="chk">${isPicked(it.iso)?'✓':''}</span>
                <span class="flag">${it.flag}</span>
                <span>${it.label}</span>
                <span class="kind">${it.kind}</span>
                <span class="iso">${it.iso}</span>
              </div>`;
    }
    return `<div class="search-item ${i===0?'sel':''}" data-i="${i}" onclick="pickZone(${i})">
              <span class="chk-spacer"></span>
              <span class="flag">${it.flag}</span>
              <span>${it.label}</span>
              <span class="kind">${it.kind}</span>
              <span class="iso">${it.iso}</span>
            </div>`;
  }).join('');
}

function toggleCountry(i){
  const it = _searchItems[i]; if(!it || it.kind !== 'pays') return;
  const iso = it.iso;
  if(isPicked(iso)) _multiPick = _multiPick.filter(p => p.iso3 !== iso);
  else _multiPick.push({ iso3: iso, name: it.label, flag: it.flag });
  // rafraîchir l'état visuel de la ligne + le bandeau
  const row = document.querySelector(`.search-item[data-i="${i}"]`);
  if(row){ row.classList.toggle('checked', isPicked(iso)); row.querySelector('.chk').textContent = isPicked(iso) ? '✓' : ''; }
  renderTray();
}

function pickZone(i){
  const it = _searchItems[i]; if(!it || it.kind !== 'zone') return;
  if(_searchMode === 'compareB') setCompareB(it.isos, it.label);
  else setSubject(it.isos, it.label);
  closeSearch();
}

function renderTray(){
  const tray = document.getElementById('searchTray');
  const chips = document.getElementById('trayChips');
  const btn = document.getElementById('trayValidate');
  if(!_multiPick.length){ tray.classList.remove('show'); return; }
  tray.classList.add('show');
  chips.innerHTML = _multiPick.map(p =>
    `<span class="tray-chip"><span class="flag">${p.flag}</span>${p.name}<span class="rm" onclick="removePick('${p.iso3}')">×</span></span>`
  ).join('');
  btn.textContent = _multiPick.length === 1
    ? `Valider (1 pays)` : `Valider le bloc (${_multiPick.length} pays)`;
}
function removePick(iso){
  _multiPick = _multiPick.filter(p => p.iso3 !== iso);
  renderTray();
  // resynchroniser les coches visibles
  onSearchInput(document.getElementById('searchInput').value);
}
function validateMultiSelection(){
  if(!_multiPick.length) return;
  const isos = _multiPick.map(p => p.iso3);
  const label = detectZoneLabel(isos);
  if(_searchMode === 'compareB') setCompareB(isos, label);
  else setSubject(isos, label);
  closeSearch();
}

function onSearchKey(e){
  if(e.key === 'Escape'){ closeSearch(); return; }
  const rows = _searchItems.length;
  if(e.key === 'ArrowDown'){ e.preventDefault(); _searchSel = Math.min(_searchSel+1, rows-1); updateSearchSel(); }
  if(e.key === 'ArrowUp'){ e.preventDefault(); _searchSel = Math.max(_searchSel-1, 0); updateSearchSel(); }
  if(e.key === 'Enter'){
    e.preventDefault();
    if(_multiPick.length){ validateMultiSelection(); return; }   // Entrée valide le bloc si en cours
    const it = _searchItems[_searchSel];
    if(it){ it.kind === 'zone' ? pickZone(_searchSel) : toggleCountry(_searchSel); }
  }
}
function updateSearchSel(){
  document.querySelectorAll('.search-item').forEach(el => {
    el.classList.toggle('sel', parseInt(el.dataset.i) === _searchSel);
  });
}

/* ─── ÉTAT DANS L'URL (sérialisation) ─────────────────────────── */
function syncUrl(){
  const p = new URLSearchParams();
  if(state.subject) p.set('s', state.subject.isos.join(','));
  if(state.compareB) p.set('b', state.compareB.isos.join(','));
  p.set('y', state.year);
  p.set('tab', state.view);
  history.replaceState(null, '', '#' + p.toString());
}
function applyUrlState(){
  const h = location.hash.replace(/^#/, '');
  if(!h) return;
  const p = new URLSearchParams(h);
  if(p.get('tab')) switchViewSilent(p.get('tab'));
  if(p.get('y')){
    const y = parseInt(p.get('y'));
    if(y >= state.yearBounds.min && y <= state.yearBounds.max){
      state.year = y;
      // le slider est rendu dynamiquement par renderYearSlot() ; ne pas y toucher ici
    }
  }
  if(p.get('s')){
    const isos = p.get('s').split(',').filter(Boolean);
    if(isos.length) state.subject = { isos, label: detectZoneLabel(isos) };
  }
  if(p.get('b')){
    const isos = p.get('b').split(',').filter(Boolean);
    if(isos.length) state.compareB = { isos, label: detectZoneLabel(isos) };
  }
}
function switchViewSilent(v){
  if(!['synthese','puissance','relations'].includes(v)) return;
  state.view = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.querySelectorAll('.view').forEach(s => s.classList.toggle('active', s.id === 'view-' + v));
}

/* ─── RACCOURCIS CLAVIER ──────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){ e.preventDefault(); openSearch(); }
});
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab'); if(btn) switchView(btn.dataset.view);
});

boot();

];

function initDemo(SQL){
  state.db = new SQL.Database();
  state.isDemo = true;
  const db = state.db;
  db.run(`CREATE TABLE identite(country_iso3 TEXT,indicator TEXT,year INTEGER,value REAL,unit TEXT,source TEXT,subcategory TEXT);
          CREATE TABLE flux(country_from TEXT,country_to TEXT,indicator TEXT,year INTEGER,value REAL,unit TEXT,source TEXT,subcategory_1 TEXT,subcategory_2 TEXT,subcategory_3 TEXT);
          CREATE TABLE zones(zone_id TEXT,zone_nom TEXT,country_iso3 TEXT,zone_type TEXT);`);

  const PAYS = ['FRA','DEU','USA','CHN','BRA','IND','RUS','GBR','ITA','ESP','JPN','CAN','AUS','ZAF','NGA'];
  const BASE = {FRA:[67.8,42330,2780],DEU:[83.2,48720,4080],USA:[333,70250,25000],CHN:[1412,12720,17900],BRA:[215,8920,1920],IND:[1420,2410,3420],RUS:[144,15270,2240],GBR:[67,45850,3100],ITA:[59,35550,2100],ESP:[47,29350,1390],JPN:[125,39280,4230],CAN:[39,54970,2140],AUS:[26,60440,1550],ZAF:[60,7050,420],NGA:[218,2080,440]};
  const stmt = db.prepare(`INSERT INTO identite VALUES (?,?,?,?,?,?,?)`);
  for(const iso of PAYS){
    const [pop,pibh,pib] = BASE[iso];
    for(let y=2000;y<=2024;y++){
      const t=y-2000, g=1+t*0.012;

      stmt.run([iso,'pib_par_hab',y,Math.round(pibh*g),'USD','demo',null]);
      stmt.run([iso,'pib_usd',y,Math.round(pib*g),'USD','demo',null]);
      stmt.run([iso,'age_median',y,30+t*0.2,'ans','demo',null]);
      stmt.run([iso,'budget_defense_pib',y,1.5+(iso==='USA'?2:0)+(iso==='RUS'?2.5:0),'%','demo',null]);
      stmt.run([iso,'fecondite',y,1.8-t*0.005,'enf/femme','demo',null]);
    }

  stmt.free();

  // quelques flux de dette (avec subcategory pour préfigurer le drill-down)

                 FRA:[['USA',45,'Bilatéral'],['DEU',38,'Bilatéral'],['__private__',120,'Privé'],['__multilateral__',60,'Multilatéral']]};
  for(const [from,rows] of Object.entries(DETTE))
    for(const [to,val,sub] of rows)
      for(let y=2018;y<=2024;y++) fstmt.run([from,to,'dette_exterieure',y,val*(1+(y-2018)*0.03),'USD','demo',sub,null,null]);
  fstmt.free();

  db.run(`INSERT INTO zones VALUES ('G7','G7','USA','organisationnel'),('G7','G7','DEU','organisationnel'),('G7','G7','FRA','organisationnel'),('G7','G7','GBR','organisationnel'),('G7','G7','ITA','organisationnel'),('G7','G7','JPN','organisationnel'),('G7','G7','CAN','organisationnel'),('BRICS','BRICS','BRA','organisationnel'),('BRICS','BRICS','RUS','organisationnel'),('BRICS','BRICS','IND','organisationnel'),('BRICS','BRICS','CHN','organisationnel'),('BRICS','BRICS','ZAF','organisationnel');`);

  state.config = DEMO_CONFIG.slice();
