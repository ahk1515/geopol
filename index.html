// Entrées flux épinglées pour une colonne du panorama (Partenaire OU Influence).
// Renvoie des objets entrée flux complets {key, indicator, realIndicator, side, label, label_long, ...}.
function pinnedFlowEntries(column){
  const all = flowEntriesPresent();
  const storageKey = (column === 'partner') ? PIN_FLUX_PARTNER_KEY : PIN_FLUX_INFLUENCE_KEY;
  const perso = loadPins(storageKey);
  if(perso && perso.size){
    return all.filter(e => perso.has(e.key)).slice(0, 12);
  }
  // défauts : par colonne, on prend un sens « naturel »
  //  - partner = sens 'to' (qui pèse pour le sujet : ses créanciers, fournisseurs, accueils...)
  //  - influence = sens 'from' (pour qui le sujet pèse : ses débiteurs, clients, originaires...)
  const naturalSide = (column === 'partner') ? 'to' : 'from';
  return all.filter(e => e.side === naturalSide).slice(0, 10);
}

/* ─── MODALES (identite / flux_partner / flux_influence) ──────── */
let _pinDraft = null, _pinMode = 'identite';
function openPinModal(mode){
  _pinMode = mode || 'identite';
  const isFlux = (mode === 'flux_partner' || mode === 'flux_influence');
  const isRadar = (mode === 'radar');
  let currentSet, pool;
  if(isFlux){
    const column = (mode === 'flux_partner') ? 'partner' : 'influence';
    currentSet = new Set(pinnedFlowEntries(column).map(e => e.key));
    pool = flowEntriesPresent();
  } else if(isRadar){
    currentSet = new Set(pinnedRadarIndicators().map(c => c.indicator));
    pool = state.indicators.filter(c => c.table === 'identite');
  } else {
    currentSet = new Set(pinnedIdentiteIndicators().map(c => c.indicator));
    pool = state.indicators.filter(c => c.table === 'identite');
  }
  _pinDraft = new Set(currentSet);
  // grouper par catégorie ; pour les flux, regrouper les deux sens d'un même indicateur visuellement
  const byCat = {};
  for(const x of pool){ (byCat[x.category || 'autre'] ??= []).push(x); }
  let html = '';
  for(const cat of Object.keys(byCat).sort()){

/* DIAGNOSTIC D'AUDIT GLOBAL
   Parcourt toute la table identite et signale tout indicateur où plusieurs
   sources, unités ou ordres de grandeur cohabitent.
   Usage console : diagUnits()  ou  diagUnits('pib_usd')  pour un seul indicateur
   Options :
     - sans argument : audit complet (peut être long, 30-60 sec sur grosses bases)
     - avec un indicateur : audit ciblé immédiat
*/
function diagUnits(targetIndicator){
  console.group('%cAUDIT UNITÉS / SOURCES / ÉCHELLES', 'color:#b45309;font-weight:bold');
  // 1. Lister tous les indicateurs présents en base (table identite)
  const indSql = targetIndicator
    ? `SELECT DISTINCT indicator FROM identite WHERE indicator='${escapeSql(targetIndicator)}'`
    : `SELECT DISTINCT indicator FROM identite ORDER BY indicator`;
  const indRes = safeExec(indSql);
  if(!indRes.length){ console.log('Aucun indicateur en base.'); console.groupEnd(); return; }
  const indicators = indRes[0].values.map(v => v[0]);
  console.log(`%c${indicators.length} indicateurs à auditer`, 'color:#666');

  // 2. Pour chaque indicateur, agréger par source : nb lignes, unités, médiane, min/max
  const alerts = [];
  for(const ind of indicators){
    const r = safeExec(`
      SELECT source, unit, subcategory, COUNT(*) AS n,
             MIN(value) AS vmin, MAX(value) AS vmax, AVG(value) AS vavg
      FROM identite
      WHERE indicator='${escapeSql(ind)}' AND value IS NOT NULL AND value != 0
      GROUP BY source, unit, subcategory
    `);
    if(!r.length || !r[0].values.length) continue;
    const groups = r[0].values.map(([source, unit, subcat, n, vmin, vmax, vavg]) => ({
      source: source || '(null)',
      unit: unit || '(null)',
      subcat: subcat || '(historique)',
      n, vmin, vmax, vavg
    }));

    // Sources distinctes pour cet indicateur
    const sources = [...new Set(groups.map(g => g.source))];
    const units = [...new Set(groups.map(g => g.unit))];

    // Médiane robuste pour comparer les ordres de grandeur
    // (on prend AVG car la médiane SQL n'est pas dispo simplement ; AVG suffit pour détecter facteur 1000+)
    function magnitude(v){ if(!v || v === 0) return 0; return Math.floor(Math.log10(Math.abs(v))); }

    const flags = [];
    // 2a. Plusieurs unités déclarées pour le même indicateur → alerte
    if(units.length > 1){
      flags.push({type:'unités multiples', detail: units.join(' / ')});
    }
    // 2b. Plusieurs sources avec ordres de grandeur incompatibles (facteur > 1000)
    if(sources.length > 1){
      const bySource = {};
      for(const g of groups){
        if(!bySource[g.source]) bySource[g.source] = [];
        bySource[g.source].push(g.vavg);
      }
      const avgPerSource = Object.entries(bySource).map(([s, arr]) => {
        const m = arr.reduce((a,b) => a + Math.abs(b), 0) / arr.length;
        return { source: s, avg: m, mag: magnitude(m) };
      });
      const mags = avgPerSource.map(x => x.mag);
      const spread = Math.max(...mags) - Math.min(...mags);
      if(spread >= 3){  // facteur 1000 ou plus
        flags.push({
          type: 'ordres de grandeur incompatibles entre sources',
          detail: avgPerSource.map(x => `${x.source}≈10^${x.mag}`).join(' vs ')
        });
      }
    }
    // 2c. Historique vs projection : ordre de grandeur incompatible
    const hist = groups.filter(g => g.subcat === '(historique)');
    const proj = groups.filter(g => g.subcat === 'projection');
    if(hist.length && proj.length){
      const histAvg = hist.reduce((s,g) => s + Math.abs(g.vavg), 0) / hist.length;
      const projAvg = proj.reduce((s,g) => s + Math.abs(g.vavg), 0) / proj.length;
      const spread = Math.abs(magnitude(histAvg) - magnitude(projAvg));
      if(spread >= 3){
        flags.push({
          type: 'historique vs projection : facteur 1000+',
          detail: `historique≈10^${magnitude(histAvg)} vs projection≈10^${magnitude(projAvg)}`
        });
      }
    }

    if(flags.length){
      alerts.push({ indicator: ind, sources, units, flags, groups });
    }
  }

  // 3. Affichage
  if(!alerts.length){
    console.log('%c✓ Aucune anomalie détectée', 'color:#0a6e4a;font-weight:bold');
    console.groupEnd(); return;
  }
  console.log(`%c⚠ ${alerts.length} indicateur(s) à vérifier`, 'color:#b45309;font-weight:bold;font-size:13px');
  for(const a of alerts){
    console.group(`%c${a.indicator}`, 'color:#b45309;font-weight:bold');
    for(const f of a.flags) console.log(`  · ${f.type} → ${f.detail}`);
    console.log('  Détail par source/unité/subcategory :');
    console.table(a.groups.map(g => ({
      source: g.source, unit: g.unit, subcategory: g.subcat,
      lignes: g.n,
      moyenne: g.vavg?.toExponential(2),
      min: g.vmin?.toExponential(2),
      max: g.vmax?.toExponential(2)
    })));
    console.groupEnd();
  }
  console.log('\n%cRappel : pour creuser un indicateur précis, diagUnits("nom_indicateur")', 'color:#666;font-style:italic');
  console.groupEnd();
}

const RES_SUB_LABELS = {
  // Minéraux (USGS MCS)

function prettySubLabel(sub){
  const key = String(sub || '').toLowerCase();
  if(RES_SUB_LABELS[key]) return RES_SUB_LABELS[key];

// Récupère les parts mondiales par subcategory (petrole/gaz/charbon, cuivre/fer/...).
// Pour un sujet multi-pays, on somme les parts (correct car déjà en %).
function getResourceShares(){
  const isos = currentIsos();
  if(!isos.length) return [];
  const inList = sqlList(isos);
  const indList = RES_INDICATORS.map(r => `'${r.ind}'`).join(',');
  // dernière année disponible pour chaque indicateur ressource
  const r = safeExec(`
    SELECT indicator, subcategory, year, SUM(value) AS share
    FROM identite
    WHERE country_iso3 IN (${inList})
      AND indicator IN (${indList})
      AND subcategory IS NOT NULL AND subcategory != ''
      AND value IS NOT NULL AND value != 0
    GROUP BY indicator, subcategory, year
  `);
  if(!r.length) return [];
  // garde la valeur de la dernière année disponible pour chaque (indicator, subcategory)
  const lastByKey = new Map();
  for(const [ind, sub, y, val] of r[0].values){
    const k = ind + '|' + sub;
    const prev = lastByKey.get(k);
    if(!prev || y > prev.year) lastByKey.set(k, { ind, sub, year: y, value: val });
  }
  // enrichir + filtrer par notabilité
  const threshold = getResThreshold();
  const out = [];
  for(const { ind, sub, year, value } of lastByKey.values()){
    const meta = RES_INDICATORS.find(r => r.ind === ind);
    if(!meta) continue;
    if(value < threshold) continue;
    out.push({ ind, sub, year, value, group: meta.group, label: meta.label, cls: meta.cls });
  }
  // tri par valeur décroissante au sein de chaque ligne
  out.sort((a,b) => b.value - a.value);
  return out;
}

// Récupère import + export de ressources par catégorie (subcategory_1) pour le sujet.
// Stratégie : prendre la dernière année disponible globalement pour commerce_ressources.
// Renvoie [{ category, label, import, export, year }, ...] trié par max(import,export) décroissant.
function getResourceTradeByCategory(){
  const isos = currentIsos();
  if(!isos.length) return [];
  const inList = sqlList(isos);
  // dernière année disponible
  const yr = safeExec(`SELECT MAX(year) FROM flux WHERE indicator='commerce_ressources'`);
  const lastYear = (yr.length && yr[0].values[0][0]) || null;
  if(!lastYear) return [];
  // Import : le sujet est country_to (il reçoit la marchandise)
  const imp = safeExec(`SELECT subcategory_1, SUM(value) AS v
                        FROM flux
                        WHERE indicator='commerce_ressources'
                          AND country_to IN (${inList})
                          AND year = ${lastYear}
                          AND subcategory_1 IS NOT NULL AND subcategory_1 != ''
                          AND value IS NOT NULL AND value != 0
                        GROUP BY subcategory_1`);
  // Export : le sujet est country_from
  const exp = safeExec(`SELECT subcategory_1, SUM(value) AS v
                        FROM flux
                        WHERE indicator='commerce_ressources'
                          AND country_from IN (${inList})
                          AND year = ${lastYear}
                          AND subcategory_1 IS NOT NULL AND subcategory_1 != ''
                          AND value IS NOT NULL AND value != 0
                        GROUP BY subcategory_1`);
  // Fusion par catégorie
  const map = new Map();
  if(imp.length) for(const [cat, v] of imp[0].values){ if(!map.has(cat)) map.set(cat, {import:0, export:0}); map.get(cat).import = v; }
  if(exp.length) for(const [cat, v] of exp[0].values){ if(!map.has(cat)) map.set(cat, {import:0, export:0}); map.get(cat).export = v; }
  if(map.size === 0) return [];
  const out = [];
  for(const [category, vals] of map){
    out.push({
      category,
      label: prettyTradeCategory(category),
      import: vals.import || 0,
      export: vals.export || 0,
      year: lastYear,
    });
  }
  out.sort((a,b) => Math.max(b.import, b.export) - Math.max(a.import, a.export));
  return out;
}

  if(trade.length){

    const fmtUSD = (v) => {
      if(v >= 1e9) return (v/1e9).toFixed(1) + ' Mrd';
      if(v >= 1e6) return (v/1e6).toFixed(0) + ' M';
      if(v >= 1e3) return (v/1e3).toFixed(0) + ' k';
      return v.toFixed(0);
    };
    // En-tête tableau : 3 colonnes (catégorie / import / export)
    const header = `<div class="trade-thead">
      <div class="trade-th-cat"></div>
      <div class="trade-th"><span class="trade-th-dot imp"></span>Import</div>
      <div class="trade-th"><span class="trade-th-dot exp"></span>Export</div>
    </div>`;
    let rows = '';
    for(const t of trade){
      const wImp = (t.import / maxAll) * 100;
      const wExp = (t.export / maxAll) * 100;
      // Cellule renvoie '—' si valeur nulle (utile : on voit que la catégorie existe mais pas de flux dans ce sens)
      const cellImp = t.import > 0
        ? `<div class="trade-cell"><div class="trade-cell-bar"><div class="trade-cell-fill imp" style="width:${wImp.toFixed(1)}%"></div></div><div class="trade-cell-val">${fmtUSD(t.import)}</div></div>`
        : `<div class="trade-cell empty">—</div>`;
      const cellExp = t.export > 0
        ? `<div class="trade-cell"><div class="trade-cell-bar"><div class="trade-cell-fill exp" style="width:${wExp.toFixed(1)}%"></div></div><div class="trade-cell-val">${fmtUSD(t.export)}</div></div>`
        : `<div class="trade-cell empty">—</div>`;
      // Balance utile en infobulle pour ne pas perdre l'info synthétique
      const balance = t.export - t.import;
      const balanceSign = balance >= 0 ? '+' : '−';
      const tipBalance = `Balance ${t.label.toLowerCase()} : ${balanceSign}${fmtUSD(Math.abs(balance))} USD`;
      rows += `<div class="trade-row" title="${escAttr(tipBalance)}">
        <div class="trade-name">${t.label}</div>
        ${cellImp}
        ${cellExp}
      </div>`;
    }
    bodyHtml += `<div class="res-group res-trade">
      <div class="res-group-head">Commerce de ressources <span class="trade-year">· ${year}</span></div>
      ${header}
      ${rows}
    </div>`;
  }

  if(!hasContent){
    bodyHtml = `<div class="res-empty">Aucune ressource ≥ ${threshold}% mondial pour ce sujet. <button class="link-btn" onclick="openResThresholdModal()">ajuster le seuil</button></div>`;
  }
  return `<div class="card res-block">
    <div class="card-head">
      <span class="card-title">Atouts en ressources</span>
      <span style="display:flex;align-items:center;gap:8px">
        <span class="card-sub">part mondiale par type · seuil ${threshold}%</span>

      </span>

    <div class="card-body">${bodyHtml}</div>
  </div>`;
}

// Construit le panorama à partir d'une liste d'entrées flux (clé indicator|side).
// Chaque entrée porte son sens et son libellé contextuel propre.
function buildPanorama(entries, columnId){
  const colSuffix = columnId || 'panorama';
  const isInfluence = (columnId === 'influence');
  if(!entries.length) return `<div class="pano-empty">Aucun flux sélectionné. <button onclick="openPinModal('flux_${colSuffix==='partner'?'partner':'influence'}')" style="background:none;border:none;color:var(--green);text-decoration:underline;cursor:pointer">configurer</button></div>`;
  let html = '';
  let any = false;
  for(const e of entries){
    let rows = getFluxRows(e);
    if(!rows.length) continue;
    if(isDebtIndicator(e.indicator)){
      const bil = rows.filter(r => isBilateral(r));
      if(bil.length) rows = bil;
    }
    // Volume du sujet pour chaque partenaire (= dénominateur de la colonne 1)
    const subjectByPartner = new Map();
    let subjectTotal = 0;
    for(const r of rows){
      if(r.partner && r.partner.startsWith('__')) continue;
      const v = r.value || 0;
      subjectByPartner.set(r.partner, (subjectByPartner.get(r.partner) || 0) + v);
      subjectTotal += v;
    }
    if(subjectTotal <= 0) continue;
    any = true;

    let ranked;        // [[code, pct, volume], ...] trié décroissant par pct
    if(isInfluence){
      // COLONNE 2 — POUR QUI LE SUJET PÈSE
      // Pour chaque partenaire, on calcule (volume sujet vers ce partenaire) / (total mondial de ce partenaire)
      // Le tri se fait par pct décroissant (pays où le sujet pèse le plus relativement).
      const worldTotals = getFluxPartnerWorldTotals(e);
      const enriched = [];
      for(const [code, v] of subjectByPartner.entries()){
        const wt = worldTotals[code] || 0;
        if(wt <= 0) continue;   // partenaire sans volume mondial → on ne peut pas calculer
        const pct = (v / wt) * 100;
        enriched.push([code, pct, v]);
      }
      ranked = enriched.sort((a,b) => b[1] - a[1]);
    } else {
      // COLONNE 1 — QUI PÈSE POUR LE SUJET (calcul historique)
      // Pour chaque partenaire, sa part dans le total du sujet.
      ranked = [...subjectByPartner.entries()]
        .map(([code, v]) => [code, (v/subjectTotal)*100, v])
        .sort((a,b) => b[1] - a[1]);
    }
    if(!ranked.length) continue;

    const top = ranked[0];
    const pct = top[1];
    const cls = concentrationClass(pct);
    const rowId = ('pano_' + colSuffix + '_' + e.key).replace(/[^a-zA-Z0-9_]/g,'_');
    const visualClass = isInfluence ? 'influence' : 'partner';
    const maxPct = ranked[0][1] || 1;
    const top5 = ranked.slice(0, 5).map(([code, p]) => {
      const w = Math.max(2, (p / maxPct) * 100);
      return `<div class="pano-sub">
        <span class="flag">${partnerFlag(code)}</span>
        <span class="nm">${partnerLabel(code)}</span>
        <span class="bar"><span class="fill ${visualClass}" style="width:${w.toFixed(0)}%"></span></span>
        <span class="v">${p.toFixed(0)}%</span>
      </div>`;
    }).join('');
    html += `<div class="pano-wrap">
      <div class="pano-row" onclick="togglePano('${rowId}')">
        <div class="pano-flux" title="${e.label_long}">${e.label_long}</div>
        <div class="pano-partner"><span class="flag">${partnerFlag(top[0])}</span><span class="nm">${partnerLabel(top[0])}</span></div>
        <div class="pano-bar"><div class="pano-fill ${visualClass} ${cls}" style="width:${Math.min(100,pct).toFixed(0)}%"></div></div>
        <div class="pano-val">${pct.toFixed(0)}%</div>
        <div class="pano-caret" id="caret_${rowId}">▸</div>
      </div>
      <div class="pano-detail" id="${rowId}">
        <div class="pano-detail-title">Top 5 · ${e.label_long}</div>
        ${top5}
        <div class="pano-detail-link" onclick="event.stopPropagation();goToRelationsEntry('${e.key}')">→ explorer dans Relations</div>
      </div>
    </div>`;
  }
  return any ? html : `<div class="pano-empty">Pas de flux renseigné pour ce sujet.</div>`;
}

// Détecte un indicateur de dette (pour appliquer le filtre bilatéral en synthèse).
function isDebtIndicator(ind){ return /dette|debt/i.test(ind); }
// Ligne de dette bilatérale : subcategory_1 = 'bilaterale' (valeur réelle ETL IDS).
function isBilateral(r){
  return /bilat/i.test(String(r.sub1 || ''));

function partnerLabel(code){
  if(code === '__multilateral__') return 'Multilatéral';
  if(code === '__private__') return 'Privé';
  if(code === '__intra__') return 'Intra-groupe';
  if(code === '__world__' || code === 'WLD') return 'Monde';
  return isoToName(code);
}
function partnerFlag(code){
  if(code && code.startsWith('__')) return '⊟';
  return isoToFlag(code);
}

// Zone principale : entête + cellules (courbe en haut, carte en bas).
/* ─── COMPOSITION PAR SUB1 (étape B — ressources) ───────────────
   Pour les indicateurs ressources (production / réserves énergétiques et minérales),
   éclate la valeur globale par type (sub1). Affichage en bar chart horizontal trié,
   en mode comparaison A vs B avec barres groupées si compareB est actif.
*/
// Indicateurs concernés : valeurs absolues éclatées par sub1.
// Les *_share sont volontairement absents : ils sont déjà éclatés dans le bloc Atouts de Synthèse.
const PU_COMPO_INDICATORS = new Set([
  'energie_production', 'energie_reserves',
  'mineraux_production', 'mineraux_reserves',
]);

// Renvoie { sub1: value, ... } pour un indicateur, un ensemble d'isos et une année donnée.
// Fallback année : dernière année <= y avec données, par sub1 indépendamment.
function getCompoBySub1(indicator, isos, year){
  if(!isos || !isos.length) return {};
  const inList = sqlList(isos);
  const y = year ?? state.year;
  // Stratégie : récupérer TOUTES les années pour la dimension sub1 (sans borne sup),
  // puis pour chaque sub1 prendre la valeur de l'année <= y la plus récente possible,
  // avec fallback sur la dernière année disponible si rien <= y.
  // Cela évite que le bloc soit vide quand les seules données disponibles sont plus récentes que state.year.
  const r = safeExec(`SELECT subcategory, year, SUM(value) AS v
                      FROM identite
                      WHERE country_iso3 IN (${inList})
                        AND indicator = '${escapeSql(indicator)}'
                        AND subcategory IS NOT NULL AND subcategory != ''
                        AND value IS NOT NULL AND value != 0
                      GROUP BY subcategory, year`);
  if(!r.length) return {};
  // Indexer { sub → [(year, value), ...] }
  const bySub = new Map();
  for(const [sub, yy, v] of r[0].values){
    if(!bySub.has(sub)) bySub.set(sub, []);
    bySub.get(sub).push({ year: yy, value: v });
  }
  // Pour chaque sub : préférer la valeur d'année <= y, sinon prendre la plus récente toutes années confondues
  const out = {};
  for(const [sub, points] of bySub){
    const leq = points.filter(p => p.year <= y).sort((a,b) => b.year - a.year);
    const chosen = leq.length ? leq[0] : points.sort((a,b) => b.year - a.year)[0];
    if(chosen) out[sub] = chosen.value;
  }
  return out;
}

function buildCompoBlock(indicator){
  if(!PU_COMPO_INDICATORS.has(indicator)) return '';
  const cfg = state.indicators.find(c => c.indicator === indicator);
  if(!cfg) return '';
  const isosA = currentIsos();
  const hasB = state.compareB && state.compareB.isos.length > 0;
  const isosB = hasB ? state.compareB.isos : null;

  const dataA = getCompoBySub1(indicator, isosA, state.year);
  const dataB = hasB ? getCompoBySub1(indicator, isosB, state.year) : {};

  // Union des sub1, triées par max(A,B) décroissant
  const allSubs = new Set([...Object.keys(dataA), ...Object.keys(dataB)]);
  if(allSubs.size === 0) return '';
  const items = [...allSubs].map(sub => ({
    sub,
    label: prettySubLabel(sub),
    a: dataA[sub] || 0,
    b: dataB[sub] || 0,
  })).sort((x,y) => Math.max(y.a, y.b) - Math.max(x.a, x.b));

  const TOP = 10;
  const visible = items.slice(0, TOP);
  const hidden = items.slice(TOP);
  const maxVal = Math.max(...visible.flatMap(it => [it.a, it.b])) || 1;

  // Rendu : une ligne par sub. Si hasB, deux barres empilées verticalement dans la ligne (A vert, B orange).
  let rows = '';
  for(const it of visible){
    const wA = Math.max(2, (it.a / maxVal) * 100);
    const wB = hasB ? Math.max(it.b > 0 ? 2 : 0, (it.b / maxVal) * 100) : 0;
    const aStr = it.a > 0 ? `${fmtNumber(it.a, cfg.unit_display)} ${scaleSuffix(it.a, cfg.unit_display)}` : '—';
    const bStr = it.b > 0 ? `${fmtNumber(it.b, cfg.unit_display)} ${scaleSuffix(it.b, cfg.unit_display)}` : '—';
    if(hasB){
      rows += `<div class="compo-row compo-row-compare">
        <div class="compo-name">${it.label}</div>
        <div class="compo-bars">
          <div class="compo-bar-line">
            <span class="compo-bar-key">${state.subject.label}</span>
            <span class="compo-bar-track"><span class="compo-bar-fill a" style="width:${wA.toFixed(1)}%"></span></span>
            <span class="compo-bar-val">${aStr}</span>
          </div>
          <div class="compo-bar-line">
            <span class="compo-bar-key b">${state.compareB.label}</span>
            <span class="compo-bar-track"><span class="compo-bar-fill b" style="width:${wB.toFixed(1)}%"></span></span>
            <span class="compo-bar-val">${bStr}</span>
          </div>
        </div>
      </div>`;
    } else {
      rows += `<div class="compo-row">
        <div class="compo-name">${it.label}</div>
        <div class="compo-bar-track"><div class="compo-bar-fill a" style="width:${wA.toFixed(1)}%"></div></div>
        <div class="compo-bar-val">${aStr}</div>
      </div>`;
    }
  }
  let hiddenLine = '';
  if(hidden.length){
    const sumHiddenA = hidden.reduce((s,it) => s + it.a, 0);
    const sumHiddenB = hidden.reduce((s,it) => s + it.b, 0);
    const list = hidden.map(it => it.label).join(', ');
    const aStr = sumHiddenA > 0 ? `${fmtNumber(sumHiddenA, cfg.unit_display)} ${scaleSuffix(sumHiddenA, cfg.unit_display)}` : '';
    const bStr = hasB && sumHiddenB > 0 ? ` · ${state.compareB.label} ${fmtNumber(sumHiddenB, cfg.unit_display)} ${scaleSuffix(sumHiddenB, cfg.unit_display)}` : '';
    hiddenLine = `<div class="compo-hidden" title="${escAttr(list)}">+ ${hidden.length} autres types · ${aStr}${bStr}</div>`;
  }
  return `<div class="pu-cell">
    <div class="pu-cell-head">
      <span class="pu-cell-title">Composition par type</span>
      <span class="meta" style="font-size:10px;color:var(--text3)">${cfg.unit_display || cfg.unit || ''} · ${state.year}</span>
    </div>
    <div class="pu-cell-body">
      <div class="compo-wrap">${rows}${hiddenLine}</div>
    </div>
  </div>`;
}

function renderPuMain(){
  const main = document.getElementById('puMain');
  const c = state.indicators.find(x => x.indicator === _puIndicator);
  if(!c){ main.innerHTML = `<div class="need-subject"><p>Aucun indicateur sélectionné.</p></div>`; return; }
  const val = getIdentiteValue(_puIndicator, state.year);
  const realYear = getValueYear(_puIndicator, state.year);
  const src = getIndicatorSource(_puIndicator);
  let rankLine = '';
  if(state.subject.isos.length === 1 && val != null){
    const rp = rankPercentile(_puIndicator, val, realYear || state.year);
    if(rp) rankLine = `${ordinalFr(rp.rank)} / ${rp.total} mondial`;
  }
  // valeur B et écart relatif (B vs A) si comparaison active
  const hasB = state.compareB && state.compareB.isos.length > 0;
  const valB = hasB ? getIdentiteValueB(_puIndicator, state.year) : null;
  let cmpLine = '';
  if(hasB && valB != null){
    const bTxt = `${fmtNumber(valB, c.unit_display)} ${scaleSuffix(valB, c.unit_display)}`;
    let delta = '';
    if(val != null && val !== 0){
      const ratio = (valB - val) / Math.abs(val) * 100;
      const sign = ratio >= 0 ? '+' : '';
      delta = ` <span style="color:var(--orange);font-weight:600">(${sign}${ratio.toFixed(0)}%)</span>`;
    }
    cmpLine = ` <span style="color:var(--orange);font-family:var(--mono);font-size:10px;letter-spacing:.05em;margin-left:8px">vs ${state.compareB.label} ${bTxt}${delta}</span>`;
  }
  main.innerHTML = `
    <div class="pu-head">
      <span class="name">${c.label || c.indicator}</span>
      <span class="meta">${val!=null ? fmtNumber(val, c.unit_display)+' '+scaleSuffix(val,c.unit_display) : '—'}${rankLine?' · '+rankLine:''} · ${realYear||'—'} · ${src||'n/d'}${cmpLine}</span>
    </div>
    <div class="pu-cells">
      <div class="top-row">
        <div class="pu-cell">
          <div class="pu-cell-head"><span class="pu-cell-title">Radar percentilé</span><span style="display:flex;align-items:center;gap:8px"><span class="meta" style="font-size:10px;color:var(--text3)">axes choisis</span><button class="card-cog" onclick="openPinModal('radar')" title="Choisir les axes">⚙</button></span></div>
          <div class="pu-cell-body"><div class="pu-radar-wrap" id="puRadar"></div></div>
        </div>
        <div class="pu-cell">
          <div class="pu-cell-head"><span class="pu-cell-title">Évolution</span><span class="meta" style="font-size:10px;color:var(--text3)">${state.subject.label}</span></div>
          <div class="pu-cell-body"><div class="pu-curve-wrap" id="puCurve"></div></div>
        </div>
      </div>
      <div class="pu-cell">
        <div class="pu-cell-head"><span class="pu-cell-title">Carte mondiale</span><span class="meta" style="font-size:10px;color:var(--text3)">${realYear||state.year}</span></div>
        <div class="pu-cell-body">
          <div id="puMapContainer"><svg id="puMap"></svg></div>
          <div class="pu-map-legend"><span>faible</span><span class="bar"></span><span>élevé</span></div>
        </div>
      </div>
      ${buildCompoBlock(_puIndicator)}
    </div>`;
  drawPuRadar();
  drawPuCurve();
  buildPuMap();
}

/* ─── CELLULE COURBE ──────────────────────────────────────────── */
function drawPuCurve(){
  const wrap = document.getElementById('puCurve');
  if(!wrap) return;
  const seriesA = getIdentiteSeries(_puIndicator);
  const hasB = state.compareB && state.compareB.isos.length > 0;
  const seriesB = hasB ? getIdentiteSeriesB(_puIndicator) : [];
  if(seriesA.length < 2 && seriesB.length < 2){
    wrap.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">Série temporelle insuffisante</div>`;
    return;
  }
  const W = wrap.clientWidth || 600, H = 260, m = { t:14, r:16, b:24, l:48 };
  // échelle commune A ∪ B
  const allYears = seriesA.concat(seriesB).map(d => d.year);
  const allVals = seriesA.concat(seriesB).map(d => d.value);
  const xMin = Math.min(...allYears), xMax = Math.max(...allYears);
  const yMin = Math.min(...allVals), yMax = Math.max(...allVals);
  const yLo = yMin - (yMax-yMin)*0.08, yHi = yMax + (yMax-yMin)*0.08;
  const X = y => m.l + ((y - xMin)/((xMax-xMin)||1)) * (W - m.l - m.r);
  const Y = v => H - m.b - ((v - yLo)/((yHi-yLo)||1)) * (H - m.t - m.b);

  function buildPathsFor(series){
    const hist = series.filter(d => !d.projection);
    const proj = series.filter(d => d.projection);
    const projWithJoin = (hist.length && proj.length) ? [hist[hist.length-1], ...proj] : proj;
    const histPath = hist.map((d,i)=>(i===0?'M':'L')+X(d.year).toFixed(1)+','+Y(d.value).toFixed(1)).join(' ');
    const projPath = projWithJoin.length>1 ? projWithJoin.map((d,i)=>(i===0?'M':'L')+X(d.year).toFixed(1)+','+Y(d.value).toFixed(1)).join(' ') : '';
    return { hist, proj, histPath, projPath };
  }
  const A = buildPathsFor(seriesA);
  const B = hasB ? buildPathsFor(seriesB) : null;
  // aire (uniquement pour A, par lisibilité)
  const area = (A.histPath && A.hist.length) ? A.histPath + ` L${X(A.hist[A.hist.length-1].year).toFixed(1)},${Y(yLo).toFixed(1)} L${X(A.hist[0].year).toFixed(1)},${Y(yLo).toFixed(1)} Z` : '';

  // ticks Y
  let gridY = '';
  const cfg = state.indicators.find(c=>c.indicator===_puIndicator);
  for(let i=0;i<=3;i++){
    const v = yLo + (yHi-yLo)*i/3;
    const yy = Y(v).toFixed(1);
    gridY += `<line class="curve-grid" x1="${m.l}" y1="${yy}" x2="${W-m.r}" y2="${yy}"/><text class="curve-lbl" x="${m.l-6}" y="${(+yy+3).toFixed(1)}" text-anchor="end">${fmtNumber(v, cfg?.unit_display)}</text>`;
  }
  // ticks X
  const xticks = [xMin, Math.round((xMin+xMax)/2), xMax];
  const labX = xticks.map(t => `<text class="curve-lbl" x="${X(t).toFixed(1)}" y="${H-8}" text-anchor="middle">${t}</text>`).join('');

  // séparateur visuel projection (basé sur A)
  let projMark = '';
  if(A.hist.length && A.proj.length){
    const xp = X(A.proj[0].year).toFixed(1);
    projMark = `<line class="curve-grid" x1="${xp}" y1="${m.t}" x2="${xp}" y2="${H-m.b}" style="stroke:var(--orange);opacity:.4;stroke-dasharray:3 3"/><text class="curve-lbl" x="${xp}" y="${m.t+8}" text-anchor="middle" style="fill:var(--orange)">projection →</text>`;
  }
  const lastA = A.hist[A.hist.length-1] || A.proj[A.proj.length-1];
  const lastB = B ? (B.hist[B.hist.length-1] || B.proj[B.proj.length-1]) : null;

  // légende quand B actif
  let legend = '';
  if(hasB){
    legend = `<g transform="translate(${m.l+6},${m.t-2})">
      <line x1="0" y1="6" x2="14" y2="6" stroke="var(--green)" stroke-width="2"/><text x="18" y="9" class="curve-lbl" style="font-size:10px;fill:var(--text2)">${state.subject.label}</text>
      <line x1="120" y1="6" x2="134" y2="6" stroke="var(--orange)" stroke-width="2" stroke-dasharray="4 3"/><text x="138" y="9" class="curve-lbl" style="font-size:10px;fill:var(--text2)">${state.compareB.label}</text>
    </g>`;
  }

  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    ${gridY}
    ${area ? `<path class="curve-area" d="${area}"/>` : ''}
    ${A.histPath ? `<path class="curve-line" d="${A.histPath}"/>` : ''}
    ${A.projPath ? `<path class="curve-line curve-proj" d="${A.projPath}" style="stroke:var(--orange)"/>` : ''}
    ${B && B.histPath ? `<path class="curve-line" d="${B.histPath}" style="stroke:var(--orange);stroke-dasharray:4 3"/>` : ''}
    ${B && B.projPath ? `<path class="curve-line" d="${B.projPath}" style="stroke:var(--orange);stroke-dasharray:2 3;opacity:.6"/>` : ''}
    ${lastA ? `<circle class="curve-dot" cx="${X(lastA.year).toFixed(1)}" cy="${Y(lastA.value).toFixed(1)}" r="3"/>` : ''}
    ${lastB ? `<circle cx="${X(lastB.year).toFixed(1)}" cy="${Y(lastB.value).toFixed(1)}" r="3" fill="var(--orange)"/>` : ''}
    ${projMark}
    ${labX}
    ${legend}
  </svg>`;
}

/* ─── CELLULE RADAR PERCENTILÉ ────────────────────────────────── */
function drawPuRadar(){
  const wrap = document.getElementById('puRadar');
  if(!wrap) return;
  const axes = pinnedRadarIndicators().filter(c => c.presentInDb !== false);
  if(axes.length < 3){
    wrap.innerHTML = `<div class="radar-empty">Au moins 3 indicateurs requis. <button onclick="openPinModal('radar')" style="background:none;border:none;color:var(--green);text-decoration:underline;cursor:pointer">choisir les axes</button></div>`;
    return;
  }
  const W = 360, H = 320, cx = W/2, cy = H/2 + 4, R = Math.min(W,H)/2 - 38;
  const N = axes.length;
  const year = state.year;
  const hasB = state.compareB && state.compareB.isos.length > 0;
  if(hasB) ensureIdentiteCacheB();
  // points par axe : A et (option) B
  const pts = axes.map((ax, i) => {
    const angle = -Math.PI/2 + i * (2*Math.PI / N);
    const valA = getIdentiteValue(ax.indicator, year);
    const rpA = valA != null ? rankPercentile(ax.indicator, valA, getValueYear(ax.indicator, year) || year) : null;
    let pctB = null;
    if(hasB){
      const valB = getIdentiteValueB(ax.indicator, year);
      if(valB != null){
        const rpB = rankPercentile(ax.indicator, valB, year);
        if(rpB) pctB = rpB.percentile;
      }
    }
    return { axis: ax, angle, valA, pct: rpA?.percentile ?? null, pctB };
  });

  // axes (rayons)
  let axesSvg = '';
  for(const p of pts){
    const x = cx + Math.cos(p.angle) * R, y = cy + Math.sin(p.angle) * R;
    axesSvg += `<line class="radar-axis" x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"/>`;
  }
  // cercles concentriques + médiane
  let gridSvg = '';
  for(const f of [0.25, 0.5, 0.75, 1]) gridSvg += `<circle class="radar-grid" cx="${cx}" cy="${cy}" r="${(R*f).toFixed(1)}"/>`;
  const medianRing = `<circle class="radar-median" cx="${cx}" cy="${cy}" r="${(R*0.5).toFixed(1)}"/>`;

  // polygone A
  let polyA = '';
  const polyPtsA = pts.map(p => {
    const r = (p.pct != null) ? R * p.pct : 0;
    return [cx + Math.cos(p.angle)*r, cy + Math.sin(p.angle)*r];
  });
  if(polyPtsA.some(p => p[0] !== cx || p[1] !== cy)){
    const d = polyPtsA.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ') + ' Z';
    polyA = `<path class="radar-poly" d="${d}"/>`;
  }
  // polygone B (orange) — par-dessus A en transparence
  let polyB = '';
  if(hasB){
    const polyPtsB = pts.map(p => {
      const r = (p.pctB != null) ? R * p.pctB : 0;
      return [cx + Math.cos(p.angle)*r, cy + Math.sin(p.angle)*r];
    });
    if(polyPtsB.some(p => p[0] !== cx || p[1] !== cy)){
      const d = polyPtsB.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ') + ' Z';
      polyB = `<path d="${d}" fill="var(--orange)" fill-opacity=".12" stroke="var(--orange)" stroke-width="1.8" stroke-dasharray="4 3"/>`;
    }
  }

  // points + labels
  let dots = '', labels = '';
  pts.forEach(p => {
    const isActive = p.axis.indicator === _puIndicator;
    if(p.pct != null){
      const r = R * p.pct;
      dots += `<circle class="radar-pt ${isActive?'active':''}" cx="${(cx+Math.cos(p.angle)*r).toFixed(1)}" cy="${(cy+Math.sin(p.angle)*r).toFixed(1)}" r="3"/>`;
    }
    if(hasB && p.pctB != null){
      const r = R * p.pctB;
      dots += `<circle cx="${(cx+Math.cos(p.angle)*r).toFixed(1)}" cy="${(cy+Math.sin(p.angle)*r).toFixed(1)}" r="3" fill="var(--orange)"/>`;
    }
    const lx = cx + Math.cos(p.angle) * (R + 22);
    const ly = cy + Math.sin(p.angle) * (R + 22);
    const cosA = Math.cos(p.angle);
    let anchor = 'middle'; if(cosA > 0.3) anchor = 'start'; else if(cosA < -0.3) anchor = 'end';
    const shortLbl = (p.axis.label || p.axis.indicator).length > 18
      ? (p.axis.label || p.axis.indicator).slice(0, 17) + '…'
      : (p.axis.label || p.axis.indicator);
    const pctTxt = p.pct != null ? ` (${Math.round(p.pct*100)}%)` : '';
    labels += `<text class="radar-lbl ${isActive?'active':''}" x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" text-anchor="${anchor}">${shortLbl}${pctTxt}</text>`;
  });

  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    ${gridSvg}
    ${axesSvg}
    ${medianRing}
    ${polyA}
    ${polyB}
    ${dots}
    ${labels}
  </svg>`;
}

/* ─── CELLULE CARTE (D3, reprise de l'ancien moteur) ──────────── */
async function buildPuMap(){
  const svgEl = document.getElementById('puMap');
  const container = document.getElementById('puMapContainer');
  if(!svgEl || !container) return;
  const W = container.clientWidth || 700, H = 340;
  // (re)construction propre à chaque rendu
  const svg = d3.select(svgEl).attr('width', W).attr('height', H);
  svg.selectAll('*').remove();
  const proj = d3.geoNaturalEarth1().scale(W/6.2).translate([W/2, H/2]);
  const path = d3.geoPath().projection(proj);
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#dce8f0');
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([1,12]).on('zoom', ev => g.attr('transform', ev.transform));
  svg.call(zoom);
  svg.on('dblclick.zoom', () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity));

  let world;
  try { world = await loadWorldTopology(); }
  catch(e){ svgEl.innerHTML = `<rect width="${W}" height="${H}" fill="#dce8f0"/><text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#888" style="font:12px var(--mono)">Carte indisponible (réseau)</text>`; return; }
  const features = topojson.feature(world, world.objects.countries).features;
  puMapState = { ...puMapState, svg, g, path, proj, zoom, features, ready:true };

  // échelle de couleur sur la valeur de l'indicateur (année courante)
  const colorByIso = computePuMapColors();

  g.selectAll('.map-country').data(features).join('path')
    .attr('class','map-country')
    .attr('d', path)
    .attr('data-iso3', d => numToIso3(+d.id) || '')
    .style('fill', d => { const iso = numToIso3(+d.id); return iso && colorByIso[iso] ? colorByIso[iso] : '#eef2ee'; })
    .on('mouseover', function(ev,d){
      const iso = numToIso3(+d.id); if(!iso) return;
      d3.select(this).attr('stroke','var(--green)').attr('stroke-width',1);
      const v = puMapValue(iso);
      const name = isoToName(iso);
      const c = state.indicators.find(x=>x.indicator===_puIndicator);
      showTip2(ev, `${isoToFlag(iso)} ${name}`, v!=null ? fmtWithUnit(v, c?.unit_display) : 'pas de donnée');
    })
    .on('mousemove', moveTip)
    .on('mouseout', function(){ d3.select(this).attr('stroke','var(--border)').attr('stroke-width',0.4); hideTip(); })
    .on('click', function(ev,d){ const iso = numToIso3(+d.id); if(iso) setSubject([iso], isoToName(iso)); });

  // surligner le(s) pays du sujet
  const subjSet = new Set(currentIsos());
  g.selectAll('.map-country').filter(function(){ return subjSet.has(d3.select(this).attr('data-iso3')); })
    .attr('stroke','var(--green)').attr('stroke-width',1.3).raise();

  g.append('path').datum(d3.geoGraticule()()).attr('d', path).attr('fill','none').attr('stroke','#b0c4d8').attr('stroke-width',0.2).attr('opacity',0.4);
}

// Couleur choroplèthe : échelle par QUANTILES sur la distribution mondiale.
// Quantiles plutôt que linéaire pour ne pas être écrasé par les outliers
// (un seul pays très haut écraserait tout le reste en échelle linéaire).
function computePuMapColors(){
  const year = getValueYear(_puIndicator, state.year) || state.year;
  const { sorted } = getWorldStats(_puIndicator, year);
  if(!sorted || !sorted.length) return {};
  const cfg = state.indicators.find(c => c.indicator === _puIndicator);
  const inverted = cfg && cfg.rank_inverted;
  const ramp = ['#e8f0e8','#bfe0c8','#9ec9a8','#6fb486','#4f9e6a','#2d8556','#0a6e4a','#064e34'];
  const n = sorted.length;
  // sorted est trié croissant : sorted[i] a le rang (i+1)
  // bucket par quantile : floor(rang_relatif * nbBuckets), borné à nbBuckets-1
  const out = {};
  for(let i = 0; i < n; i++){
    const d = sorted[i];
    let q = i / Math.max(1, n - 1);                  // 0 (plus faible) → 1 (plus élevé)
    if(inverted) q = 1 - q;
    const idx = Math.min(ramp.length - 1, Math.floor(q * ramp.length));
    out[d.iso] = ramp[idx];
  }
  return out;
}
function puMapValue(iso){
  const year = getValueYear(_puIndicator, state.year) || state.year;
  const { sorted } = getWorldStats(_puIndicator, year);
  const f = sorted?.find(d => d.iso === iso);
  return f ? f.v : null;
}


/* ════════════════════════════════════════════════════════════════
   RENDU — ONGLET RELATIONS
   Heatmap d'accueil = boussole. Indicateurs cochables via engrenage propre.
   Composition = sunburst (hiérarchie complète d'emblée) / treemap.
   Tout passe par les entrées flux (clé indicator|side) → libellés contextuels,
   sens correct, alias et commerce import/export gérés en amont.
═════════════════════════════════════════════════════════════════ */
// État Relations refondu : pas de heatmap d'accueil, pas de sunburst.
// Le treemap est la composition principale ; le référentiel (dimension d'analyse)
// est commutable entre partenaire / sub1 / sub2 / sub3 selon ce qui est peuplé.
let _relEntryKey = null;          // clé d'entrée flux active (ex. 'dette_exterieure|to')
let _relDim = 'partner';          // 'partner' | 'sub1' | 'sub2' | 'sub3' — dimension principale
let _relPath = [];                // chemin de drill-down dans le treemap (= filtre cumulatif partagé)
let _relCatCollapsed = {};        // état plié/déplié des catégories dans la nav gauche
let _relMetric = 'volume';        // 'volume' | 'influence' — métrique d'affichage
let _relInfluencePinned = null;   // en mode Influence, ISO3 du partenaire sélectionné pour zoom courbe
let _relZoneFilter = null;        // zone_id (zone géo ou organisation) qui filtre les partenaires affichés, null = monde entier
let _relZonePartnersCache = null; // cache des ISO3 inclus dans la zone active (invalidé à chaque changement de filtre)
let _relYearRange = null;         // [yMin, yMax] inclusif, ou null = utiliser state.year ponctuel
let _relYearAggMode = 'sum';      // 'sum' (cumul sur la plage) | 'avg' (moyenne annuelle)

// Liste des zones disponibles, mise en cache. Retourne [{zone_id, zone_nom, n_pays}].
// Trié par catégorie (GEO_ d'abord par nombre de pays décroissant, puis organisations alphabétique).
let _allZonesCache = null;
function getAllZones(){
  if(_allZonesCache) return _allZonesCache;
  const r = safeExec(`SELECT zone_id, zone_nom, COUNT(country_iso3) AS n
                      FROM zones GROUP BY zone_id, zone_nom`);
  if(!r.length){ _allZonesCache = []; return _allZonesCache; }
  const zones = r[0].values.map(([id, nom, n]) => ({
    zone_id: id,
    zone_nom: nom,
    n_pays: n,
    isGeo: id.startsWith('GEO_'),
  }));
  // GEO d'abord (continents par taille), puis organisations alphabétique
  zones.sort((a,b) => {
    if(a.isGeo !== b.isGeo) return a.isGeo ? -1 : 1;
    if(a.isGeo) return b.n_pays - a.n_pays;
    return a.zone_nom.localeCompare(b.zone_nom);
  });
  _allZonesCache = zones;
  return zones;
}

// Renvoie le Set des ISO3 inclus dans la zone active (filtre Relations).
// Renvoie null si pas de filtre (toutes les partenaires).
function getZoneFilterIsos(){
  if(!_relZoneFilter) return null;
  if(_relZonePartnersCache) return _relZonePartnersCache;
  const r = safeExec(`SELECT DISTINCT country_iso3 FROM zones WHERE zone_id='${escapeSql(_relZoneFilter)}'`);
  if(!r.length){ _relZonePartnersCache = new Set(); return _relZonePartnersCache; }
  _relZonePartnersCache = new Set(r[0].values.map(row => row[0]));
  return _relZonePartnersCache;
}

// Setter qui invalide cache + ré-rend Relations
function setRelZoneFilter(zoneId){
  _relZoneFilter = (zoneId === '' || zoneId === 'null') ? null : zoneId;
  _relZonePartnersCache = null;
  _relPath = [];  // reset drill-down quand on change de zone (cohérence visuelle)
  _relInfluencePinned = null;  // reset sélection pin influence aussi
  renderRelMain();
  syncUrl();
}

// Filtre une liste de rows {partner, ...} par la zone active.
// Si pas de zone, retourne tel quel.
function filterByZoneFilter(rows){
  const set = getZoneFilterIsos();
  if(!set) return rows;
  return rows.filter(r => set.has(r.partner));
}

// Plage [yMin, yMax] des années disponibles pour l'entrée flux active dans la DB
// (toutes années confondues, indépendamment du sujet). Cache léger.
const _fluxYearsAvailableCache = new Map();
function getFluxYearsAvailable(entry){
  if(!entry) return null;
  if(_fluxYearsAvailableCache.has(entry.key)) return _fluxYearsAvailableCache.get(entry.key);
  const r = safeExec(`SELECT MIN(year), MAX(year) FROM flux WHERE indicator='${escapeSql(entry.realIndicator)}'`);
  if(!r.length){ _fluxYearsAvailableCache.set(entry.key, null); return null; }
  const [yMin, yMax] = r[0].values[0];
  if(yMin == null || yMax == null){ _fluxYearsAvailableCache.set(entry.key, null); return null; }
  const res = [yMin, yMax];
  _fluxYearsAvailableCache.set(entry.key, res);
  return res;
}

// Setter de plage : reset les caches dépendants
function setRelYearRange(yMin, yMax){
  // Valider que yMin <= yMax
  if(yMin > yMax){ const tmp = yMin; yMin = yMax; yMax = tmp; }
  _relYearRange = [yMin, yMax];
  cache.flux.clear();   // les valeurs agrégées dépendent de la plage
  _fluxPartnerTotalsCache.clear();
  _relInfluencePinned = null;
  renderRelMain();
  syncUrl();
}
function clearRelYearRange(){
  _relYearRange = null;
  cache.flux.clear();
  _fluxPartnerTotalsCache.clear();
  _relInfluencePinned = null;
  renderRelMain();
  syncUrl();
}
function setRelYearAggMode(mode){
  if(mode !== 'sum' && mode !== 'avg') return;
  _relYearAggMode = mode;
  cache.flux.clear();
  _fluxPartnerTotalsCache.clear();
  renderRelMain();
  syncUrl();
}

/* ─── Dimensions disponibles pour le référentiel d'analyse ────────
   Pour un flux donné, on renvoie la liste des dimensions possibles
   (partner + sub1/sub2/sub3 selon leur peuplement). _relDim choisit celle
   qui est affichée dans le treemap et les aires empilées.
─────────────────────────────────────────────────────────────── */
function getRelDimensions(){
  const entry = getFlowEntryByKey(_relEntryKey);
  if(!entry) return [{ key:'partner', label:'Partenaire' }];
  const rows = getFluxRows(entry);
  const dims = [{ key:'partner', label:'Partenaire', count: new Set(rows.map(r => r.partner).filter(p => p && !p.startsWith('__'))).size }];
  const isDebt = isDebtIndicator(entry.indicator);
  // pour la dette, sub1 = bilatérale (déjà filtré) → on l'omet
  const subs = isDebt ? ['sub2','sub3'] : ['sub1','sub2','sub3'];
  for(const lvl of subs){
    const vals = new Set();
    for(const r of rows){ const v = r[lvl]; if(v && String(v).trim() !== '') vals.add(String(v)); }
    if(vals.size > 1) dims.push({ key: lvl, label: `Catégorie ${lvl.slice(-1)}`, count: vals.size });
  }
  return dims;
}

/* Le filtre actif = chemin de drill-down (_relPath) + dimension choisie.
   À chaque drill, on enregistre (level, value) cumulé. Filtre toutes les vues. */
function applyDrillFilter(rows){
  for(const step of _relPath){
    rows = rows.filter(r => String(r[step.level] || '') === step.value);
  }
  return rows;
}
function setRelDim(dim){
  _relDim = dim;
  _relPath = [];   // on reset le drill quand on change de dimension
  renderRelMain();
  syncUrl();
}
function pushRelDrill(level, value){
  // value est la clé brute (ISO3 pour partner, valeur subcategory sinon)
  // on stocke aussi un label affichable pour le breadcrumb
  const label = (level === 'partner') ? (partnerLabel(value) || value) : value;
  _relPath = [..._relPath, { level, value, label }];
  renderRelMain();
}
function setRelPathLength(len){
  _relPath = _relPath.slice(0, len);
  renderRelMain();
}

function renderRelations(){
  const root = document.getElementById('relationsContent');
  if(!state.subject || !state.subject.isos.length){
    root.innerHTML = `<div class="need-subject">
      <div class="big">Choisir un sujet</div>
      <p>Sélectionnez un pays ou une zone pour explorer ses relations.</p>
      <button onclick="openSearch()">⌕ Rechercher un sujet</button>
    </div>`;
    return;
  }
  // focus venant d'une porte de Synthèse (clé d'entrée flux)
  if(_pendingFocus.flowEntryKey){
    _relEntryKey = _pendingFocus.flowEntryKey;
    _pendingFocus.flowEntryKey = null;
    _relPath = []; _relDim = 'partner';
  }
  // entrée flux par défaut si on arrive sans : première dispo
  if(!_relEntryKey){
    const all = flowEntriesPresent();
    if(all.length) _relEntryKey = all[0].key;
  }
  // structure : nav indicateurs gauche + zone principale droite (comme Puissance)
  root.innerHTML = `
    <div class="pu-layout">
      <div class="pu-nav">
        <div class="pu-nav-search"><input type="text" id="relSearch" placeholder="Filtrer un flux…" oninput="filterRelNav(this.value)"></div>
        <div class="pu-nav-body" id="relNavBody"></div>
      </div>
      <div class="pu-main" id="relMain"></div>
    </div>`;
  renderRelNav('');
  renderRelMain();
}

function renderRelNav(filter){
  const body = document.getElementById('relNavBody');
  const all = flowEntriesPresent();
  const ql = (filter || '').trim().toLowerCase();
  const byCat = {};
  for(const e of all){
    if(ql && !e.label_long.toLowerCase().includes(ql)) continue;
    (byCat[e.category || 'autre'] ??= []).push(e);
  }
  let html = '';
  for(const cat of Object.keys(byCat).sort()){
    const collapsed = _relCatCollapsed[cat] && !ql ? 'collapsed' : '';
    html += `<div class="pu-cat ${collapsed}" data-cat="${cat}">
      <div class="pu-cat-head" onclick="toggleRelCat('${cat}')"><span class="caret">▼</span>${cat}</div>
      <div class="pu-cat-list">`;
    for(const e of byCat[cat]){
      const active = e.key === _relEntryKey ? 'active' : '';
      html += `<div class="pu-ind ${active}" onclick="selectRelEntry('${e.key.replace(/'/g,"\\'")}')">
        <span>${e.label_long}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  body.innerHTML = html || `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Aucun flux</div>`;
}
function toggleRelCat(cat){ _relCatCollapsed[cat] = !_relCatCollapsed[cat]; renderRelNav(document.getElementById('relSearch')?.value || ''); }
function filterRelNav(v){ renderRelNav(v); }
function selectRelEntry(key){
  _relEntryKey = key; _relPath = []; _relDim = 'partner'; _relInfluencePinned = null;
  renderRelNav(document.getElementById('relSearch')?.value || '');
  renderRelMain();
  syncUrl();
}

  // suffixe période pour les libellés

    const [yMin, yMax] = _relYearRange;

  main.innerHTML = `

    <div class="pu-cells">
      <div class="top-row">
